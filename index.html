                    mainCtx.font = '7px "Courier New", monospace';
                    mainCtx.fillText('ALERTA', bx - bw - 4, by + 3);
                }
                const collected = items.filter(it => it.collected).length;
                mainCtx.fillStyle = collected === items.length ? '#ffd700' : '#aaaacc';
                mainCtx.font = '9px "Courier New", monospace';
                mainCtx.fillText('ITENS: ' + collected + '/' + items.length, CANVAS_W - 14, 32);
                if (collected === items.length && items.length > 0) {
                    mainCtx.fillStyle = '#4ecdc4';
                    mainCtx.fillText('VA PARA A SAÍDA!', CANVAS_W - 14, 44);
                }
                mainCtx.textAlign = 'left';
                mainCtx.fillStyle = '#aaaacc';
                mainCtx.font = '9px "Courier New", monospace';
                mainCtx.fillText('FASE ' + currentPhase, 14, 16);
                if (player && player.isRunning && player.speed > 20) {
                    mainCtx.fillStyle = `rgba(255,180,60,${0.5 + Math.sin(globalTime * 10) * 0.3})`;
                    mainCtx.font = 'bold 9px "Courier New", monospace';
                    mainCtx.fillText('⚠ BARULHO', 14, 30);
                }
                const chasingGuard = guards.find(g => g.state === 'chase');
                if (chasingGuard) {
                    mainCtx.fillStyle = '#ff3333';
                    mainCtx.font = 'bold 9px "Courier New", monospace';
                    mainCtx.fillText('!! PERSEGUIÇÃO', 14, 44);
                } else if (guards.some(g => g.state === 'investigate')) {
                    mainCtx.fillStyle = '#ff8844';
                    mainCtx.font = 'bold 9px "Courier New", monospace';
                    mainCtx.fillText('! INVESTIGANDO', 14, 44);
                }
                mainCtx.textAlign = 'start';
            }

            // ============================================================
            // GAME LOOP
            // ============================================================
            let lastTime = performance.now();
            let frameAccum = 0;
            const fixedStep = 1 / 60;

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;
                if (dt > 0.2) dt = 0.2;
                if (dt <= 0) dt = fixedStep;
                frameAccum += dt;
                let updates = 0;
                while (frameAccum >= fixedStep && updates < 5) { update(fixedStep);
                    frameAccum -= fixedStep;
                    updates++; }
                if (updates === 0 && frameAccum > 0) { update(frameAccum);
                    frameAccum = 0; }
                render();
                requestAnimationFrame(gameLoop);
            }

            // ============================================================
            // INPUT
            // ============================================================
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') shiftDown = true;
                if (e.code === 'Space') {
                    spacePressed = true;
                    audio.init();
                    audio.resume();
                    if (gameState === STATE.TITLE) restartGame();
                    else if (gameState === STATE.CAUGHT && freezeTimer <= 0) restartGame();
                    else if (gameState === STATE.WIN) nextPhase();
                    e.preventDefault();
                }
                if (e.code === 'KeyR') { rPressed = true;
                    audio.init();
                    audio.resume(); }
                if (['KeyW', 'KeyA', 'KeyS', 'KeyD', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                    audio.init();
                    audio.resume();
                    if (gameState === STATE.TITLE) restartGame();
                }
            });
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') shiftDown = false;
            });
            canvas.addEventListener('click', () => {
                audio.init();
                audio.resume();
                if (gameState === STATE.TITLE) restartGame();
                else if (gameState === STATE.CAUGHT && freezeTimer <= 0) restartGame();
                else if (gameState === STATE.WIN) nextPhase();
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                audio.init();
                audio.resume();
                if (gameState === STATE.TITLE) restartGame();
                else if (gameState === STATE.CAUGHT && freezeTimer <= 0) restartGame();
                else if (gameState === STATE.WIN) nextPhase();
            });

            function init() {
                currentPhase = 1;
                generateRoom(currentPhase);
                gameState = STATE.TITLE;
                detectionMeter = 0;
                detectionFlash = 0;
                freezeTimer = 0;
                winTimer = 0;
                caughtTimer = 0;
                shakeIntensity = 0;
                shakeDuration = 0;
                screenShakeX = 0;
                screenShakeY = 0;
                particles.length = 0;
                lastTime = performance.now();
                frameAccum = 0;
            }
            init();
            requestAnimationFrame(gameLoop);
            console.log('%c🕵️ STEALTH ROOM v2.0 %cCAÇADA INTELIGENTE',
                'color:#ff4444;font-size:18px;font-family:monospace;',
                'color:#4ecdc4;font-size:12px;');
            console.log('%cWASD = Mover | SHIFT = Correr | Colete itens | Fuja do guarda!',
                'color:#ccc;font-size:11px;font-family:monospace;');
        })();
    </script>
</body>
