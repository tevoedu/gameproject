    // ============================================================
    // SHOP PARTICLES
    // ============================================================
    const shopCanvas = document.getElementById('ambient-canvas-shop');
    const shopCtx = shopCanvas.getContext('2d');
    let shopParticles = [];
    let shopParticleConfig = { type:'industrial', color:'rgba(180,160,120,', count:40 };

    class ShopParticle {
        constructor(config) {
            this.x = Math.random()*800; this.y = Math.random()*600;
            this.size = Math.random()*3+1;
            this.alpha = Math.random()*0.5+0.2;
            this.config = config;
            this.life = Math.random()*200+100;
            switch (config.type) {
                case 'industrial': this.speedY = -(Math.random()*0.4+0.1); this.speedX = (Math.random()*0.8-0.4); break;
                case 'magical': this.speedY = -(Math.random()*0.5+0.15); this.speedX = (Math.random()*0.6-0.3); this.size = Math.random()*4+1; this.alpha = Math.random()*0.7+0.3; this.twinkle = Math.random()*Math.PI*2; break;
                case 'heavy': this.speedY = -(Math.random()*0.25+0.05); this.speedX = (Math.random()*0.3-0.15); this.size = Math.random()*2.5+1; break;
                case 'fog': this.speedY = -(Math.random()*0.2+0.05); this.speedX = Math.sin(Math.random()*Math.PI*2)*0.3; this.size = Math.random()*8+4; this.alpha = Math.random()*0.2+0.05; break;
                case 'ember': this.speedY = -(Math.random()*0.7+0.3); this.speedX = (Math.random()*0.5-0.25); this.size = Math.random()*2.5+1; this.alpha = Math.random()*0.6+0.3; break;
                default: this.speedY = -(Math.random()*0.3+0.1); this.speedX = (Math.random()*0.4-0.2);
            }
        }
        update(dt) {
            this.y += this.speedY*dt*60; this.x += this.speedX*dt*60; this.life -= dt*60;
            if (this.config.type==='magical') { this.twinkle += 0.05; this.alpha = 0.3 + Math.sin(this.twinkle)*0.4; }
            if (this.config.type==='fog') { this.speedX = Math.sin(this.y*0.02 + this.life*0.01)*0.4; }
            if (this.config.type==='ember') { this.alpha -= 0.002; }
            if (this.y < -20 || this.life <= 0 || this.alpha <= 0) {
                this.y = 610; this.x = Math.random()*800; this.life = Math.random()*200+100;
                if (this.config.type==='ember') this.alpha = Math.random()*0.6+0.3;
                if (this.config.type==='fog') this.alpha = Math.random()*0.2+0.05;
            }
        }
        draw() {
            const colorStr = this.config.color + this.alpha + ')';
            shopCtx.fillStyle = colorStr;
            if (this.config.type==='magical') { shopCtx.shadowBlur=6; shopCtx.shadowColor=colorStr; }
            else if (this.config.type==='fog') { shopCtx.shadowBlur=12; shopCtx.shadowColor=colorStr; }
            else if (this.config.type==='ember') { shopCtx.shadowBlur=4; shopCtx.shadowColor='rgba(255,120,30,'+this.alpha+')'; }
            else { shopCtx.shadowBlur=0; shopCtx.shadowColor='transparent'; }
            shopCtx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.size), Math.floor(this.size));
            shopCtx.shadowBlur=0; shopCtx.shadowColor='transparent';
        }
    }

    function initShopParticles(config) {
        shopParticleConfig = config || shopParticleConfig;
        shopParticles = [];
        for (let i=0; i<shopParticleConfig.count; i++) shopParticles.push(new ShopParticle(shopParticleConfig));
        shopCanvas.width = 800; shopCanvas.height = 600;
    }

    function updateShopParticles(dt) {
        shopCtx.clearRect(0,0,800,600);
        shopParticles.forEach(p=>{ p.update(dt); p.draw(); });
    }

    // ============================================================
    // SALVAMENTO E CARREGAMENTO
    // ============================================================
    function saveGameState() {
        try {
            const data = {
                currentWorldIndex, currentPhaseInWorld, lives, playerCoins,
                inventory: inventory.map(item => ({ ...item })),
                equippedItems, permanentUpgrades,
                phaseBestCollections, totalItemsCollectedThisWorld, worldDetectionSum,
                visitedWorlds: Array.from(visitedWorlds),
            };
            localStorage.setItem('stealthRoom_v5_save', JSON.stringify(data));
        } catch(e) {}
    }

    function loadGameState() {
        try {
            const raw = localStorage.getItem('stealthRoom_v5_save');
            if (!raw) return false;
            const data = JSON.parse(raw);
            currentWorldIndex = data.currentWorldIndex || 0;
            currentPhaseInWorld = data.currentPhaseInWorld || 1;
            lives = data.lives || MAX_LIVES;
            playerCoins = data.playerCoins || 0;
            if (data.inventory) {
                inventory = data.inventory.map(item => {
                    if (itemEffects[item.id]) {
                        item.use = itemEffects[item.id];
                    } else {
                        item.use = function() { return false; };
                    }
                    return item;
                });
            }
            equippedItems = data.equippedItems || [];
            permanentUpgrades = data.permanentUpgrades || [];
            phaseBestCollections = data.phaseBestCollections || [0,0,0,0,0];
            totalItemsCollectedThisWorld = data.totalItemsCollectedThisWorld || 0;
            worldDetectionSum = data.worldDetectionSum || 0;
            visitedWorlds.clear();
            if (data.visitedWorlds) data.visitedWorlds.forEach(w=>visitedWorlds.add(w));
            if (permanentUpgrades.includes('lib_tome')) {
                const extra = permanentUpgrades.filter(u=>u==='lib_tome').length;
                lives = Math.min(MAX_LIVES + extra, lives + extra);
            }
            return true;
        } catch(e) { return false; }
    }

    // ============================================================
    // LOOP PRINCIPAL
    // ============================================================
    let lastTime = performance.now();
    let frameAccum = 0;
    const fixedStep = 1/60;

    function update(dt) {
        const cd = Math.min(dt, 0.1);

        if (crowProgramming.active && gameState === STATE.PLAYING) {
            if (gameState !== STATE.PLAYING) { cancelCrowProgramming(); }
        }

        if (gameState === STATE.INTRO) { updateIntro(cd); globalTime += cd; titlePulse += cd*2.5; return; }
        if (gameState === STATE.SHOP) { shopNpcTimer += cd; if (shopNpcTimer>9) { shopNpcTimer=0; triggerShopNpcSpeech(); } updateShopParticles(cd); globalTime += cd; return; }

        globalTime += cd;
        if (shakeDuration > 0) {
            shakeDuration -= cd;
            const s = shakeIntensity * Math.max(0, shakeDuration/0.6);
            screenShakeX = (Math.random()-0.5)*s*2;
            screenShakeY = (Math.random()-0.5)*s*2;
            if (shakeDuration <= 0) { screenShakeX=0; screenShakeY=0; shakeIntensity=0; }
        } else { screenShakeX=0; screenShakeY=0; }
        if (detectionFlash > 0) detectionFlash = Math.max(0, detectionFlash - cd*2.8);
        if (freezeTimer > 0) { freezeTimer -= cd; if (freezeTimer <= 0 && gameState === STATE.CAUGHT) applyDeathPenalty(); }
        if (winTimer > 0) winTimer -= cd;
        if (worldTransTimer > 0) { worldTransTimer -= cd; worldTransAlpha = Math.min(1, worldTransAlpha+cd*1.2); if (worldTransTimer <= 0) advanceWorld(); }
        if (worldSummaryTimer > 0) { worldSummaryTimer -= cd; if (worldSummaryTimer <= 0 && gameState===STATE.WORLD_SUMMARY) { openShopForWorld(); worldSummaryTimer=0; } }
        if (gameOverTimer > 0) { gameOverTimer -= cd; if (gameOverTimer <= 0) restartGame(); }

        for (const p of particles) p.update(cd);
        for (let i=particles.length-1; i>=0; i--) { if (!particles[i].alive) particles.splice(i,1); }

        if (gameState === STATE.PLAYING) {
            if (distractionCooldown > 0) distractionCooldown -= cd;
            NoiseSystem.update(cd);
            ScentSystem.update(cd);

            updateCrows(cd);

            if (!crowProgramming.active) {
                updatePlayer(cd);
            }

            for (const guard of guards) updateGuardAI(guard, cd);
            for (const dog of robotDogs) updateRobotDogAI(dog, cd);
            updateCameras(dt);
            checkPhysicalCapture();
        }

        if (player && (gameState===STATE.PLAYING||gameState===STATE.CAUGHT||gameState===STATE.WIN||gameState===STATE.WORLD_TRANSITION||gameState===STATE.WORLD_SUMMARY)) {
            const targetX=player.x, targetY=player.y;
            const lerpSpeed=18;
            camera.x += (targetX - camera.x) * lerpSpeed * cd;
            camera.y += (targetY - camera.y) * lerpSpeed * cd;
            const vw = GAME_W / cameraZoom, vh = GAME_H / cameraZoom;
            camera.x = Math.max(vw/2, Math.min(GAME_W - vw/2, camera.x));
            camera.y = Math.max(vh/2, Math.min(GAME_H - vh/2, camera.y));
            cameraZoom += (targetZoom - cameraZoom) * 8 * cd;
        }

        if (gameState === STATE.PLAYING) {
            for (const it of items) if (!it.collected) it.glowPhase += cd*3.5;
        }
        titlePulse += cd*2.5;
        spacePressed = false; rPressed = false;

        // Audio adaptativo
        AdaptiveAudioSystem.update(dt);
        MusicManager.update(dt);
        let ambVol = 0.5;
        if (gameState === STATE.PLAYING) {
            const chasing = guards.some(g => g.state === 'chase');
            const alert = SecurityAlertSystem.isAlert();
            if (chasing || alert) ambVol = 0.2;
            else if (detectionMeter > 0.3) ambVol = 0.3;
            else ambVol = 0.6;
        } else if (gameState === STATE.INTRO || gameState === STATE.WORLD_TRANSITION) {
            ambVol = 0.3;
        } else if (gameState === STATE.WORLD_SUMMARY) ambVol = 0.4;
        else if (gameState === STATE.WIN) ambVol = 0.2;
        else if (gameState === STATE.CAUGHT || gameState === STATE.GAME_OVER) ambVol = 0.1;
        AudioEvents.updateAmbience(ambVol);
    }

    function updateCameras(dt) {
        SecurityAlertSystem.update(dt);
        for (const cam of cameras) {
            cam.timer += dt;
            const sweep = Math.sin(cam.timer * cam.rotationSpeed) * cam.sweepAngle;
            cam.currentAngle = cam.angle + sweep;
            if (!player || gameState !== STATE.PLAYING) {
                cam.detectionLevel = Math.max(0, cam.detectionLevel - dt * 0.5);
                if (cam.detectionLevel < 0.2) cam.state = 'NORMAL';
                continue;
            }
            const dx = player.x - cam.x;
            const dy = player.y - cam.y;
            const dist = Math.hypot(dx, dy);
            const angleToPlayer = Math.atan2(dy, dx);
            let angleDiff = angleToPlayer - cam.currentAngle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI*2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI*2;
            const inCone = Math.abs(angleDiff) < cam.visionAngle/2;
            const blockers = getAllBlockers();
            const hasLOS = lineOfSight(cam.x, cam.y, player.x, player.y, blockers);
            const isVisible = dist < cam.visionRange && inCone && hasLOS;
            if (isVisible && !player.camouflaged) {
                const rate = 0.8 + (1 - dist/cam.visionRange) * 0.6;
                cam.detectionLevel = Math.min(1, cam.detectionLevel + rate * dt);
                if (cam.detectionLevel > 0.3 && cam.state === 'NORMAL') {
                    cam.state = 'SUSPICIOUS';
                    AudioEvents.play('camera:detect');
                }
                if (cam.detectionLevel > 0.8 && cam.state !== 'ALERT') {
                    cam.state = 'ALERT';
                    AudioEvents.play('camera:alert');
                    const now = globalTime;
                    if (now - cam.lastAlertTime > cam.alertCooldown) {
                        cam.lastAlertTime = now;
                        SecurityAlertSystem.triggerAlert({ x: player.x, y: player.y }, 'ALERT');
                    }
                    detectionMeter = Math.min(1, detectionMeter + 0.6 * dt);
                    detectionFlash = Math.max(detectionFlash, 0.3);
                }
            } else {
                cam.detectionLevel = Math.max(0, cam.detectionLevel - 0.3 * dt);
                if (cam.detectionLevel < 0.2) cam.state = 'NORMAL';
                else if (cam.detectionLevel < 0.6) cam.state = 'SUSPICIOUS';
            }
            if (gameState === STATE.CAUGHT || gameState === STATE.GAME_OVER) {
                cam.detectionLevel = 0;
                cam.state = 'NORMAL';
            }
        }
    }

    function lineOfSight(x1, y1, x2, y2, blockers) {
        const steps = Math.max(Math.abs(x2-x1), Math.abs(y2-y1));
        if (steps === 0) return true;
        for (let i=0; i<=steps; i++) {
            const t = i / steps;
            const cx = x1 + (x2-x1)*t;
            const cy = y1 + (y2-y1)*t;
            for (const b of blockers) {
                if (pointInRect(cx, cy, b, 0.5)) return false;
            }
        }
        return true;
    }

    // ============================================================
    // RENDERIZAÇÃO COMPLETA
    // ============================================================
    function render() {
        if (gameState === STATE.SHOP) {
            mainCtx.clearRect(0,0,CANVAS_W,CANVAS_H);
            mainCtx.fillStyle = '#000';
            mainCtx.fillRect(0,0,CANVAS_W,CANVAS_H);
            return;
        }
        const world = getCurrentWorld();
        ctx.clearRect(0,0,GAME_W,GAME_H);
        ctx.fillStyle = world.floorColor1;
        ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.fillStyle = world.floorColor2;
        for (let gx=TILE; gx<GAME_W-TILE; gx+=TILE*2)
            for (let gy=TILE; gy<GAME_H-TILE; gy+=TILE*2)
                if ((Math.floor(gx/TILE)+Math.floor(gy/TILE))%2===0) ctx.fillRect(gx,gy,TILE,TILE);
        const vg = ctx.createRadialGradient(GAME_W/2,GAME_H/2,GAME_W*0.35,GAME_W/2,GAME_H/2,GAME_W*0.85);
        vg.addColorStop(0,'rgba(0,0,0,0)');
        vg.addColorStop(1,world.ambientLight);
        ctx.fillStyle = vg;
        ctx.fillRect(0,0,GAME_W,GAME_H);

        const wr = [roomWalls.left, roomWalls.right, roomWalls.top, roomWalls.bottom];
        for (const w of wr) {
            ctx.fillStyle = world.wallFill; ctx.fillRect(w.x,w.y,w.w,w.h);
            ctx.fillStyle = world.wallEdge;
            if (w===roomWalls.left) ctx.fillRect(w.x+w.w-2, w.y+2, 2, w.h-4);
            if (w===roomWalls.right) ctx.fillRect(w.x, w.y+2, 2, w.h-4);
            if (w===roomWalls.top) ctx.fillRect(w.x+2, w.y+w.h-2, w.w-4, 2);
            if (w===roomWalls.bottom) ctx.fillRect(w.x+2, w.y, w.w-4, 2);
        }
        for (const b of bushes) {
            const bushAlpha = player && player.camouflaged && pointInRect(player.x,player.y,b,2) ? 0.7 : 0.55;
            ctx.fillStyle = `rgba(30,50,22,${bushAlpha})`;
            ctx.fillRect(b.x,b.y,b.w,b.h);
            ctx.fillStyle = `rgba(50,80,38,${bushAlpha*0.7})`;
            ctx.fillRect(b.x+1,b.y+1,b.w-2,b.h-2);
            ctx.fillStyle = `rgba(70,100,50,${bushAlpha*0.5})`;
            const dotCount = Math.floor(b.w*b.h/18);
            for (let i=0; i<dotCount; i++) {
                const dx = 2+Math.random()*(b.w-4);
                const dy = 2+Math.random()*(b.h-4);
                ctx.fillRect(b.x+Math.floor(dx), b.y+Math.floor(dy), 2, 2);
            }
        }
        if (exitZone) {
            const ex=exitZone.x, ey=exitZone.y, ew=exitZone.w, eh=exitZone.h;
            const eg = 0.5 + Math.sin(globalTime*3)*0.35;
            ctx.fillStyle = `rgba(78,205,196,${0.25+eg*0.45})`;
            ctx.fillRect(ex-3, ey-3, ew+6, eh+6);
            ctx.fillStyle = '#3a8078';
            ctx.fillRect(ex,ey,ew,eh);
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(ex+1,ey+1,ew-2,eh-2);
            if (allItemsCollected()) {
                const ab = Math.sin(globalTime*5)*2;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(ex+ew/2-2, ey+eh/2-8+ab, 4, 8);
                ctx.fillRect(ex+ew/2-5, ey+eh/2-3+ab, 4, 3);
                ctx.fillRect(ex+ew/2+1, ey+eh/2-3+ab, 4, 3);
            }
        }
        for (const obs of obstacles) {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(obs.x+3, obs.y+3, obs.w, obs.h);
            ctx.fillStyle = obs.fill;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.fillStyle = obs.highlight;
            ctx.fillRect(obs.x, obs.y, obs.w, 3);
            ctx.fillRect(obs.x, obs.y, 3, obs.h);
            ctx.fillStyle = obs.accent;
            ctx.fillRect(obs.x+obs.w-4, obs.y+2, 3, obs.h-4);
            ctx.fillRect(obs.x+2, obs.y+obs.h-4, obs.w-4, 3);
            ctx.fillStyle = obs.shadow;
            ctx.fillRect(obs.x+2, obs.y+obs.h-2, obs.w-2, 2);
            ctx.fillRect(obs.x+obs.w-2, obs.y+2, 2, obs.h-2);
        }

        // Câmeras
        for (const cam of cameras) {
            const cx = cam.x, cy = cam.y;
            const range = cam.visionRange;
            const halfAngle = cam.visionAngle / 2;
            const currentAngle = cam.currentAngle;
            let coneColor;
            switch (cam.state) {
                case 'NORMAL': coneColor = 'rgba(50,200,50,0.25)'; break;
                case 'SUSPICIOUS': coneColor = 'rgba(255,200,50,0.35)'; break;
                case 'ALERT': coneColor = 'rgba(255,50,50,0.5)'; break;
                default: coneColor = 'rgba(50,200,50,0.25)';
            }
            ctx.fillStyle = coneColor;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            for (let i=0; i<=20; i++) {
                const a = currentAngle - halfAngle + halfAngle*2*(i/20);
                ctx.lineTo(cx + Math.cos(a)*range, cy + Math.sin(a)*range);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = cam.state === 'ALERT' ? '#ff3333' : cam.state === 'SUSPICIOUS' ? '#ffcc44' : '#66cc66';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(currentAngle - halfAngle)*range, cy + Math.sin(currentAngle - halfAngle)*range);
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(currentAngle + halfAngle)*range, cy + Math.sin(currentAngle + halfAngle)*range);
            ctx.stroke();
            ctx.fillStyle = '#444466';
            ctx.fillRect(cx-5, cy-5, 10, 10);
            ctx.fillStyle = '#666688';
            ctx.fillRect(cx-3, cy-3, 6, 6);
            ctx.fillStyle = '#8888aa';
            ctx.fillRect(cx-1, cy-4, 2, 8);
            ctx.fillStyle = cam.state === 'ALERT' ? '#ff0000' : cam.state === 'SUSPICIOUS' ? '#ffaa00' : '#00ff00';
            ctx.fillRect(cx-2, cy-6, 4, 2);
            ctx.strokeStyle = '#ffcc44';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(currentAngle)*12, cy + Math.sin(currentAngle)*12);
            ctx.stroke();
        }

        // Jogador
        if (player && gameState !== STATE.WIN) {
            const px = Math.floor(player.x), py = Math.floor(player.y);
            const hb = Math.sin(player.headBobPhase) * (player.isRunning ? 1.5 : 0.8);
            const pa = player.camouflaged ? 0.55 : 1.0;
            ctx.globalAlpha = pa;
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(px-player.w/2+2, py-player.h/2+2, player.w, player.h);
            ctx.fillStyle = '#d0d0e0';
            ctx.fillRect(px-player.w/2, py-player.h/2+hb, player.w, player.h);
            ctx.fillStyle = '#e0e0f0';
            ctx.fillRect(px-2, py-player.h/2-3+hb, 5, 4);
            ctx.fillStyle = '#0a0a18';
            ctx.fillRect(px+Math.cos(player.facingAngle), py-player.h/2-1+hb, 2, 2);
            if (player.isRunning && player.speed>20) {
                ctx.fillStyle = 'rgba(255,255,255,0.55)';
                ctx.fillRect(px-4, py+player.h/2+2, 8, 1);
            }
            ctx.globalAlpha = 1.0;
            for (const t of player.trailPositions) {
                ctx.fillStyle = `rgba(200,200,220,${t.life/0.2*0.25*pa})`;
                ctx.fillRect(Math.floor(t.x-2), Math.floor(t.y-2), 4, 4);
            }
            if (player.camouflaged) {
                ctx.fillStyle = 'rgba(100,180,100,0.4)';
                ctx.fillRect(px-7, py-8, 14, 16);
                ctx.font = '8px "Courier New", monospace';
                ctx.fillStyle = '#aaddaa';
                ctx.textAlign = 'center';
                ctx.fillText('OCULTO', px, py-10);
                ctx.textAlign = 'start';
            }
        }
        for (const it of items) {
            if (it.collected) continue;
            const ix=Math.floor(it.x), iy=Math.floor(it.y);
            const gs = it.size + Math.sin(it.glowPhase)*3;
            ctx.fillStyle = `rgba(255,215,0,${0.25+Math.sin(it.glowPhase)*0.18})`;
            ctx.fillRect(ix-gs, iy-gs, gs*2, gs*2);
            ctx.fillStyle = 'rgba(255,255,200,0.3)';
            ctx.fillRect(ix-gs/2, iy-gs/2, gs, gs);
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(ix-3, iy-3, 6, 6);
            ctx.fillStyle = '#fff8c0';
            ctx.fillRect(ix-1, iy-2, 3, 3);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(ix, iy-1, 1, 2);
        }

        // Guardas
        for (const guard of guards) {
            const gx=Math.floor(guard.x), gy=Math.floor(guard.y);
            let ca, cc;
            if (guard.stunnedTimer > 0) {
                ca = 0.4; cc = '200,200,50';
            } else {
                switch (guard.state) {
                    case 'chase': ca=0.5; cc='255,20,20'; break;
                    case 'investigate': ca=0.35; cc='255,100,50'; break;
                    case 'suspicious': ca=0.28; cc='255,140,60'; break;
                    case 'search': ca=0.25; cc='255,120,70'; break;
                    default: ca=0.2; cc='255,80,60';
                }
            }
            const ch = guard.visionAngle/2, cr = guard.visionRange;
            if (guard.stunnedTimer <= 0) {
                ctx.fillStyle = `rgba(${cc},${ca})`;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                for (let i=0; i<=14; i++) {
                    const a = guard.facingAngle - ch + ch*2*(i/14);
                    ctx.lineTo(gx + Math.cos(a)*cr, gy + Math.sin(a)*cr);
                }
                ctx.closePath(); ctx.fill();
                const ph = guard.peripheralAngle/2, pr = guard.visionRangePeripheral;
                ctx.fillStyle = `rgba(${cc},${ca*0.4})`;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                for (let i=0; i<=10; i++) {
                    const a = guard.facingAngle - ph + ph*2*(i/10);
                    ctx.lineTo(gx + Math.cos(a)*pr, gy + Math.sin(a)*pr);
                }
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = `rgba(${cc},${ca*1.2})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                ctx.lineTo(gx + Math.cos(guard.facingAngle - ch)*cr, gy + Math.sin(guard.facingAngle - ch)*cr);
                ctx.moveTo(gx, gy);
                ctx.lineTo(gx + Math.cos(guard.facingAngle + ch)*cr, gy + Math.sin(guard.facingAngle + ch)*cr);
                ctx.stroke();
            }
            ctx.lineWidth = 1;
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(gx-guard.w/2+1, gy-guard.h/2+1, guard.w, guard.h);
            const bc = guard.stunnedTimer > 0 ? '#cccc44' : { patrol: world.guardColorBase, suspicious:'#e05535', investigate:'#f06030', chase:'#ff2020', search:'#e84830' }[guard.state] || world.guardColorBase;
            ctx.fillStyle = bc;
            ctx.fillRect(gx-guard.w/2, gy-guard.h/2, guard.w, guard.h);
            ctx.fillStyle = guard.state==='chase' ? '#ff3333' : '#e04848';
            ctx.fillRect(gx-2, gy-guard.h/2-3, 5, 4);
            ctx.fillStyle = '#881818';
            ctx.fillRect(gx-3, gy-guard.h/2-5, 7, 2);
            ctx.fillStyle = '#ffff44';
            ctx.fillRect(gx+Math.cos(guard.facingAngle), gy-guard.h/2-1, 2, 2);
            if (guard.stunnedTimer > 0) {
                ctx.fillStyle = '#ffff88';
                ctx.font = 'bold 9px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Zzz', gx, gy-guard.h/2-9);
                ctx.textAlign = 'start';
            } else if (guard.state === 'suspicious') {
                ctx.fillStyle = '#ffcc66';
                ctx.font = 'bold 9px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('?', gx, gy-guard.h/2-9+Math.sin(globalTime*6));
                ctx.textAlign = 'start';
            } else if (guard.state === 'chase') {
                ctx.fillStyle = '#ff1111';
                ctx.font = 'bold 11px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('!', gx, gy-guard.h/2-11+Math.sin(globalTime*14)*2);
                ctx.textAlign = 'start';
            }
        }

        // Cães Robôs
        for (const dog of robotDogs) {
            const gx=Math.floor(dog.x), gy=Math.floor(dog.y);
            ctx.fillStyle = '#444';
            ctx.fillRect(gx-4, gy-3, 8, 6);
            ctx.fillStyle = '#555';
            ctx.fillRect(gx+2, gy-5, 6, 4);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(gx+4, gy-4, 2, 2);
            ctx.fillRect(gx+6, gy-4, 2, 2);
            ctx.fillStyle = '#333';
            ctx.fillRect(gx, gy-5, 2, 3);
            ctx.fillRect(gx+8, gy-5, 2, 3);
            ctx.fillStyle = '#666';
            ctx.fillRect(gx-5, gy+3, 2, 3);
            ctx.fillRect(gx+3, gy+3, 2, 3);
            if (dog.state === 'tracking' || dog.state === 'chase') {
                ctx.fillStyle = '#ffaa44';
                ctx.fillRect(gx-6, gy-2, 3, 4);
            } else {
                ctx.fillStyle = '#777';
                ctx.fillRect(gx-5, gy+1, 3, 3);
            }
            if (dog.state === 'chase') {
                ctx.fillStyle = 'rgba(255,0,0,0.4)';
                ctx.fillRect(gx-6, gy-6, 14, 10);
            }
        }

        // Corvos e rota
        renderCrows();
        renderCrowRoute();
        ScentSystem.render(ctx);

        for (const p of particles) {
            const a=p.alpha, sz=p.currentSize;
            if (p.color.startsWith('#')) {
                const r=parseInt(p.color.slice(1,3),16), g=parseInt(p.color.slice(3,5),16), b=parseInt(p.color.slice(5,7),16);
                ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
            } else ctx.fillStyle = p.color;
            ctx.fillRect(Math.floor(p.x-sz/2), Math.floor(p.y-sz/2), Math.ceil(sz), Math.ceil(sz));
        }
        if (detectionFlash > 0.01) {
            ctx.fillStyle = `rgba(255,20,20,${detectionFlash*0.55})`;
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        if (gameState === STATE.WIN && winTimer > 0) {
            ctx.fillStyle = `rgba(10,20,10,${Math.min(1,winTimer/0.4)*0.4})`;
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        if (gameState === STATE.CAUGHT && freezeTimer <= 0) {
            ctx.fillStyle = 'rgba(20,3,3,0.75)';
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        if (gameState === STATE.GAME_OVER) {
            ctx.fillStyle = 'rgba(10,0,0,0.8)';
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        if (gameState === STATE.WORLD_TRANSITION) {
            ctx.fillStyle = `rgba(0,0,0,${worldTransAlpha*0.7})`;
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        if (gameState === STATE.WORLD_SUMMARY) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,GAME_W,GAME_H);
        }

        // Main canvas
        mainCtx.clearRect(0,0,CANVAS_W,CANVAS_H);
        mainCtx.imageSmoothingEnabled = false;
        const vw = GAME_W / cameraZoom, vh = GAME_H / cameraZoom;
        const srcX = camera.x - vw/2, srcY = camera.y - vh/2;
        const sx = Math.max(0, Math.min(GAME_W-vw, srcX));
        const sy = Math.max(0, Math.min(GAME_H-vh, srcY));
        const sw = vw, sh = vh;
        mainCtx.drawImage(offscreen, Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh),
                          Math.round(screenShakeX), Math.round(screenShakeY), CANVAS_W, CANVAS_H);
        mainCtx.imageSmoothingEnabled = false;
        const vinhetaGrad = mainCtx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, CANVAS_W*0.3, CANVAS_W/2, CANVAS_H/2, CANVAS_W*0.75);
        vinhetaGrad.addColorStop(0, 'rgba(0,0,0,0)');
        vinhetaGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
        vinhetaGrad.addColorStop(1, 'rgba(4,4,20,0.55)');
        mainCtx.globalAlpha = 0.45;
        mainCtx.fillStyle = vinhetaGrad;
        mainCtx.fillRect(0,0,CANVAS_W,CANVAS_H);
        mainCtx.globalAlpha = 1.0;

        if (gameState === STATE.TITLE) renderTitleScreen();
        if (gameState === STATE.CAUGHT && freezeTimer <= 0) renderCaughtScreen();
        if (gameState === STATE.GAME_OVER) renderGameOverScreen();
        if (gameState === STATE.WIN && winTimer <= 0.7) renderWinScreen();
        if (gameState === STATE.WORLD_TRANSITION) renderWorldTransitionScreen();
        if (gameState === STATE.WORLD_SUMMARY) renderWorldSummaryScreen();
        if (gameState === STATE.PLAYING) {
            renderHUD();
            renderHotbar();
        }
        if (isMobile && gameState === STATE.PLAYING) renderMobileControls();
    }

    // ============================================================
    // RENDER DE OVERLAYS E UI
    // ============================================================
    function renderHotbar() {
        if (inventory.length === 0) {
            const y = CANVAS_H - 50;
            mainCtx.fillStyle = 'rgba(10,10,25,0.85)';
            mainCtx.fillRect(CANVAS_W/2 - 80, y - 8, 160, 40);
            mainCtx.strokeStyle = '#4a4a6a';
            mainCtx.lineWidth = 2;
            mainCtx.strokeRect(CANVAS_W/2 - 80, y - 8, 160, 40);
            mainCtx.fillStyle = '#888';
            mainCtx.font = '10px "Courier New", monospace';
            mainCtx.textAlign = 'center';
            mainCtx.textBaseline = 'middle';
            mainCtx.fillText('Nenhum item', CANVAS_W/2, y + 12);
            mainCtx.textAlign = 'left';
            mainCtx.textBaseline = 'top';
            return;
        }
        const slotWidth = 44;
        const slotHeight = 44;
        const gap = 6;
        const totalWidth = HOTBAR_SLOTS * (slotWidth + gap) - gap;
        const startX = (CANVAS_W - totalWidth) / 2;
        const y = CANVAS_H - 56;

        mainCtx.fillStyle = 'rgba(10,10,25,0.9)';
        mainCtx.fillRect(startX - 10, y - 8, totalWidth + 20, slotHeight + 16 + 16);
        mainCtx.strokeStyle = '#4a4a6a';
        mainCtx.lineWidth = 2;
        mainCtx.strokeRect(startX - 10, y - 8, totalWidth + 20, slotHeight + 16 + 16);

        for (let i = 0; i < HOTBAR_SLOTS; i++) {
            const x = startX + i * (slotWidth + gap);
            const hasItem = i < inventory.length;
            const isSelected = (i === selectedSlot && hasItem);

            mainCtx.fillStyle = isSelected ? 'rgba(255,215,0,0.3)' : 'rgba(0,0,0,0.6)';
            mainCtx.fillRect(x, y, slotWidth, slotHeight);
            mainCtx.strokeStyle = isSelected ? '#ffd700' : '#4a4a6a';
            mainCtx.lineWidth = isSelected ? 3 : 1;
            mainCtx.strokeRect(x, y, slotWidth, slotHeight);

            if (hasItem) {
                const item = inventory[i];
                mainCtx.fillStyle = '#8B7355';
                mainCtx.fillRect(x+6, y+6, slotWidth-12, slotHeight-12);
                mainCtx.fillStyle = '#A0522D';
                mainCtx.fillRect(x+10, y+10, slotWidth-20, slotHeight-20);
                mainCtx.strokeStyle = '#fff';
                mainCtx.lineWidth = 2;
                mainCtx.beginPath();
                mainCtx.moveTo(x+14, y+14);
                mainCtx.lineTo(x+slotWidth-14, y+slotHeight-14);
                mainCtx.moveTo(x+slotWidth-14, y+14);
                mainCtx.lineTo(x+14, y+slotHeight-14);
                mainCtx.stroke();

                const qty = item.quantity || 1;
                mainCtx.fillStyle = '#fff';
                mainCtx.font = 'bold 10px "Courier New", monospace';
                mainCtx.textAlign = 'right';
                mainCtx.textBaseline = 'bottom';
                mainCtx.fillText('x'+qty, x+slotWidth-4, y+slotHeight-2);
                mainCtx.textAlign = 'left';
                mainCtx.textBaseline = 'top';

                if (isSelected) {
                    mainCtx.fillStyle = '#ffd700';
                    mainCtx.font = '12px "Courier New", monospace';
                    mainCtx.textAlign = 'center';
                    mainCtx.fillText('▶', x+slotWidth/2, y-12);
                    mainCtx.textAlign = 'left';

                    mainCtx.fillStyle = '#ffd700';
                    mainCtx.font = '8px "Courier New", monospace';
                    mainCtx.textAlign = 'center';
                    const name = item.name.length > 12 ? item.name.substring(0, 10)+'…' : item.name;
                    mainCtx.fillText(name, x+slotWidth/2, y+slotHeight+2);
                    mainCtx.textAlign = 'left';
                }
            } else {
                mainCtx.fillStyle = '#333';
                mainCtx.font = '14px "Courier New", monospace';
                mainCtx.textAlign = 'center';
                mainCtx.textBaseline = 'middle';
                mainCtx.fillText('·', x+slotWidth/2, y+slotHeight/2);
                mainCtx.textAlign = 'left';
                mainCtx.textBaseline = 'top';
            }
        }

        if (selectedSlot < inventory.length) {
            const item = inventory[selectedSlot];
            if (item) {
                mainCtx.fillStyle = '#aaa';
                mainCtx.font = '8px "Courier New", monospace';
                mainCtx.textAlign = 'center';
                mainCtx.fillText('[F] Usar', CANVAS_W/2, y + slotHeight + 20);
                mainCtx.textAlign = 'left';
            }
        }
    }

    function renderHUD() {
        const world = getCurrentWorld();
        mainCtx.textAlign='left';
        mainCtx.fillStyle='#ffffff'; mainCtx.font='bold 9px "Courier New", monospace';
        mainCtx.fillText(world.name, 14, 16);
        mainCtx.fillStyle='#aaaacc'; mainCtx.font='8px "Courier New", monospace';
        mainCtx.fillText('FASE ' + currentPhaseInWorld + '/' + world.totalPhases, 14, 28);
        mainCtx.fillStyle='#ffd700'; mainCtx.font='8px "Courier New", monospace';
        mainCtx.fillText('PO: ' + playerCoins, 14, 38);
        mainCtx.fillStyle='#ff6666'; mainCtx.font='9px "Courier New", monospace';
        let hearts = '';
        for (let i=0; i<(MAX_LIVES + (permanentUpgrades ? permanentUpgrades.filter(u=>u==='lib_tome').length : 0)); i++) hearts += i < lives ? '♥' : '♡';
        mainCtx.fillText('VIDAS: ' + hearts, 14, 50);
        mainCtx.textAlign='right';
        const alertCam = cameras.some(c => c.state === 'ALERT');
        const suspiciousCam = cameras.some(c => c.state === 'SUSPICIOUS');
        if (alertCam) {
            mainCtx.fillStyle = '#ff3333';
            mainCtx.font = 'bold 8px "Courier New", monospace';
            mainCtx.fillText('⚠ CÂMERA ALERTA', CANVAS_W-14, 26);
        } else if (suspiciousCam) {
            mainCtx.fillStyle = '#ffaa33';
            mainCtx.font = 'bold 8px "Courier New", monospace';
            mainCtx.fillText('⚠ CÂMERA SUSPEITA', CANVAS_W-14, 26);
        }
        if (detectionMeter > 0.02) {
            const bw=60, bh=5, bx=CANVAS_W-18, by=40;
            mainCtx.fillStyle='rgba(0,0,0,0.6)';
            mainCtx.fillRect(bx-bw, by-1, bw+2, bh+2);
            const mc = detectionMeter>0.6 ? '#ff4444' : detectionMeter>0.3 ? '#ffaa33' : '#ffdd66';
            mainCtx.fillStyle = mc;
            mainCtx.fillRect(bx-bw, by, Math.floor(bw*detectionMeter), bh);
            mainCtx.fillStyle='#ffffff'; mainCtx.font='7px "Courier New", monospace';
            mainCtx.fillText('ALERTA', bx-bw-4, by+3);
        }
        const collected = items.filter(it=>it.collected).length;
        mainCtx.fillStyle = collected===items.length ? '#ffd700' : '#aaaacc';
        mainCtx.font='9px "Courier New", monospace';
        mainCtx.fillText('ITENS: ' + collected + '/' + items.length, CANVAS_W-14, 54);
        if (collected === items.length && items.length > 0) {
            mainCtx.fillStyle='#4ecdc4';
            mainCtx.fillText('VA PARA A SAÍDA!', CANVAS_W-14, 66);
        }
        if (player && player.camouflaged) {
            mainCtx.fillStyle='#88cc88'; mainCtx.font='bold 9px "Courier New", monospace';
            mainCtx.fillText('CAMUFLADO', CANVAS_W-14, 78);
        }
        mainCtx.textAlign='left';
        if (player && player.isRunning && player.speed > 20 && !player.camouflaged) {
            mainCtx.fillStyle=`rgba(255,180,60,${0.5+Math.sin(globalTime*10)*0.3})`;
            mainCtx.font='bold 9px "Courier New", monospace';
            mainCtx.fillText('⚠ BARULHO', 14, 62);
        }
        const chasingGuard = guards.find(g=>g.state==='chase');
        if (chasingGuard) {
            mainCtx.fillStyle='#ff3333'; mainCtx.font='bold 9px "Courier New", monospace';
            mainCtx.fillText('!! PERSEGUIÇÃO', 14, 74);
        } else if (guards.some(g=>g.state==='investigate')) {
            mainCtx.fillStyle='#ff8844'; mainCtx.font='bold 9px "Courier New", monospace';
            mainCtx.fillText('! INVESTIGANDO', 14, 74);
        }
        const chasingDog = robotDogs.find(d=>d.state==='chase');
        if (chasingDog) {
            mainCtx.fillStyle='#ff8844'; mainCtx.font='bold 9px "Courier New", monospace';
            mainCtx.fillText('🐕 PERSEGUIÇÃO', 14, 86);
        }
        mainCtx.textAlign='start';
    }

    function renderMobileControls() {
        mainCtx.globalAlpha = 0.25;
        mainCtx.fillStyle = '#ffffff';
        mainCtx.strokeStyle = '#ffffff';
        mainCtx.lineWidth = 2;
        mainCtx.beginPath();
        mainCtx.arc(joystickBaseX, joystickBaseY, joystickRadius, 0, Math.PI*2);
        mainCtx.stroke();
        mainCtx.globalAlpha = 0.35;
        mainCtx.beginPath();
        mainCtx.arc(joystickKnobX, joystickKnobY, 22, 0, Math.PI*2);
        mainCtx.fill();
        mainCtx.globalAlpha = 1.0;
        const rbx=runButtonX, rby=runButtonY;
        mainCtx.globalAlpha = runButtonActive ? 0.45 : 0.2;
        mainCtx.fillStyle = '#ffcc66';
        mainCtx.beginPath();
        mainCtx.arc(rbx, rby, runButtonRadius, 0, Math.PI*2);
        mainCtx.fill();
        mainCtx.globalAlpha = runButtonActive ? 0.7 : 0.35;
        mainCtx.strokeStyle = '#ffcc66';
        mainCtx.lineWidth = 2;
        mainCtx.beginPath();
        mainCtx.arc(rbx, rby, runButtonRadius, 0, Math.PI*2);
        mainCtx.stroke();
        mainCtx.fillStyle = '#ffffff';
        mainCtx.font = 'bold 14px "Courier New", monospace';
        mainCtx.textAlign = 'center';
        mainCtx.textBaseline = 'middle';
        mainCtx.fillText('RUN', rbx, rby);
        mainCtx.globalAlpha = 1.0;
    }

    function renderTitleScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        mainCtx.fillStyle='rgba(6,6,18,0.9)'; mainCtx.fillRect(0,0,CANVAS_W,CANVAS_H);
        mainCtx.fillStyle='#e8e8f8'; mainCtx.font='bold 28px "Courier New", monospace';
        mainCtx.fillText('STEALTH ROOM', cx, cy-45+Math.sin(titlePulse)*3);
        mainCtx.fillStyle='#8888aa'; mainCtx.font='11px "Courier New", monospace';
        mainCtx.fillText('UM JOGO DE FURTIVIDADE', cx, cy-8);
        mainCtx.fillText('5 MUNDOS • 25 FASES', cx, cy+8);
        mainCtx.fillStyle='#aaaacc'; mainCtx.font='10px "Courier New", monospace';
        mainCtx.fillText('WASD = MOVER     SHIFT = CORRER', cx, cy+30);
        mainCtx.fillText('COLETE TODOS OS ITENS E FUJA', cx, cy+46);
        mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 13px "Courier New", monospace';
        mainCtx.fillText('MOEDAS: '+playerCoins+' PO', cx, cy+64);
        if (Math.sin(titlePulse*1.4) > -0.2) {
            mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 14px "Courier New", monospace';
            mainCtx.fillText('PRESSIONE ESPAÇO', cx, cy+82);
        }
        mainCtx.fillStyle='#2d2d48'; mainCtx.fillRect(cx-80, cy+68, 160, 1);
    }

    function renderCaughtScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        if (lives > 0) {
            mainCtx.fillStyle='#ff4444'; mainCtx.font='bold 20px "Courier New", monospace';
            mainCtx.fillText('CAPTURADO!', cx, cy-18);
            mainCtx.fillStyle='#ffaa66'; mainCtx.font='13px "Courier New", monospace';
            mainCtx.fillText('1 VIDA PERDIDA', cx, cy+4);
            mainCtx.fillStyle='#cc8888'; mainCtx.font='10px "Courier New", monospace';
            mainCtx.fillText('VIDAS RESTANTES: ' + '♥'.repeat(lives), cx, cy+22);
            if (Math.sin(globalTime*3) > -0.3) mainCtx.fillText('ESPAÇO OU R = CONTINUAR', cx, cy+40);
        } else {
            mainCtx.fillStyle='#ff2222'; mainCtx.font='bold 24px "Courier New", monospace';
            mainCtx.fillText('GAME OVER', cx, cy-10);
            if (Math.sin(globalTime*3) > -0.3) mainCtx.fillText('ESPAÇO OU R = RECOMEÇAR', cx, cy+20);
        }
    }

    function renderGameOverScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        mainCtx.fillStyle='#ff0000'; mainCtx.font='bold 28px "Courier New", monospace';
        mainCtx.fillText('GAME OVER', cx, cy-15);
        mainCtx.fillStyle='#cc8888'; mainCtx.font='11px "Courier New", monospace';
        mainCtx.fillText('TODAS AS VIDAS SE ESGOTARAM', cx, cy+10);
        mainCtx.fillStyle='#ffd700'; mainCtx.font='10px "Courier New", monospace';
        mainCtx.fillText('MOEDAS MANTIDAS: ' + playerCoins + ' PO', cx, cy+26);
        if (Math.sin(globalTime*3) > -0.3) mainCtx.fillText('ESPAÇO OU R = RECOMEÇAR JORNADA', cx, cy+44);
    }

    function renderWinScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        const world = getCurrentWorld();
        mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 18px "Courier New", monospace';
        mainCtx.fillText('FASE ' + currentPhaseInWorld + '/' + world.totalPhases + ' CONCLUÍDA!', cx, cy-6);
        mainCtx.fillStyle='#aaccaa'; mainCtx.font='10px "Courier New", monospace';
        if (Math.sin(globalTime*3) > -0.3) mainCtx.fillText('ESPAÇO OU R = PRÓXIMA FASE', cx, cy+18);
    }

    function renderWorldSummaryScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        const rew = calculateWorldReward();
        const world = getCurrentWorld();
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        mainCtx.fillStyle='rgba(0,0,0,0.75)'; mainCtx.fillRect(0,0,CANVAS_W,CANVAS_H);
        mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 16px "Courier New", monospace';
        mainCtx.fillText('MUNDO CONCLUÍDO!', cx, cy-55);
        mainCtx.fillStyle='#ffffff'; mainCtx.font='bold 13px "Courier New", monospace';
        mainCtx.fillText(world.name, cx, cy-35);
        mainCtx.fillStyle='#cccccc'; mainCtx.font='10px "Courier New", monospace';
        mainCtx.fillText('Itens coletados: ' + rew.totalItems, cx, cy-15);
        mainCtx.fillText('Bônus furtividade: ' + rew.stealthBonus + ' PO', cx, cy);
        mainCtx.fillText('Recompensa base: ' + world.baseReward + ' PO', cx, cy+15);
        mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 14px "Courier New", monospace';
        mainCtx.fillText('TOTAL: +' + rew.reward + ' PO', cx, cy+38);
        mainCtx.fillStyle='#aaaacc'; mainCtx.font='9px "Courier New", monospace';
        mainCtx.fillText('Saldo: ' + playerCoins + ' PO', cx, cy+55);
        if (worldSummaryTimer > 1.0) {
            mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 10px "Courier New", monospace';
            mainCtx.fillText('ABRINDO LOJA EM BREVE...', cx, cy+72);
        } else {
            mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 10px "Courier New", monospace';
            mainCtx.fillText('ABRINDO LOJA...', cx, cy+72);
        }
    }

    function renderWorldTransitionScreen() {
        const cx=CANVAS_W/2, cy=CANVAS_H/2;
        mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
        const nextWorld = WORLDS[Math.min(currentWorldIndex+1, WORLDS.length-1)];
        mainCtx.fillStyle=`rgba(0,0,0,${worldTransAlpha})`;
        mainCtx.fillRect(0,0,CANVAS_W,CANVAS_H);
        if (worldTransAlpha > 0.4) {
            mainCtx.fillStyle='#ffd700'; mainCtx.font='bold 16px "Courier New", monospace';
            mainCtx.fillText('NOVO MUNDO DESBLOQUEADO!', cx, cy-20);
            mainCtx.fillStyle='#ffffff'; mainCtx.font='bold 20px "Courier New", monospace';
            mainCtx.fillText(nextWorld.name, cx, cy+8);
            mainCtx.fillStyle='#aaaacc'; mainCtx.font='12px "Courier New", monospace';
            mainCtx.fillText(nextWorld.subtitle, cx, cy+30);
            mainCtx.fillStyle='#88cc88'; mainCtx.font='10px "Courier New", monospace';
            mainCtx.fillText('VIDAS RESTAURADAS', cx, cy+48);
        }
    }

    // ============================================================
    // INPUT
    // ============================================================
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') shiftDown = true;

        if (crowProgramming.active) {
            if (e.code === 'Enter' || e.code === 'Space') {
                e.preventDefault();
                launchCrow();
                return;
            }
            if (e.code === 'Escape') {
                e.preventDefault();
                cancelCrowProgramming();
                return;
            }
            return;
        }

        if (e.code === 'Space') {
            spacePressed = true;
            audioEngine.init(); audioEngine.resume();
            if (gameState === STATE.TITLE) restartGame();
            else if (gameState === STATE.CAUGHT && freezeTimer <= 0) {}
            else if (gameState === STATE.GAME_OVER && gameOverTimer <= 0) restartGame();
            else if (gameState === STATE.WIN && winTimer <= 0.3) nextPhase();
            else if (gameState === STATE.WORLD_SUMMARY && worldSummaryTimer > 0.5) { openShopForWorld(); worldSummaryTimer=0; }
            e.preventDefault();
        }
        if (e.code === 'KeyR') { rPressed=true; audioEngine.init(); audioEngine.resume(); }
        if (['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
            audioEngine.init(); audioEngine.resume();
            if (gameState === STATE.TITLE) restartGame();
        }

        if (gameState === STATE.PLAYING) {
            if (e.code === 'Digit1') { e.preventDefault(); selectedSlot = 0; }
            if (e.code === 'Digit2') { e.preventDefault(); selectedSlot = 1; }
            if (e.code === 'Digit3') { e.preventDefault(); selectedSlot = 2; }
            if (e.code === 'Digit4') { e.preventDefault(); selectedSlot = 3; }
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);

            if (e.code === 'KeyF') {
                e.preventDefault();
                if (!crowProgramming.active) {
                    useSelectedItem();
                }
            }
        }
        if (gameState === STATE.INTRO || gameState === STATE.SHOP) return;
    });

    window.addEventListener('keyup', (e) => { keys[e.code] = false; if (e.code==='ShiftLeft'||e.code==='ShiftRight') shiftDown=false; });

    canvas.addEventListener('mousedown', (e) => {
        if (!crowProgramming.active) return;
        const coords = getCanvasCoordsFromPointer(e.clientX, e.clientY);
        addCrowPoint(coords.x, coords.y);
        crowProgramming.isDrawing = true;
        crowProgramming.currentMousePos = { x: coords.x, y: coords.y };
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!crowProgramming.active) {
            crowProgramming.currentMousePos = null;
            return;
        }
        const coords = getCanvasCoordsFromPointer(e.clientX, e.clientY);
        crowProgramming.currentMousePos = { x: coords.x, y: coords.y };
        if (crowProgramming.isDrawing) {
            addCrowPoint(coords.x, coords.y);
        }
    });

    canvas.addEventListener('mouseup', () => { crowProgramming.isDrawing = false; });
    canvas.addEventListener('mouseleave', () => {
        crowProgramming.isDrawing = false;
        crowProgramming.currentMousePos = null;
    });

    canvas.addEventListener('touchstart', (e) => {
        if (!crowProgramming.active) return;
        e.preventDefault();
        for (const touch of e.changedTouches) {
            const coords = getCanvasCoords(touch);
            addCrowPoint(coords.x, coords.y);
            crowProgramming.currentMousePos = { x: coords.x, y: coords.y };
        }
        crowProgramming.isDrawing = true;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (!crowProgramming.active || !crowProgramming.isDrawing) return;
        e.preventDefault();
        for (const touch of e.changedTouches) {
            const coords = getCanvasCoords(touch);
            addCrowPoint(coords.x, coords.y);
            crowProgramming.currentMousePos = { x: coords.x, y: coords.y };
        }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
        crowProgramming.isDrawing = false;
        crowProgramming.currentMousePos = null;
    });

    canvas.addEventListener('touchcancel', () => {
        crowProgramming.isDrawing = false;
        crowProgramming.currentMousePos = null;
    });

    canvas.addEventListener('click', ()=>{
        audioEngine.init(); audioEngine.resume();
        if (gameState === STATE.TITLE) restartGame();
        else if (gameState === STATE.CAUGHT && freezeTimer <= 0) {}
        else if (gameState === STATE.GAME_OVER && gameOverTimer <= 0) restartGame();
        else if (gameState === STATE.WIN && winTimer <= 0.3) nextPhase();
        else if (gameState === STATE.INTRO) {}
        else if (gameState === STATE.WORLD_SUMMARY && worldSummaryTimer > 0.5) { openShopForWorld(); worldSummaryTimer=0; }
    });

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    function init() {
        visitedWorlds.clear();
        phaseBestCollections = [0,0,0,0,0];
        worldDetectionSum = 0; totalItemsCollectedThisWorld = 0;
        const loaded = loadGameState();
        if (!loaded) {
            currentWorldIndex = 0; currentPhaseInWorld = 1;
            lives = MAX_LIVES; playerCoins = 0;
            inventory = []; equippedItems = []; permanentUpgrades = [];
            visitedWorlds.clear();
        }
        generateRoom(currentWorldIndex, currentPhaseInWorld);
        camera.x = player ? player.x : GAME_W/2;
        camera.y = player ? player.y : GAME_H/2;
        cameraZoom = 1.0;
        targetZoom = 1.5;
        gameState = STATE.TITLE;
        detectionMeter = 0; detectionFlash = 0;
        freezeTimer = 0; winTimer = 0;
        worldTransTimer = 0; worldTransAlpha = 0;
        gameOverTimer = 0; worldSummaryTimer = 0;
        shakeIntensity = 0; shakeDuration = 0;
        screenShakeX = 0; screenShakeY = 0;
        particles.length = 0;
        joystickActive = false; joystickId = null;
        joystickAxisX = 0; joystickAxisY = 0;
        selectedSlot = 0;
        lastTime = performance.now();
        frameAccum = 0;
        resizeCanvas();
        document.getElementById('shop-overlay').classList.remove('active');
        canvas.classList.remove('shop-active');
        updateShopScale();
        SecurityAlertSystem.reset();
        cancelCrowProgramming();
        crows = [];
        // Audio já iniciado
        console.log('%c🎧 STEALTH ROOM v5.0 — Sistema Sonoro Completo Carregado!', 'color:#ffd700;font-size:16px;font-family:monospace;');
    }

    // ============================================================
    // LOOP PRINCIPAL
    // ============================================================
    function gameLoop(timestamp) {
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.2) dt = 0.2;
        if (dt <= 0) dt = fixedStep;
        frameAccum += dt;
        let updates = 0;
        while (frameAccum >= fixedStep && updates < 5) {
            update(fixedStep);
            frameAccum -= fixedStep;
            updates++;
        }
        if (updates === 0 && frameAccum > 0) { update(frameAccum); frameAccum = 0; }
        render();
        requestAnimationFrame(gameLoop);
    }

    init();
    requestAnimationFrame(gameLoop);
})();
</script>
