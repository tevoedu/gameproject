<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEALTH ROOM</title>
    <style>
        :root {
            --bg: #06060f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            cursor: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #1a1a35;
            box-shadow: 0 0 80px rgba(70, 50, 130, 0.3), 0 0 150px rgba(20, 10, 50, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            border-radius: 3px;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            // ============================================================
            // STEALTH ROOM v2.0 — IA REFINADA + PROGRESSÃO POR FASES
            // ============================================================
            const GAME_W = 320;
            const GAME_H = 240;
            const SCALE = 2;
            const CANVAS_W = GAME_W * SCALE;
            const CANVAS_H = GAME_H * SCALE;
            const TILE = 8;

            const canvas = document.getElementById('game');
            canvas.width = CANVAS_W;
            canvas.height = CANVAS_H;
            const mainCtx = canvas.getContext('2d');
            mainCtx.imageSmoothingEnabled = false;

            const offscreen = document.createElement('canvas');
            offscreen.width = GAME_W;
            offscreen.height = GAME_H;
            const ctx = offscreen.getContext('2d');
            ctx.imageSmoothingEnabled = false;

            // ============================================================
            // AUDIO ENGINE
            // ============================================================
            class AudioEngine {
                constructor() {
                    this.ctx = null;
                    this.initialized = false;
                    this.masterGain = null;
                    this.noiseBuffer = null;
                }
                init() {
                    if (this.initialized) return;
                    try {
                        this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                        this.masterGain = this.ctx.createGain();
                        this.masterGain.gain.value = 0.38;
                        this.masterGain.connect(this.ctx.destination);
                        this._buildNoiseBuffer();
                        this.initialized = true;
                    } catch (e) {}
                }
                resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
                _buildNoiseBuffer() {
                    const len = this.ctx.sampleRate * 0.5;
                    this.noiseBuffer = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
                    const data = this.noiseBuffer.getChannelData(0);
                    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
                }
                play(freq, type, duration, vol = 0.3, glideTo = null, delay = 0) {
                    if (!this.initialized || !this.ctx) return;
                    this.resume();
                    const t = this.ctx.currentTime + delay;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(Math.max(20, freq), t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(Math.max(20, glideTo), t + duration);
                    gain.gain.setValueAtTime(Math.min(0.6, vol * 0.5), t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t);
                    osc.stop(t + duration + 0.01);
                }
                playNoise(duration, vol = 0.08, band = 'all') {
                    if (!this.initialized || !this.ctx || !this.noiseBuffer) return;
                    this.resume();
                    const t = this.ctx.currentTime;
                    const source = this.ctx.createBufferSource();
                    source.buffer = this.noiseBuffer;
                    const filter = this.ctx.createBiquadFilter();
                    if (band === 'low') { filter.type = 'lowpass';
                        filter.frequency.value = 400; } else if (band === 'high') { filter.type = 'highpass';
                        filter.frequency.value = 1200; } else { filter.type = 'bandpass';
                        filter.frequency.value = 800; }
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);
                    source.start(t);
                    source.stop(t + duration);
                }
                footstep(isRunning = false) {
                    const f = isRunning ? 120 : 70,
                        v = isRunning ? 0.32 : 0.14,
                        d = isRunning ? 0.05 : 0.07;
                    this.play(f, 'triangle', d, v);
                    this.playNoise(d * 1.5, v * 0.25, 'high');
                    if (isRunning) this.play(f * 2.1, 'square', d * 0.4, v * 0.3);
                }
                suspiciousSound() { this.play(260, 'sine', 0.2, 0.25, 340);
                    this.play(180, 'triangle', 0.25, 0.18); }
                alertSound() { this.play(400, 'sawtooth', 0.22, 0.45, 600);
                    this.play(350, 'square', 0.26, 0.3);
                    this.playNoise(0.15, 0.1, 'all'); }
                chaseSound() { this.play(500, 'sawtooth', 0.3, 0.5, 700);
                    this.play(420, 'square', 0.35, 0.4);
                    this.playNoise(0.2, 0.18, 'all'); }
                caughtSound() {
                    this.play(200, 'sawtooth', 0.5, 0.55, 50);
                    this.play(100, 'square', 0.6, 0.4, 25);
                    this.playNoise(0.45, 0.3, 'low');
                }
                victorySound() {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        this.play(f, 'triangle', 0.18, 0.42, f * 1.02, i * 0.08);
                        this.play(f * 1.01, 'sine', 0.1, 0.2, null, i * 0.08 + 0.02);
                    });
                }
                pickupSound() {
                    this.play(880, 'triangle', 0.1, 0.42, 1320);
                    this.play(1320, 'triangle', 0.12, 0.38, 1760);
                    this.play(1760, 'square', 0.07, 0.2);
                }
                phaseCompleteSound() {
                    [660, 880, 1100, 1320].forEach((f, i) => {
                        this.play(f, 'triangle', 0.15, 0.4, f * 1.03, i * 0.1);
                    });
                }
            }
            const audio = new AudioEngine();

            // ============================================================
            // PARTICLE SYSTEM
            // ============================================================
            class Particle {
                constructor(x, y, vx, vy, life, color, size = 1, gravity = 0) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.life = life;
                    this.maxLife = life;
                    this.color = color;
                    this.size = size;
                    this.gravity = gravity;
                    this.alive = true;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += this.gravity * dt;
                    this.life -= dt;
                    if (this.life <= 0) this.alive = false;
                }
                get alpha() { return Math.max(0, Math.pow(this.life / this.maxLife, 1.5)); }
                get currentSize() { return this.size * (0.5 + 0.5 * (this.life / this.maxLife)); }
            }
            const particles = [];

            function spawnParticles(x, y, count, color, speed = 30, life = 0.4, size = 1, gravity = 0) {
                for (let i = 0; i < count; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = speed * (0.3 + Math.random() * 0.7);
                    particles.push(new Particle(x, y, Math.cos(a) * s, Math.sin(a) * s, life * (0.5 + Math.random() * 0.5),
                        color, size, gravity));
                }
            }

            // ============================================================
            // GAME STATE
            // ============================================================
            const STATE = { TITLE: 'title', PLAYING: 'playing', CAUGHT: 'caught', WIN: 'win' };
            let gameState = STATE.TITLE;
            let currentPhase = 1;
            let detectionMeter = 0;
            let detectionFlash = 0;
            let screenShakeX = 0,
                screenShakeY = 0;
            let shakeIntensity = 0,
                shakeDuration = 0;
            let globalTime = 0;
            let freezeTimer = 0;
            let winTimer = 0;
            let titlePulse = 0;
            let caughtTimer = 0;

            let player = null;
            let guards = [];
            let obstacles = [];
            let items = [];
            let exitZone = null;
            let roomWalls = null;

            const keys = {};
            let shiftDown = false;
            let spacePressed = false;
            let rPressed = false;

            // ============================================================
            // NAVIGATION GRID (para pathfinding dos guardas)
            // ============================================================
            const NAV_CELL = 12;
            const NAV_COLS = Math.floor(GAME_W / NAV_CELL);
            const NAV_ROWS = Math.floor(GAME_H / NAV_CELL);
            let navGrid = [];
            let navGridDirty = true;

            function buildNavGrid() {
                navGrid = [];
                const blockers = getAllBlockers();
                for (let row = 0; row < NAV_ROWS; row++) {
                    navGrid[row] = [];
                    for (let col = 0; col < NAV_COLS; col++) {
                        const cx = col * NAV_CELL + NAV_CELL / 2;
                        const cy = row * NAV_CELL + NAV_CELL / 2;
                        let blocked = false;
                        for (const b of blockers) {
                            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
                                blocked = true;
                                break;
                            }
                        }
                        navGrid[row][col] = blocked ? 1 : 0;
                    }
                }
                navGridDirty = false;
            }

            function worldToNav(wx, wy) {
                const col = Math.floor(wx / NAV_CELL);
                const row = Math.floor(wy / NAV_CELL);
                return {
                    col: Math.max(0, Math.min(NAV_COLS - 1, col)),
                    row: Math.max(0, Math.min(NAV_ROWS - 1, row))
                };
            }

            function navToWorld(col, row) {
                return { x: col * NAV_CELL + NAV_CELL / 2, y: row * NAV_CELL + NAV_CELL / 2 };
            }

            function findPath(startWX, startWY, endWX, endWY) {
                if (navGridDirty) buildNavGrid();
                const start = worldToNav(startWX, startWY);
                const end = worldToNav(endWX, endWY);
                if (start.col === end.col && start.row === end.row) return [navToWorld(end.col, end.row)];
                if (navGrid[end.row] && navGrid[end.row][end.col] === 1) {
                    const nearest = findNearestFree(end.col, end.row);
                    if (!nearest) return null;
                    end.col = nearest.col;
                    end.row = nearest.row;
                }
                if (navGrid[start.row] && navGrid[start.row][start.col] === 1) {
                    const nearest = findNearestFree(start.col, start.row);
                    if (!nearest) return null;
                    start.col = nearest.col;
                    start.row = nearest.row;
                }
                const visited = new Array(NAV_ROWS).fill(null).map(() => new Array(NAV_COLS).fill(false));
                const parent = new Array(NAV_ROWS).fill(null).map(() => new Array(NAV_COLS).fill(null));
                const queue = [{ col: start.col, row: start.row }];
                visited[start.row][start.col] = true;
                const dirs = [
                    { dc: 0, dr: -1 }, { dc: 1, dr: 0 }, { dc: 0, dr: 1 }, { dc: -1, dr: 0 },
                    { dc: 1, dr: -1 }, { dc: 1, dr: 1 }, { dc: -1, dr: 1 }, { dc: -1, dr: -1 }
                ];
                let found = false;
                while (queue.length > 0 && !found) {
                    const cur = queue.shift();
                    for (const d of dirs) {
                        const nc = cur.col + d.dc;
                        const nr = cur.row + d.dr;
                        if (nc >= 0 && nc < NAV_COLS && nr >= 0 && nr < NAV_ROWS && !visited[nr][nc] && navGrid[nr][nc] ===
                            0) {
                            visited[nr][nc] = true;
                            parent[nr][nc] = cur;
                            queue.push({ col: nc, row: nr });
                            if (nc === end.col && nr === end.row) { found = true; break; }
                        }
                    }
                }
                if (!found) return null;
                const path = [];
                let cur = { col: end.col, row: end.row };
                while (cur) {
                    path.unshift(navToWorld(cur.col, cur.row));
                    cur = parent[cur.row][cur.col];
                }
                if (path.length <= 1) return [navToWorld(end.col, end.row)];
                const simplified = [path[0]];
                for (let i = 1; i < path.length - 1; i++) {
                    const prev = simplified[simplified.length - 1];
                    const dx1 = path[i].x - prev.x;
                    const dy1 = path[i].y - prev.y;
                    const dx2 = path[i + 1].x - path[i].x;
                    const dy2 = path[i + 1].y - path[i].y;
                    if (Math.abs(dx1 - dx2) > 1 || Math.abs(dy1 - dy2) > 1) simplified.push(path[i]);
                }
                simplified.push(path[path.length - 1]);
                return simplified;
            }

            function findNearestFree(col, row) {
                for (let r = 1; r < 8; r++) {
                    for (let dc = -r; dc <= r; dc++) {
                        for (let dr = -r; dr <= r; dr++) {
                            if (Math.abs(dc) !== r && Math.abs(dr) !== r) continue;
                            const nc = col + dc,
                                nr = row + dr;
                            if (nc >= 0 && nc < NAV_COLS && nr >= 0 && nr < NAV_ROWS && navGrid[nr][nc] === 0)
                                return { col: nc, row: nr };
                        }
                    }
                }
                return null;
            }

            // ============================================================
            // ENTITY FACTORIES
            // ============================================================
            function createPlayer(x, y) {
                return {
                    x,
                    y,
                    w: 6,
                    h: 9,
                    vx: 0,
                    vy: 0,
                    speed: 0,
                    targetSpeed: 0,
                    facingAngle: 0,
                    isRunning: false,
                    footstepTimer: 0.1,
                    footstepInterval: 0.4,
                    runFootstepInterval: 0.22,
                    noiseRadius: 25,
                    runNoiseRadius: 72,
                    trailPositions: [],
                    residualVx: 0,
                    residualVy: 0,
                    headBobPhase: 0,
                    hitboxScale: 0.85
                };
            }

            function createGuard(x, y, patrolPath) {
                return {
                    x,
                    y,
                    w: 7,
                    h: 10,
                    speed: 34,
                    investigateSpeed: 55,
                    chaseSpeed: 72,
                    state: 'patrol',
                    patrolPath,
                    patrolIndex: 0,
                    patrolWaitTimer: 0.4,
                    facingAngle: 0,
                    targetAngle: 0,
                    visionRange: 100,
                    visionRangePeripheral: 65,
                    visionAngle: Math.PI / 3.2,
                    peripheralAngle: Math.PI / 2.1,
                    investigationTarget: null,
                    investigationTimer: 0,
                    investigationMax: 3.0,
                    lookSweepTimer: 0,
                    lookSweepOffset: 0,
                    detectionCooldown: 0,
                    microHesitation: 0,
                    patrolVariance: Math.random() * 0.4,
                    searchTimer: 0,
                    searchMax: 4.0,
                    chaseTimer: 0,
                    lastKnownPlayerPos: null,
                    idleLookTimer: 0,
                    idleLookTarget: 0,
                    currentPath: null,
                    pathTarget: null,
                    pathRecalcTimer: 0,
                    stuckTimer: 0,
                    stuckCheckPos: null,
                };
            }

            function createObstacle(x, y, w, h, type = 'crate') {
                const palettes = {
                    crate: { fill: '#3a3a58', highlight: '#4a4a6e', shadow: '#252540', accent: '#555570' },
                    table: { fill: '#4a4038', highlight: '#5c5046', shadow: '#302820', accent: '#6b5a4a' },
                    pillar: { fill: '#48485a', highlight: '#56566c', shadow: '#2e2e3e', accent: '#606076' },
                    shelf: { fill: '#3d3848', highlight: '#4e495a', shadow: '#282435', accent: '#5a5568' },
                    wall_seg: { fill: '#2a2a40', highlight: '#353550', shadow: '#1a1a28', accent: '#3e3e55' },
                };
                const p = palettes[type] || palettes['crate'];
                return { x, y, w, h, type, ...p };
            }

            // ============================================================
            // UTILIDADES
            // ============================================================
            function randomRange(min, max) { return min + Math.random() * (max - min); }

            function randomInt(min, max) { return Math.floor(randomRange(min, max + 1)); }

            function rectsOverlap(a, b, margin = 0) {
                return !(a.x + a.w + margin <= b.x || b.x + b.w + margin <= a.x || a.y + a.h + margin <= b.y || b.y + b.h +
                    margin <= a.y);
            }

            function pointInRect(px, py, rect, margin = 0) {
                return px >= rect.x - margin && px <= rect.x + rect.w + margin && py >= rect.y - margin && py <= rect.y + rect
                    .h + margin;
            }

            function distBetween(a, b) {
                const ax = a.x + (a.w || 0) / 2;
                const ay = a.y + (a.h || 0) / 2;
                const bx = b.x + (b.w || 0) / 2;
                const by = b.y + (b.h || 0) / 2;
                return Math.hypot(ax - bx, ay - by);
            }

            function entitiesOverlap(a, b) {
                const aw = (a.w || 6) * (a.hitboxScale || 1);
                const ah = (a.h || 9) * (a.hitboxScale || 1);
                const bw = (b.w || 7) * (b.hitboxScale || 1);
                const bh = (b.h || 10) * (b.hitboxScale || 1);
                return Math.abs(a.x - b.x) < (aw + bw) / 2 && Math.abs(a.y - b.y) < (ah + bh) / 2;
            }

            // ============================================================
            // PROCEDURAL ROOM GENERATION — COM PROGRESSÃO DE FASES
            // ============================================================
            function getAllBlockers() {
                const blockers = [...obstacles];
                blockers.push({ x: roomWalls.left.x, y: roomWalls.left.y, w: roomWalls.left.w, h: roomWalls.left.h },
                    { x: roomWalls.right.x, y: roomWalls.right.y, w: roomWalls.right.w, h: roomWalls.right.h },
                    { x: roomWalls.top.x, y: roomWalls.top.y, w: roomWalls.top.w, h: roomWalls.top.h },
                    { x: roomWalls.bottom.x, y: roomWalls.bottom.y, w: roomWalls.bottom.w, h: roomWalls.bottom.h });
                return blockers;
            }

            function generateRoom(phase = 1) {
                const rng = Math.random;
                const wallThickness = 10;
                roomWalls = {
                    left: { x: 0, y: 0, w: wallThickness, h: GAME_H },
                    right: { x: GAME_W - wallThickness, y: 0, w: wallThickness, h: GAME_H },
                    top: { x: 0, y: 0, w: GAME_W, h: wallThickness },
                    bottom: { x: 0, y: GAME_H - wallThickness, w: GAME_W, h: wallThickness },
                };
                const wallRects = [roomWalls.left, roomWalls.right, roomWalls.top, roomWalls.bottom];
                const interiorX = wallThickness + 5;
                const interiorY = wallThickness + 5;
                const interiorW = GAME_W - wallThickness * 2 - 10;
                const interiorH = GAME_H - wallThickness * 2 - 10;

                const phaseDifficulty = Math.min(10, phase);
                const numGuards = phaseDifficulty <= 2 ? 1 : phaseDifficulty <= 4 ? 2 : phaseDifficulty <= 7 ? 2 + Math.floor((
                    phaseDifficulty - 4) / 2) : 3 + Math.floor((phaseDifficulty - 7) / 2);
                const numItems = Math.min(5, 1 + Math.floor((phaseDifficulty - 1) / 2));
                const obstacleDensity = 0.25 + phaseDifficulty * 0.04;
                const mapComplexity = Math.min(1, 0.3 + phaseDifficulty * 0.08);

                // Obstáculos — clusters + paredes internas
                obstacles = [];
                const obsTypes = ['crate', 'crate', 'crate', 'table', 'pillar', 'shelf'];
                const placedObs = [];
                const numClusters = randomInt(2 + Math.floor(mapComplexity * 3), 4 + Math.floor(mapComplexity * 4));
                const targetObsCount = Math.floor((interiorW * interiorH) / 1800 * obstacleDensity * 8);

                for (let c = 0; c < numClusters; c++) {
                    const clusterX = interiorX + rng() * interiorW;
                    const clusterY = interiorY + rng() * interiorH;
                    const clusterSize = randomInt(1, 3 + Math.floor(mapComplexity * 2));
                    for (let i = 0; i < clusterSize; i++) {
                        const type = obsTypes[randomInt(0, obsTypes.length - 1)];
                        const ow = randomInt(12, 34);
                        const oh = randomInt(8, 24);
                        const angle = rng() * Math.PI * 2;
                        const dist = rng() * 50;
                        const ox = clusterX + Math.cos(angle) * dist - ow / 2;
                        const oy = clusterY + Math.sin(angle) * dist - oh / 2;
                        const cand = createObstacle(
                            Math.floor(Math.max(interiorX, Math.min(interiorX + interiorW - ow, ox))),
                            Math.floor(Math.max(interiorY, Math.min(interiorY + interiorH - oh, oy))),
                            ow, oh, type
                        );
                        let valid = true;
                        for (const w of wallRects) { if (rectsOverlap(cand, w, 4)) { valid = false; break; } }
                        if (!valid) continue;
                        let tooClose = false;
                        for (const o of placedObs) { if (rectsOverlap(cand, o, 6)) { tooClose = true; break; } }
                        if (tooClose) continue;
                        placedObs.push(cand);
                    }
                }
                // Obstáculos extras
                while (placedObs.length < targetObsCount && placedObs.length < 25) {
                    const type = obsTypes[randomInt(0, obsTypes.length - 1)];
                    const ow = randomInt(10, 28);
                    const oh = randomInt(6, 20);
                    const ox = interiorX + rng() * (interiorW - ow);
                    const oy = interiorY + rng() * (interiorH - oh);
                    const cand = createObstacle(Math.floor(ox), Math.floor(oy), ow, oh, type);
                    let valid = true;
                    for (const w of wallRects) { if (rectsOverlap(cand, w, 4)) { valid = false; break; } }
                    if (!valid) continue;
                    let tooClose = false;
                    for (const o of placedObs) { if (rectsOverlap(cand, o, 9)) { tooClose = true; break; } }
                    if (tooClose) continue;
                    placedObs.push(cand);
                }
                // Paredes internas para fases avançadas
                if (phaseDifficulty >= 3) {
                    const numWalls = randomInt(0, Math.floor(mapComplexity * 3));
                    for (let i = 0; i < numWalls; i++) {
                        const horizontal = rng() > 0.5;
                        const ww = horizontal ? randomInt(20, 60) : 6;
                        const wh = horizontal ? 6 : randomInt(20, 50);
                        const wx = interiorX + rng() * (interiorW - ww);
                        const wy = interiorY + rng() * (interiorH - wh);
                        const cand = createObstacle(Math.floor(wx), Math.floor(wy), ww, wh, 'wall_seg');
                        let valid = true;
                        for (const w of wallRects) { if (rectsOverlap(cand, w, 3)) { valid = false; break; } }
                        if (!valid) continue;
                        let tooClose = false;
                        for (const o of placedObs) { if (rectsOverlap(cand, o, 5)) { tooClose = true; break; } }
                        if (tooClose) continue;
                        placedObs.push(cand);
                    }
                }
                obstacles = placedObs;

                // Saída
                const exitWallChoice = randomInt(0, 3);
                let exitW = 14,
                    exitH = 8;
                let exitX, exitY;
                const wallNames = ['right', 'bottom', 'left', 'top'];
                const chosenWall = wallNames[exitWallChoice];
                switch (chosenWall) {
                    case 'right':
                        exitX = GAME_W - wallThickness - 3;
                        exitY = interiorY + rng() * (interiorH - exitH);
                        break;
                    case 'left':
                        exitX = wallThickness - exitW + 3;
                        exitY = interiorY + rng() * (interiorH - exitH);
                        break;
                    case 'bottom':
                        exitX = interiorX + rng() * (interiorW - exitW);
                        exitY = GAME_H - wallThickness - 3;
                        exitW = 8;
                        exitH = 14;
                        break;
                    case 'top':
                        exitX = interiorX + rng() * (interiorW - exitW);
                        exitY = wallThickness - exitH + 3;
                        exitW = 8;
                        exitH = 14;
                        break;
                }
                exitZone = { x: Math.floor(exitX), y: Math.floor(exitY), w: exitW, h: exitH, wall: chosenWall };

                // Itens
                items = [];
                const itemSize = 7;
                for (let i = 0; i < numItems; i++) {
                    let ix, iy;
                    let valid = false;
                    let attempts = 0;
                    while (!valid && attempts < 60) {
                        ix = interiorX + 15 + rng() * (interiorW - 30);
                        iy = interiorY + 15 + rng() * (interiorH - 30);
                        const ir = { x: ix - itemSize / 2, y: iy - itemSize / 2, w: itemSize, h: itemSize };
                        const distExit = Math.hypot(ix - (exitZone.x + exitZone.w / 2), iy - (exitZone.y + exitZone.h / 2));
                        if (distExit < 55) { attempts++; continue; }
                        let blocked = false;
                        for (const obs of obstacles) { if (rectsOverlap(ir, obs, 7)) { blocked = true; break; } }
                        for (const w of wallRects) { if (rectsOverlap(ir, w, 4)) { blocked = true; break; } }
                        let tooCloseItem = false;
                        for (const it of items) { if (Math.hypot(ix - it.x, iy - it.y) < 30) { tooCloseItem = true; break; } }
                        if (!blocked && !tooCloseItem) valid = true;
                        attempts++;
                    }
                    if (!valid) { ix = interiorX + interiorW / 2 + (i - numItems / 2) * 30;
                        iy = interiorY + interiorH / 2; }
                    items.push({ x: Math.floor(ix), y: Math.floor(iy), size: itemSize, collected: false, glowPhase: rng() *
                            Math.PI * 2 });
                }

                // Player spawn
                let spawnX, spawnY;
                let spawnValid = false;
                let spawnAttempts = 0;
                const pw = 6,
                    ph = 9;
                while (!spawnValid && spawnAttempts < 60) {
                    spawnX = interiorX + 10 + rng() * (interiorW - 20);
                    spawnY = interiorY + 10 + rng() * (interiorH - 20);
                    const sr = { x: spawnX - pw / 2, y: spawnY - ph / 2, w: pw, h: ph };
                    const distExit = Math.hypot(spawnX - (exitZone.x + exitZone.w / 2), spawnY - (exitZone.y + exitZone.h / 2));
                    if (distExit < 60) { spawnAttempts++; continue; }
                    let blocked = false;
                    for (const obs of obstacles) { if (rectsOverlap(sr, obs, 5)) { blocked = true; break; } }
                    for (const w of wallRects) { if (rectsOverlap(sr, w, 4)) { blocked = true; break; } }
                    if (!blocked) spawnValid = true;
                    spawnAttempts++;
                }
                if (!spawnValid) { spawnX = interiorX + 22;
                    spawnY = interiorY + 22; }
                player = createPlayer(Math.floor(spawnX), Math.floor(spawnY));

                // Guardas
                guards = [];
                for (let g = 0; g < numGuards; g++) {
                    const numWaypoints = randomInt(3, 5 + Math.floor(mapComplexity * 2));
                    const patrolPath = [];
                    for (let i = 0; i < numWaypoints; i++) {
                        let wpx, wpy;
                        let wpValid = false;
                        let wpAttempts = 0;
                        while (!wpValid && wpAttempts < 40) {
                            wpx = interiorX + 15 + rng() * (interiorW - 30);
                            wpy = interiorY + 15 + rng() * (interiorH - 30);
                            const wr = { x: wpx - 5, y: wpy - 5, w: 10, h: 10 };
                            let blocked = false;
                            for (const obs of obstacles) { if (rectsOverlap(wr, obs, 5)) { blocked = true; break; } }
                            for (const w of wallRects) { if (rectsOverlap(wr, w, 5)) { blocked = true; break; } }
                            const distPlayer = Math.hypot(wpx - player.x, wpy - player.y);
                            if (distPlayer < 50 && g === 0) { wpAttempts++; continue; }
                            if (!blocked && (patrolPath.length === 0 || Math.hypot(wpx - patrolPath[patrolPath.length - 1].x,
                                    wpy - patrolPath[patrolPath.length - 1].y) > 25)) wpValid = true;
                            wpAttempts++;
                        }
                        if (!wpValid) { wpx = interiorX + interiorW / 2 + (i - numWaypoints / 2) * 30;
                            wpy = interiorY + interiorH / 3 + g * 40; }
                        patrolPath.push({ x: Math.floor(wpx), y: Math.floor(wpy) });
                    }
                    const gStart = patrolPath[0];
                    const guard = createGuard(gStart.x, gStart.y, patrolPath);
                    guard.patrolIndex = g % patrolPath.length;
                    guard.facingAngle = patrolPath.length > 1 ? Math.atan2(patrolPath[1].y - guard.y, patrolPath[1].x - guard
                        .x) : rng() * Math.PI * 2;
                    guard.targetAngle = guard.facingAngle;
                    guard.patrolWaitTimer = 0.3 + g * 0.5;
                    guard.lookSweepTimer = rng() * 5;
                    guard.patrolVariance = rng() * 0.5;
                    guard.speed = 34 + phaseDifficulty * 1.5;
                    guard.chaseSpeed = 65 + phaseDifficulty * 3;
                    guard.visionRange = 95 + phaseDifficulty * 3;
                    guards.push(guard);
                }

                // Reset
                particles.length = 0;
                detectionMeter = 0;
                detectionFlash = 0;
                shakeIntensity = 0;
                shakeDuration = 0;
                freezeTimer = 0;
                winTimer = 0;
                caughtTimer = 0;
                globalTime = 0;
                navGridDirty = true;
            }

            // ============================================================
            // VISÃO DO GUARDA
            // ============================================================
            function getPlayerVisibilityByGuard(guard) {
                if (!player || !guard) return 0;
                const px = player.x,
                    py = player.y;
                const gx = guard.x,
                    gy = guard.y;
                const dx = px - gx,
                    dy = py - gy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > guard.visionRange) return 0;
                let at = Math.atan2(dy, dx);
                let ad = at - guard.facingAngle;
                while (ad > Math.PI) ad -= Math.PI * 2;
                while (ad < -Math.PI) ad += Math.PI * 2;
                if (Math.abs(ad) > guard.peripheralAngle / 2) return 0;
                const samples = 10;
                let occluded = false,
                    partial = false;
                for (let i = 1; i <= samples; i++) {
                    const t = i / samples;
                    const sx = gx + dx * t,
                        sy = gy + dy * t;
                    let blk = false;
                    for (const obs of obstacles) { if (pointInRect(sx, sy, obs, 1)) { blk = true; break; } }
                    if (sx < roomWalls.left.x + roomWalls.left.w + 1 || sx > roomWalls.right.x - 1 || sy < roomWalls.top.y +
                        roomWalls.top.h + 1 || sy > roomWalls.bottom.y - 1) blk = true;
                    if (blk) { if (i <= 3) occluded = true;
                        else partial = true; break; }
                }
                if (occluded) return 0;
                let lvl = 1.0;
                if (dist > guard.visionRangePeripheral) lvl *= 0.55;
                if (Math.abs(ad) > guard.visionAngle / 2) {
                    const pf = 1 - (Math.abs(ad) - guard.visionAngle / 2) / (guard.peripheralAngle / 2 - guard.visionAngle / 2);
                    lvl *= Math.max(0.15, pf);
                }
                if (partial) lvl *= 0.35;
                if (dist > guard.visionRange * 0.8) lvl *= 0.5;
                return Math.max(0, Math.min(1, lvl));
            }

            function canAnyGuardHearPlayer() {
                if (!player) return false;
                const noiseR = player.isRunning ? player.runNoiseRadius : (player.speed > 10 ? player.noiseRadius : 0);
                if (noiseR <= 0) return false;
                for (const g of guards) {
                    if (Math.hypot(g.x - player.x, g.y - player.y) < noiseR) return true;
                }
                return false;
            }

            // ============================================================
            // COLLISION
            // ============================================================
            function resolveCollision(entity, blockers) {
                const ex = entity.x,
                    ey = entity.y,
                    ew = entity.w,
                    eh = entity.h;
                let rx = ex,
                    ry = ey;
                for (let pass = 0; pass < 2; pass++) {
                    for (const b of blockers) {
                        if (rx - ew / 2 < b.x + b.w && rx + ew / 2 > b.x && ry - eh / 2 < b.y + b.h && ry + eh / 2 > b.y) {
                            const overlaps = [
                                { v: (rx + ew / 2) - b.x, axis: 'x', ref: b.x - ew / 2 },
                                { v: (b.x + b.w) - (rx - ew / 2), axis: 'x', ref: b.x + b.w + ew / 2 },
                                { v: (ry + eh / 2) - b.y, axis: 'y', ref: b.y - eh / 2 },
                                { v: (b.y + b.h) - (ry - eh / 2), axis: 'y', ref: b.y + b.h + eh / 2 },
                            ];
                            overlaps.sort((a, b) => a.v - b.v);
                            const best = overlaps[0];
                            if (best.axis === 'x') rx = best.ref;
                            else ry = best.ref;
                        }
                    }
                }
                return { x: rx, y: ry };
            }

            // ============================================================
            // GUARD AI — MÁQUINA DE ESTADOS REFINADA COM PATHFINDING
            // ============================================================
            function updateGuardAI(guard, dt) {
                if (gameState !== STATE.PLAYING) return;
                if (freezeTimer > 0) return;
                guard.detectionCooldown = Math.max(0, guard.detectionCooldown - dt);
                const visibility = getPlayerVisibilityByGuard(guard);
                const canHear = canAnyGuardHearPlayer() && player.isRunning;
                const distToPlayer = Math.hypot(guard.x - player.x, guard.y - player.y);

                // Detection meter compartilhado
                if (visibility > 0.15) {
                    const fillRate = visibility > 0.7 ? 2.8 : (visibility > 0.35 ? 1.4 : 0.6);
                    detectionMeter = Math.min(1, detectionMeter + fillRate * dt);
                    guard.lastKnownPlayerPos = { x: player.x, y: player.y };
                } else if (detectionMeter > 0 && guard.state !== 'chase' && guard.state !== 'search') {
                    detectionMeter = Math.max(0, detectionMeter - 0.7 * dt);
                }

                switch (guard.state) {
                    case 'patrol':
                        if (visibility > 0.7 && detectionMeter > 0.75) transitionGuard(guard, 'chase');
                        else if (detectionMeter > 0.45) transitionGuard(guard, 'suspicious');
                        else if (canHear && visibility < 0.3 && distToPlayer < player.runNoiseRadius) {
                            guard.lastKnownPlayerPos = { x: player.x, y: player.y };
                            transitionGuard(guard, 'investigate');
                        }
                        updatePatrol(guard, dt);
                        break;
                    case 'suspicious':
                        if (visibility > 0.7 && detectionMeter > 0.8) transitionGuard(guard, 'chase');
                        else if (detectionMeter < 0.15 && !canHear) transitionGuard(guard, 'patrol');
                        else if (canHear && player.isRunning && distToPlayer < player.runNoiseRadius) {
                            guard.lastKnownPlayerPos = { x: player.x, y: player.y };
                            transitionGuard(guard, 'investigate');
                        }
                        updateSuspicious(guard, dt);
                        break;
                    case 'investigate':
                        if (visibility > 0.7 && detectionMeter > 0.7) transitionGuard(guard, 'chase');
                        else if (guard.investigationTimer <= 0 && detectionMeter < 0.35) transitionGuard(guard, 'search');
                        updateInvestigate(guard, dt);
                        break;
                    case 'chase':
                        if (visibility < 0.2 && detectionMeter < 0.3 && guard.chaseTimer > 1.5) transitionGuard(guard,
                            'search');
                        updateChase(guard, dt);
                        break;
                    case 'search':
                        if (visibility > 0.55 && detectionMeter > 0.6) transitionGuard(guard, 'chase');
                        else if (guard.searchTimer <= 0 && detectionMeter < 0.2) transitionGuard(guard, 'patrol');
                        updateSearch(guard, dt);
                        break;
                }

                // Suavizar ângulo
                let ad = guard.targetAngle - guard.facingAngle;
                while (ad > Math.PI) ad -= Math.PI * 2;
                while (ad < -Math.PI) ad += Math.PI * 2;
                const step = (guard.state === 'chase' ? 14 : 6) * dt;
                if (Math.abs(ad) < step) guard.facingAngle = guard.targetAngle;
                else guard.facingAngle += Math.sign(ad) * step;
                while (guard.facingAngle > Math.PI) guard.facingAngle -= Math.PI * 2;
                while (guard.facingAngle < -Math.PI) guard.facingAngle += Math.PI * 2;
            }

            function transitionGuard(guard, newState) {
                if (guard.state === newState) return;
                guard.state = newState;
                switch (newState) {
                    case 'suspicious':
                        audio.suspiciousSound();
                        guard.lookSweepTimer = 0;
                        break;
                    case 'investigate':
                        guard.investigationTimer = guard.investigationMax;
                        guard.investigationTarget = guard.lastKnownPlayerPos || { x: guard.x, y: guard.y };
                        guard.currentPath = null;
                        guard.lookSweepTimer = 0;
                        if (guard.state !== 'suspicious') audio.alertSound();
                        break;
                    case 'chase':
                        guard.chaseTimer = 0;
                        guard.currentPath = null;
                        guard.pathRecalcTimer = 0;
                        guard.stuckTimer = 0;
                        guard.stuckCheckPos = { x: guard.x, y: guard.y };
                        detectionMeter = Math.max(detectionMeter, 0.85);
                        audio.chaseSound();
                        spawnParticles(guard.x, guard.y, 10, '#ff4444', 60, 0.55, 2);
                        freezeTimer = Math.max(freezeTimer, 0.06);
                        shakeIntensity = Math.max(shakeIntensity, 3);
                        shakeDuration = Math.max(shakeDuration, 0.25);
                        break;
                    case 'search':
                        guard.searchTimer = guard.searchMax;
                        guard.lastKnownPlayerPos = guard.lastKnownPlayerPos || { x: guard.x, y: guard.y };
                        guard.investigationTarget = guard.lastKnownPlayerPos;
                        guard.currentPath = null;
                        guard.lookSweepTimer = 0;
                        break;
                    case 'patrol':
                        detectionMeter = Math.max(0, detectionMeter - 0.3);
                        guard.currentPath = null;
                        guard.lookSweepTimer = 0;
                        let bestDist = Infinity,
                            bestIdx = guard.patrolIndex;
                        for (let i = 0; i < guard.patrolPath.length; i++) {
                            const d = Math.hypot(guard.patrolPath[i].x - guard.x, guard.patrolPath[i].y - guard.y);
                            if (d < bestDist) { bestDist = d;
                                bestIdx = i; }
                        }
                        guard.patrolIndex = bestIdx;
                        guard.patrolWaitTimer = randomRange(0.6, 1.8);
                        break;
                }
            }

            function updatePatrol(guard, dt) {
                if (guard.patrolWaitTimer > 0) {
                    guard.patrolWaitTimer -= dt;
                    guard.lookSweepTimer += dt;
                    guard.lookSweepOffset = Math.sin(guard.lookSweepTimer * 2.8 + guard.patrolVariance) * 0.5;
                    guard.targetAngle = guard.facingAngle + guard.lookSweepOffset * 0.7;
                    guard.idleLookTimer += dt;
                    if (guard.idleLookTimer > 2.5 + guard.patrolVariance * 3) {
                        guard.idleLookTimer = 0;
                        guard.idleLookTarget = guard.facingAngle + (Math.random() - 0.5) * 1.2;
                    }
                    guard.targetAngle += (guard.idleLookTarget - guard.targetAngle) * 0.3;
                    return;
                }
                guard.idleLookTimer = 0;
                const target = guard.patrolPath[guard.patrolIndex];
                const dx = target.x - guard.x,
                    dy = target.y - guard.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 3) {
                    guard.patrolWaitTimer = randomRange(0.5, 2.5) + guard.patrolVariance;
                    guard.x = target.x;
                    guard.y = target.y;
                    guard.lookSweepTimer = 0;
                    guard.patrolIndex = (guard.patrolIndex + 1) % guard.patrolPath.length;
                    return;
                }
                guard.targetAngle = Math.atan2(dy, dx);
                const spd = guard.speed * (0.8 + Math.random() * 0.4);
                guard.x += (dx / dist) * spd * dt;
                guard.y += (dy / dist) * spd * dt;
                const res = resolveCollision(guard, getAllBlockers());
                guard.x = res.x;
                guard.y = res.y;
            }

            function updateSuspicious(guard, dt) {
                guard.lookSweepTimer += dt;
                guard.lookSweepOffset = Math.sin(guard.lookSweepTimer * 4.5) * 0.7;
                if (guard.lastKnownPlayerPos) {
                    const dx = guard.lastKnownPlayerPos.x - guard.x,
                        dy = guard.lastKnownPlayerPos.y - guard.y;
                    guard.targetAngle = Math.atan2(dy, dx) + guard.lookSweepOffset * 0.6;
                    if (Math.hypot(dx, dy) > 25) {
                        const spd = guard.speed * 0.35;
                        guard.x += (dx / Math.hypot(dx, dy)) * spd * dt;
                        guard.y += (dy / Math.hypot(dx, dy)) * spd * dt;
                    }
                } else {
                    guard.targetAngle += guard.lookSweepOffset * 0.5 * dt;
                }
                const res = resolveCollision(guard, getAllBlockers());
                guard.x = res.x;
                guard.y = res.y;
            }

            function updateInvestigate(guard, dt) {
                guard.investigationTimer -= dt;
                if (guard.investigationTimer <= 0) return;
                if (canAnyGuardHearPlayer() && player.isRunning) {
                    guard.investigationTarget = { x: player.x, y: player.y };
                    guard.investigationTimer = Math.max(guard.investigationTimer, 1.5);
                    guard.lastKnownPlayerPos = { x: player.x, y: player.y };
                }
                const target = guard.investigationTarget;
                if (!target) return;
                const dx = target.x - guard.x,
                    dy = target.y - guard.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                guard.targetAngle = Math.atan2(dy, dx);
                if (dist < 5) {
                    guard.lookSweepTimer += dt;
                    guard.lookSweepOffset = Math.sin(guard.lookSweepTimer * 5) * 0.9;
                    guard.targetAngle += guard.lookSweepOffset * 0.8;
                    guard.investigationTimer -= dt * 0.8;
                    if (Math.random() < 0.02) {
                        const nearby = obstacles.filter(o => distBetween(guard, o) < 40);
                        if (nearby.length > 0) {
                            const ch = nearby[Math.floor(Math.random() * nearby.length)];
                            guard.investigationTarget = { x: ch.x + ch.w / 2, y: ch.y + ch.h / 2 };
                        }
                    }
                } else {
                    const spd = guard.investigateSpeed * (0.9 + Math.random() * 0.2);
                    guard.x += (dx / dist) * spd * dt;
                    guard.y += (dy / dist) * spd * dt;
                }
                const res = resolveCollision(guard, getAllBlockers());
                guard.x = res.x;
                guard.y = res.y;
            }

            function updateChase(guard, dt) {
                guard.chaseTimer += dt;
                guard.pathRecalcTimer += dt;
                // Verificar se está travado
                if (guard.stuckCheckPos && Math.hypot(guard.x - guard.stuckCheckPos.x, guard.y - guard.stuckCheckPos.y) < 2) {
                    guard.stuckTimer += dt;
                } else {
                    guard.stuckTimer = 0;
                    guard.stuckCheckPos = { x: guard.x, y: guard.y };
                }
                // Recalcular caminho periodicamente ou se travado
                if (guard.pathRecalcTimer > 0.4 || guard.stuckTimer > 0.8 || !guard.currentPath || guard.currentPath.length ===
                    0) {
                    guard.pathRecalcTimer = 0;
                    guard.currentPath = findPath(guard.x, guard.y, player.x, player.y);
                    guard.pathTarget = guard.currentPath && guard.currentPath.length > 1 ? guard.currentPath[1] : (guard
                        .currentPath && guard.currentPath.length === 1 ? guard.currentPath[0] : null);
                    if (guard.stuckTimer > 0.8) {
                        guard.stuckTimer = 0;
                        guard.currentPath = null;
                        guard.pathTarget = { x: player.x, y: player.y };
                    }
                }
                const target = guard.pathTarget || { x: player.x, y: player.y };
                const dx = target.x - guard.x,
                    dy = target.y - guard.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                guard.targetAngle = Math.atan2(dy, dx);
                const spd = guard.chaseSpeed;
                if (dist > 0.5) {
                    guard.x += (dx / dist) * spd * dt;
                    guard.y += (dy / dist) * spd * dt;
                }
                // Se chegou no waypoint, avançar no path
                if (dist < 5 && guard.currentPath && guard.currentPath.length > 1) {
                    guard.currentPath.shift();
                    guard.pathTarget = guard.currentPath.length > 0 ? guard.currentPath[0] : null;
                }
                const res = resolveCollision(guard, getAllBlockers());
                guard.x = res.x;
                guard.y = res.y;
            }

            function updateSearch(guard, dt) {
                guard.searchTimer -= dt;
                guard.lookSweepTimer += dt;
                guard.lookSweepOffset = Math.sin(guard.lookSweepTimer * 4) * 0.7;
                if (guard.lastKnownPlayerPos) {
                    const dx = guard.lastKnownPlayerPos.x - guard.x,
                        dy = guard.lastKnownPlayerPos.y - guard.y;
                    const dist = Math.hypot(dx, dy);
                    guard.targetAngle = Math.atan2(dy, dx) + guard.lookSweepOffset * 0.5;
                    if (dist > 8 && guard.searchTimer > 1.5) {
                        const spd = guard.speed * 0.5;
                        guard.x += (dx / dist) * spd * dt;
                        guard.y += (dy / dist) * spd * dt;
                    }
                } else {
                    guard.targetAngle += guard.lookSweepOffset * 0.6 * dt;
                }
                const res = resolveCollision(guard, getAllBlockers());
                guard.x = res.x;
                guard.y = res.y;
            }

            function checkPhysicalCapture() {
                if (gameState !== STATE.PLAYING) return;
                for (const guard of guards) {
                    if (guard.state === 'chase' && entitiesOverlap(player, guard)) {
                        triggerCaught();
                        return;
                    }
                }
            }

            function triggerCaught() {
                gameState = STATE.CAUGHT;
                freezeTimer = 0.5;
                caughtTimer = 0;
                shakeIntensity = 8;
                shakeDuration = 0.6;
                detectionFlash = 1.0;
                detectionMeter = 1;
                audio.caughtSound();
                spawnParticles(player.x, player.y, 40, '#ff2222', 90, 0.7, 2.5, 25);
                spawnParticles(player.x, player.y, 25, '#ff8800', 65, 0.55, 1.8, 15);
                for (const guard of guards) {
                    if (guard.state === 'chase') {
                        spawnParticles(guard.x, guard.y, 20, '#ff5544', 60, 0.6, 2, 20);
                    }
                }
            }

            function triggerWin() {
                gameState = STATE.WIN;
                winTimer = 1.5;
                shakeIntensity = 3;
                shakeDuration = 0.45;
                detectionFlash = 0;
                detectionMeter = 0;
                audio.phaseCompleteSound();
                spawnParticles(player.x, player.y, 45, '#ffd700', 75, 0.8, 2, -5);
                spawnParticles(player.x, player.y, 30, '#ffffff', 55, 0.6, 1, -3);
                spawnParticles(exitZone.x + exitZone.w / 2, exitZone.y + exitZone.h / 2, 25, '#4ecdc4', 50, 0.55, 2, -5);
            }

            function allItemsCollected() {
                return items.every(it => it.collected);
            }

            // ============================================================
            // PLAYER UPDATE
            // ============================================================
            function updatePlayer(dt) {
                if (!player || gameState !== STATE.PLAYING) return;
                const ix = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
                const iy = (keys['KeyS'] || keys['ArrowDown'] ? 1 : 0) - (keys['KeyW'] || keys['ArrowUp'] ? 1 : 0);
                const im = Math.sqrt(ix * ix + iy * iy);
                const ia = im > 0.01 ? Math.atan2(iy, ix) : player.facingAngle;
                player.isRunning = shiftDown && im > 0.01;
                const maxSpd = player.isRunning ? 118 : 64;
                const acc = player.isRunning ? 580 : 400;
                const dec = player.isRunning ? 500 : 360;
                const slideDec = 280;
                if (im > 0.01) { player.targetSpeed = maxSpd * Math.min(1, im);
                    player.facingAngle = ia; } else { player.targetSpeed = 0; }
                const sd = player.targetSpeed - player.speed;
                const ar = player.targetSpeed > player.speed ? acc : dec;
                if (Math.abs(sd) < 1.5) player.speed = player.targetSpeed;
                else player.speed += Math.sign(sd) * Math.min(Math.abs(sd), ar * dt);
                player.speed = Math.max(0, Math.min(maxSpd, player.speed));
                if (player.targetSpeed < 0.5 && player.speed > 0.5) {
                    player.residualVx = Math.cos(player.facingAngle) * player.speed * 0.4;
                    player.residualVy = Math.sin(player.facingAngle) * player.speed * 0.4;
                    player.speed = 0;
                }
                if (player.targetSpeed < 0.5 && (Math.abs(player.residualVx) > 0.3 || Math.abs(player.residualVy) > 0.3)) {
                    player.residualVx *= Math.exp(-slideDec * dt / 60);
                    player.residualVy *= Math.exp(-slideDec * dt / 60);
                    if (Math.abs(player.residualVx) < 0.3) player.residualVx = 0;
                    if (Math.abs(player.residualVy) < 0.3) player.residualVy = 0;
                } else if (player.targetSpeed > 0.5) { player.residualVx = 0;
                    player.residualVy = 0; }
                player.vx = Math.cos(player.facingAngle) * player.speed + player.residualVx;
                player.vy = Math.sin(player.facingAngle) * player.speed + player.residualVy;
                player.x += player.vx * dt;
                player.y += player.vy * dt;
                const res = resolveCollision(player, getAllBlockers());
                player.x = res.x;
                player.y = res.y;
                player.x = Math.max(roomWalls.left.x + roomWalls.left.w + player.w / 2, Math.min(roomWalls.right.x - player.w /
                    2, player.x));
                player.y = Math.max(roomWalls.top.y + roomWalls.top.h + player.h / 2, Math.min(roomWalls.bottom.y - player.h /
                    2, player.y));
                if (player.speed > 5 || Math.abs(player.residualVx) > 0.5 || Math.abs(player.residualVy) > 0.5)
                    player.headBobPhase += dt * (player.isRunning ? 14 : 9);
                const moving = player.speed > 6 || Math.abs(player.residualVx) > 2 || Math.abs(player.residualVy) > 2;
                if (moving) {
                    const intv = player.isRunning ? player.runFootstepInterval : player.footstepInterval;
                    player.footstepTimer -= dt;
                    if (player.footstepTimer <= 0) {
                        player.footstepTimer = intv * (0.8 + Math.random() * 0.4);
                        audio.footstep(player.isRunning);
                        if (player.isRunning) spawnParticles(player.x, player.y + player.h / 2, 2, '#8888aa', 16, 0.22, 1,
                            10);
                        else if (player.speed > 15) spawnParticles(player.x, player.y + player.h / 2, 1, '#666680', 10, 0.15,
                            0.8, 5);
                    }
                } else player.footstepTimer = Math.min(player.footstepTimer, 0.06);
                if (player.speed > 18 || Math.abs(player.residualVx) > 3 || Math.abs(player.residualVy) > 3) {
                    player.trailPositions.push({ x: player.x, y: player.y, life: 0.2 });
                    if (player.trailPositions.length > 10) player.trailPositions.shift();
                }
                for (const t of player.trailPositions) t.life -= dt;
                player.trailPositions = player.trailPositions.filter(t => t.life > 0);
                // Coleta de itens
                for (const it of items) {
                    if (!it.collected && Math.hypot(player.x - it.x, player.y - it.y) < it.size + player.w / 2 + 3) {
                        it.collected = true;
                        audio.pickupSound();
                        spawnParticles(it.x, it.y, 20, '#ffd700', 55, 0.6, 2, -8);
                        spawnParticles(it.x, it.y, 12, '#ffffff', 40, 0.4, 1, -5);
                    }
                }
                // Verificar saída
                if (allItemsCollected() && exitZone) {
                    const ex = exitZone.x + exitZone.w / 2,
                        ey = exitZone.y + exitZone.h / 2;
                    if (Math.hypot(player.x - ex, player.y - ey) < exitZone.w / 2 + player.w / 2 + 5) triggerWin();
                }
                // Verificar captura física
                checkPhysicalCapture();
            }

            function restartGame() {
                currentPhase = 1;
                generateRoom(currentPhase);
                gameState = STATE.PLAYING;
                detectionMeter = 0;
                detectionFlash = 0;
                freezeTimer = 0;
                winTimer = 0;
                caughtTimer = 0;
                shakeIntensity = 0;
                shakeDuration = 0;
                particles.length = 0;
                if (player) player.trailPositions = [];
            }

            function nextPhase() {
                currentPhase++;
                generateRoom(currentPhase);
                gameState = STATE.PLAYING;
                detectionMeter = 0;
                detectionFlash = 0;
                freezeTimer = 0;
                winTimer = 0;
                caughtTimer = 0;
                shakeIntensity = 0;
                shakeDuration = 0;
                particles.length = 0;
                if (player) player.trailPositions = [];
            }

            // ============================================================
            // MAIN UPDATE
            // ============================================================
            function update(dt) {
                const cd = Math.min(dt, 0.1);
                globalTime += cd;
                if (shakeDuration > 0) {
                    shakeDuration -= cd;
                    const s = shakeIntensity * Math.max(0, shakeDuration / 0.6);
                    screenShakeX = (Math.random() - 0.5) * s * 2;
                    screenShakeY = (Math.random() - 0.5) * s * 2;
                    if (shakeDuration <= 0) { screenShakeX = 0;
                        screenShakeY = 0;
                        shakeIntensity = 0; }
                } else { screenShakeX = 0;
                    screenShakeY = 0; }
                if (detectionFlash > 0) detectionFlash = Math.max(0, detectionFlash - cd * 2.8);
                if (freezeTimer > 0) {
                    freezeTimer -= cd;
                    if (freezeTimer <= 0 && gameState === STATE.CAUGHT) audio.caughtSound();
                }
                if (winTimer > 0) winTimer -= cd;
                for (const p of particles) p.update(cd);
                for (let i = particles.length - 1; i >= 0; i--) { if (!particles[i].alive) particles.splice(i, 1); }
                if (gameState === STATE.PLAYING) {
                    updatePlayer(cd);
                    for (const guard of guards) updateGuardAI(guard, cd);
                    checkPhysicalCapture();
                }
                for (const it of items) { if (!it.collected) it.glowPhase += cd * 3.5; }
                titlePulse += cd * 2.5;
                if (gameState === STATE.CAUGHT && freezeTimer <= 0) { if (spacePressed || rPressed || keys['KeyR'])
                        restartGame(); }
                if (gameState === STATE.WIN && winTimer <= 0.3) { if (spacePressed || rPressed || keys['KeyR']) nextPhase(); }
                spacePressed = false;
                rPressed = false;
            }

            // ============================================================
            // RENDER
            // ============================================================
            function drawPixelRect(x, y, w, h, color) { ctx.fillStyle = color;
                ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); }

            function render() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);
                ctx.fillStyle = '#0d0d1a';
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                ctx.fillStyle = '#121223';
                for (let gx = TILE; gx < GAME_W - TILE; gx += TILE * 2)
                    for (let gy = TILE; gy < GAME_H - TILE; gy += TILE * 2)
                        if ((Math.floor(gx / TILE) + Math.floor(gy / TILE)) % 2 === 0) ctx.fillRect(gx, gy, TILE, TILE);
                const vg = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_W * 0.35, GAME_W / 2, GAME_H / 2, GAME_W * 0.85);
                vg.addColorStop(0, 'rgba(0,0,0,0)');
                vg.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vg;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                const wc = '#22223a',
                    we = '#2e2e4a';
                const wr = [roomWalls.left, roomWalls.right, roomWalls.top, roomWalls.bottom];
                for (const w of wr) {
                    ctx.fillStyle = wc;
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                    ctx.fillStyle = we;
                    if (w === roomWalls.left) ctx.fillRect(w.x + w.w - 2, w.y + 2, 2, w.h - 4);
                    if (w === roomWalls.right) ctx.fillRect(w.x, w.y + 2, 2, w.h - 4);
                    if (w === roomWalls.top) ctx.fillRect(w.x + 2, w.y + w.h - 2, w.w - 4, 2);
                    if (w === roomWalls.bottom) ctx.fillRect(w.x + 2, w.y, w.w - 4, 2);
                }
                if (exitZone) {
                    const ex = exitZone.x,
                        ey = exitZone.y,
                        ew = exitZone.w,
                        eh = exitZone.h;
                    const eg = 0.5 + Math.sin(globalTime * 3) * 0.35;
                    ctx.fillStyle = `rgba(78,205,196,${0.25 + eg * 0.45})`;
                    ctx.fillRect(ex - 3, ey - 3, ew + 6, eh + 6);
                    ctx.fillStyle = '#3a8078';
                    ctx.fillRect(ex, ey, ew, eh);
                    ctx.fillStyle = '#4ecdc4';
                    ctx.fillRect(ex + 1, ey + 1, ew - 2, eh - 2);
                    if (allItemsCollected()) {
                        const ab = Math.sin(globalTime * 5) * 2;
                        const ax = ex + ew / 2,
                            ay = ey + eh / 2;
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(ax - 2, ay - 8 + ab, 4, 8);
                        ctx.fillRect(ax - 5, ay - 3 + ab, 4, 3);
                        ctx.fillRect(ax + 1, ay - 3 + ab, 4, 3);
                    }
                }
                for (const obs of obstacles) {
                    ctx.fillStyle = 'rgba(0,0,0,0.35)';
                    ctx.fillRect(obs.x + 3, obs.y + 3, obs.w, obs.h);
                    ctx.fillStyle = obs.fill;
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = obs.highlight;
                    ctx.fillRect(obs.x, obs.y, obs.w, 3);
                    ctx.fillRect(obs.x, obs.y, 3, obs.h);
                    ctx.fillStyle = obs.accent;
                    ctx.fillRect(obs.x + obs.w - 4, obs.y + 2, 3, obs.h - 4);
                    ctx.fillRect(obs.x + 2, obs.y + obs.h - 4, obs.w - 4, 3);
                    ctx.fillStyle = obs.shadow;
                    ctx.fillRect(obs.x + 2, obs.y + obs.h - 2, obs.w - 2, 2);
                    ctx.fillRect(obs.x + obs.w - 2, obs.y + 2, 2, obs.h - 2);
                }
                if (player && gameState !== STATE.WIN) {
                    const px = Math.floor(player.x),
                        py = Math.floor(player.y);
                    const hb = Math.sin(player.headBobPhase) * (player.isRunning ? 1.5 : 0.8);
                    ctx.fillStyle = 'rgba(0,0,0,0.45)';
                    ctx.fillRect(px - player.w / 2 + 2, py - player.h / 2 + 2, player.w, player.h);
                    ctx.fillStyle = '#d0d0e0';
                    ctx.fillRect(px - player.w / 2, py - player.h / 2 + hb, player.w, player.h);
                    ctx.fillStyle = '#e0e0f0';
                    ctx.fillRect(px - 2, py - player.h / 2 - 3 + hb, 5, 4);
                    ctx.fillStyle = '#0a0a18';
                    ctx.fillRect(px + Math.cos(player.facingAngle), py - player.h / 2 - 1 + hb, 2, 2);
                    if (player.isRunning && player.speed > 20) {
                        ctx.fillStyle = 'rgba(255,255,255,0.55)';
                        ctx.fillRect(px - 4, py + player.h / 2 + 2, 8, 1);
                    }
                    for (const t of player.trailPositions) {
                        ctx.fillStyle = `rgba(200,200,220,${t.life / 0.2 * 0.25})`;
                        ctx.fillRect(Math.floor(t.x - 2), Math.floor(t.y - 2), 4, 4);
                    }
                }
                for (const it of items) {
                    if (it.collected) continue;
                    const ix = Math.floor(it.x),
                        iy = Math.floor(it.y);
                    const gs = it.size + Math.sin(it.glowPhase) * 3;
                    ctx.fillStyle = `rgba(255,215,0,${0.25 + Math.sin(it.glowPhase) * 0.18})`;
                    ctx.fillRect(ix - gs, iy - gs, gs * 2, gs * 2);
                    ctx.fillStyle = 'rgba(255,255,200,0.3)';
                    ctx.fillRect(ix - gs / 2, iy - gs / 2, gs, gs);
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(ix - 3, iy - 3, 6, 6);
                    ctx.fillStyle = '#fff8c0';
                    ctx.fillRect(ix - 1, iy - 2, 3, 3);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(ix, iy - 1, 1, 2);
                }
                for (const guard of guards) {
                    const gx = Math.floor(guard.x),
                        gy = Math.floor(guard.y);
                    let ca, cc;
                    switch (guard.state) {
                        case 'chase':
                            ca = 0.5;
                            cc = '255,20,20';
                            break;
                        case 'investigate':
                            ca = 0.35;
                            cc = '255,100,50';
                            break;
                        case 'suspicious':
                            ca = 0.28;
                            cc = '255,140,60';
                            break;
                        case 'search':
                            ca = 0.25;
                            cc = '255,120,70';
                            break;
                        default:
                            ca = 0.2;
                            cc = '255,80,60';
                    }
                    const ch = guard.visionAngle / 2,
                        cr = guard.visionRange;
                    ctx.fillStyle = `rgba(${cc},${ca})`;
                    ctx.beginPath();
                    ctx.moveTo(gx, gy);
                    for (let i = 0; i <= 14; i++) { const a = guard.facingAngle - ch + ch * 2 * (i / 14);
                        ctx.lineTo(gx + Math.cos(a) * cr, gy + Math.sin(a) * cr); }
                    ctx.closePath();
                    ctx.fill();
                    const ph = guard.peripheralAngle / 2,
                        pr = guard.visionRangePeripheral;
                    ctx.fillStyle = `rgba(${cc},${ca * 0.4})`;
                    ctx.beginPath();
                    ctx.moveTo(gx, gy);
                    for (let i = 0; i <= 10; i++) { const a = guard.facingAngle - ph + ph * 2 * (i / 10);
                        ctx.lineTo(gx + Math.cos(a) * pr, gy + Math.sin(a) * pr); }
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = `rgba(${cc},${ca * 1.2})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(gx, gy);
                    ctx.lineTo(gx + Math.cos(guard.facingAngle - ch) * cr, gy + Math.sin(guard.facingAngle - ch) * cr);
                    ctx.moveTo(gx, gy);
                    ctx.lineTo(gx + Math.cos(guard.facingAngle + ch) * cr, gy + Math.sin(guard.facingAngle + ch) * cr);
                    ctx.stroke();
                    ctx.lineWidth = 1;
                    ctx.fillStyle = 'rgba(0,0,0,0.45)';
                    ctx.fillRect(gx - guard.w / 2 + 1, gy - guard.h / 2 + 1, guard.w, guard.h);
                    const bc = { patrol: '#d04040', suspicious: '#e05535', investigate: '#f06030', chase: '#ff2020',
                        search: '#e84830' };
                    ctx.fillStyle = bc[guard.state] || '#d04040';
                    ctx.fillRect(gx - guard.w / 2, gy - guard.h / 2, guard.w, guard.h);
                    ctx.fillStyle = guard.state === 'chase' ? '#ff3333' : '#e04848';
                    ctx.fillRect(gx - 2, gy - guard.h / 2 - 3, 5, 4);
                    ctx.fillStyle = '#881818';
                    ctx.fillRect(gx - 3, gy - guard.h / 2 - 5, 7, 2);
                    ctx.fillStyle = '#ffff44';
                    ctx.fillRect(gx + Math.cos(guard.facingAngle), gy - guard.h / 2 - 1, 2, 2);
                    if (guard.state === 'suspicious') {
                        const qb = Math.sin(globalTime * 6);
                        ctx.fillStyle = '#ffcc66';
                        ctx.font = 'bold 9px "Courier New", monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('?', gx, gy - guard.h / 2 - 9 + qb);
                        ctx.textAlign = 'start';
                    } else if (guard.state === 'chase') {
                        const eb = Math.sin(globalTime * 14) * 2;
                        ctx.fillStyle = '#ff1111';
                        ctx.font = 'bold 11px "Courier New", monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('!', gx, gy - guard.h / 2 - 11 + eb);
                        ctx.textAlign = 'start';
                    }
                }
                for (const p of particles) {
                    const a = p.alpha,
                        sz = p.currentSize;
                    if (p.color.startsWith('#')) {
                        const r = parseInt(p.color.slice(1, 3), 16),
                            g = parseInt(p.color.slice(3, 5), 16),
                            b = parseInt(p.color.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
                    } else ctx.fillStyle = p.color;
                    ctx.fillRect(Math.floor(p.x - sz / 2), Math.floor(p.y - sz / 2), Math.ceil(sz), Math.ceil(sz));
                }
                if (detectionFlash > 0.01) {
                    ctx.fillStyle = `rgba(255,20,20,${detectionFlash * 0.55})`;
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }
                if (gameState === STATE.WIN && winTimer > 0) {
                    ctx.fillStyle = `rgba(10,20,10,${Math.min(1, winTimer / 0.4) * 0.4})`;
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }
                if (gameState === STATE.CAUGHT && freezeTimer <= 0) {
                    ctx.fillStyle = 'rgba(20,3,3,0.75)';
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }
                mainCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                mainCtx.imageSmoothingEnabled = false;
                mainCtx.drawImage(offscreen, Math.round(screenShakeX), Math.round(screenShakeY), CANVAS_W, CANVAS_H);
                mainCtx.imageSmoothingEnabled = false;
                if (gameState === STATE.TITLE) renderTitleScreen();
                if (gameState === STATE.CAUGHT && freezeTimer <= 0) renderCaughtScreen();
                if (gameState === STATE.WIN && winTimer <= 0.7) renderWinScreen();
                if (gameState === STATE.PLAYING) renderHUD();
            }

            function renderTitleScreen() {
                const cx = CANVAS_W / 2,
                    cy = CANVAS_H / 2;
                mainCtx.textAlign = 'center';
                mainCtx.textBaseline = 'middle';
                mainCtx.fillStyle = 'rgba(6,6,18,0.9)';
                mainCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                mainCtx.fillStyle = '#e8e8f8';
                mainCtx.font = 'bold 28px "Courier New", monospace';
                mainCtx.fillText('STEALTH ROOM', cx, cy - 38 + Math.sin(titlePulse) * 3);
                mainCtx.fillStyle = '#8888aa';
                mainCtx.font = '11px "Courier New", monospace';
                mainCtx.fillText('UM JOGO DE FURTIVIDADE', cx, cy + 0);
                mainCtx.fillStyle = '#aaaacc';
                mainCtx.font = '10px "Courier New", monospace';
                mainCtx.fillText('WASD = MOVER     SHIFT = CORRER', cx, cy + 33);
                mainCtx.fillText('COLETE TODOS OS ITENS E FUJA', cx, cy + 50);
                if (Math.sin(titlePulse * 1.4) > -0.2) {
                    mainCtx.fillStyle = '#ffd700';
                    mainCtx.font = 'bold 14px "Courier New", monospace';
                    mainCtx.fillText('PRESSIONE ESPAÇO', cx, cy + 78);
                }
                mainCtx.fillStyle = '#2d2d48';
                mainCtx.fillRect(cx - 80, cy + 63, 160, 1);
            }

            function renderCaughtScreen() {
                const cx = CANVAS_W / 2,
                    cy = CANVAS_H / 2;
                mainCtx.textAlign = 'center';
                mainCtx.textBaseline = 'middle';
                mainCtx.fillStyle = '#ff2222';
                mainCtx.font = 'bold 24px "Courier New", monospace';
                mainCtx.fillText('CAPTURADO!', cx, cy - 12);
                mainCtx.fillStyle = '#cc8888';
                mainCtx.font = '11px "Courier New", monospace';
                if (Math.sin(globalTime * 3) > -0.3) mainCtx.fillText('ESPAÇO OU R = REINICIAR', cx, cy + 20);
            }

            function renderWinScreen() {
                const cx = CANVAS_W / 2,
                    cy = CANVAS_H / 2;
                mainCtx.textAlign = 'center';
                mainCtx.textBaseline = 'middle';
                mainCtx.fillStyle = '#ffd700';
                mainCtx.font = 'bold 20px "Courier New", monospace';
                mainCtx.fillText('FASE ' + currentPhase + ' CONCLUÍDA!', cx, cy - 6);
                mainCtx.fillStyle = '#aaccaa';
                mainCtx.font = '10px "Courier New", monospace';
                if (Math.sin(globalTime * 3) > -0.3) mainCtx.fillText('ESPAÇO OU R = PRÓXIMA FASE', cx, cy + 18);
            }

            function renderHUD() {
                mainCtx.textAlign = 'right';
                if (detectionMeter > 0.02) {
                    const bw = 60,
                        bh = 5,
                        bx = CANVAS_W - 18,
                        by = 14;
                    mainCtx.fillStyle = 'rgba(0,0,0,0.6)';
                    mainCtx.fillRect(bx - bw, by - 1, bw + 2, bh + 2);
                    const mc = detectionMeter > 0.6 ? '#ff4444' : detectionMeter > 0.3 ? '#ffaa33' : '#ffdd66';
                    mainCtx.fillStyle = mc;
                    mainCtx.fillRect(bx - bw, by, Math.floor(bw * detectionMeter), bh);
                    mainCtx.fillStyle = '#ffffff';
