    // --- Geração de mapa (completa) ---
    const TILE_SIZE = 8;
    const MAP_W = GAME_W / TILE_SIZE;
    const MAP_H = GAME_H / TILE_SIZE;
    const WALL = 0, FLOOR = 1;

    function tileToWorld(tx, ty) { return { x: tx*TILE_SIZE + TILE_SIZE/2, y: ty*TILE_SIZE + TILE_SIZE/2 }; }
    function createEmptyGrid() {
        const grid = [];
        for (let y=0; y<MAP_H; y++) grid[y] = new Array(MAP_W).fill(WALL);
        return grid;
    }
    function carveRoom(grid, room) {
        for (let y=room.y; y<room.y+room.h; y++) {
            for (let x=room.x; x<room.x+room.w; x++) {
                if (x>=0 && x<MAP_W && y>=0 && y<MAP_H) grid[y][x] = FLOOR;
            }
        }
    }
    function carveCorridor(grid, p1, p2, width=6) {
        let x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y;
        const half = Math.floor(width/2);
        if (Math.random() < 0.5) {
            const startX = Math.min(x1,x2), endX = Math.max(x1,x2);
            for (let x=startX-1; x<=endX+1; x++) {
                for (let dy=-half; dy<half; dy++) {
                    const ty = y1+dy;
                    if (x>=0 && x<MAP_W && ty>=0 && ty<MAP_H) grid[ty][x] = FLOOR;
                }
            }
            const startY = Math.min(y1,y2), endY = Math.max(y1,y2);
            for (let y=startY-1; y<=endY+1; y++) {
                for (let dx=-half; dx<half; dx++) {
                    const tx = x2+dx;
                    if (tx>=0 && tx<MAP_W && y>=0 && y<MAP_H) grid[y][tx] = FLOOR;
                }
            }
        } else {
            const startY = Math.min(y1,y2), endY = Math.max(y1,y2);
            for (let y=startY-1; y<=endY+1; y++) {
                for (let dx=-half; dx<half; dx++) {
                    const tx = x1+dx;
                    if (tx>=0 && tx<MAP_W && y>=0 && y<MAP_H) grid[y][tx] = FLOOR;
                }
            }
            const startX = Math.min(x1,x2), endX = Math.max(x1,x2);
            for (let x=startX-1; x<=endX+1; x++) {
                for (let dy=-half; dy<half; dy++) {
                    const ty = y2+dy;
                    if (x>=0 && x<MAP_W && ty>=0 && ty<MAP_H) grid[ty][x] = FLOOR;
                }
            }
        }
    }
    function gridToObstacles(grid) {
        const obstacles = [];
        const visited = Array.from({length:MAP_H}, ()=>new Array(MAP_W).fill(false));
        for (let y=0; y<MAP_H; y++) {
            for (let x=0; x<MAP_W; x++) {
                if (grid[y][x]===WALL && !visited[y][x]) {
                    let endX = x;
                    while (endX < MAP_W && grid[y][endX]===WALL && !visited[y][endX]) endX++;
                    const width = endX - x;
                    let height = 1;
                    let canExpand = true;
                    while (canExpand && y+height < MAP_H) {
                        for (let i=x; i<endX; i++) {
                            if (grid[y+height][i] !== WALL || visited[y+height][i]) { canExpand = false; break; }
                        }
                        if (canExpand) height++;
                    }
                    for (let dy=0; dy<height; dy++) {
                        for (let dx=0; dx<width; dx++) {
                            visited[y+dy][x+dx] = true;
                        }
                    }
                    obstacles.push({
                        x: x*TILE_SIZE, y: y*TILE_SIZE, w: width*TILE_SIZE, h: height*TILE_SIZE,
                        type:'wall', fill:'#1a1a2e', highlight:'#2a2a3e', shadow:'#0a0a18', accent:'#3a3a4e'
                    });
                    x = endX - 1;
                }
            }
        }
        return obstacles;
    }

    function pathExists(grid, startTile, endTile) {
        const visited = Array.from({length:MAP_H}, ()=>new Array(MAP_W).fill(false));
        const queue = [startTile];
        visited[startTile.y][startTile.x] = true;
        const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
        while (queue.length > 0) {
            const cur = queue.shift();
            if (cur.x === endTile.x && cur.y === endTile.y) return true;
            for (const [dx,dy] of dirs) {
                const nx=cur.x+dx, ny=cur.y+dy;
                if (nx>=0 && nx<MAP_W && ny>=0 && ny<MAP_H && !visited[ny][nx] && grid[ny][nx]===FLOOR) {
                    visited[ny][nx]=true;
                    queue.push({x:nx, y:ny});
                }
            }
        }
        return false;
    }

    // --- Geração de sala principal ---
    let player = null;
    let guards = [];
    let robotDogs = [];
    let cameras = [];
    let obstacles = [];
    let bushes = [];
    let items = [];
    let exitZone = null;
    let roomWalls = null;

    function generateRoom(worldIndex, phaseInWorld) {
        const world = WORLDS[worldIndex];
        const rng = Math.random;
        const phaseDifficulty = Math.min(world.totalPhases, phaseInWorld);

        let numGuards = phaseDifficulty<=2 ? 1 : phaseDifficulty<=3 ? 2 : phaseDifficulty<=4 ? 2+Math.floor((phaseDifficulty-3)/2) : 3+Math.floor((phaseDifficulty-4)/2);
        if (permanentUpgrades && permanentUpgrades.includes('grave_medallion')) numGuards += 1;
        const numItems = Math.min(5, 1+Math.floor((phaseDifficulty-1)/2));
        const obstacleDensityBase = 0.2 + phaseDifficulty*0.05 + world.difficultyMult*0.03;

        const minRooms = 3 + Math.floor(phaseDifficulty/3);
        const maxRooms = 4 + Math.floor(phaseDifficulty/2);
        const targetRooms = randomInt(minRooms, maxRooms);

        let grid, rooms, connections;
        let attempts = 0;
        const maxAttempts = 100;
        let validMap = false;

        while (!validMap && attempts < maxAttempts) {
            attempts++;
            grid = createEmptyGrid();
            rooms = [];
            let roomAttempts = 0;
            const MIN_ROOM_SIZE = 12, MAX_ROOM_SIZE = 22, ROOM_MARGIN = 5;
            while (rooms.length < targetRooms && roomAttempts < 300) {
                const w = randomInt(MIN_ROOM_SIZE, MAX_ROOM_SIZE);
                const h = randomInt(MIN_ROOM_SIZE, MAX_ROOM_SIZE);
                const x = randomInt(2, MAP_W - w - 2);
                const y = randomInt(2, MAP_H - h - 2);
                const newRoom = { x, y, w, h };
                let overlaps = false;
                for (const r of rooms) {
                    if (!(x + w + ROOM_MARGIN <= r.x || r.x + r.w + ROOM_MARGIN <= x ||
                          y + h + ROOM_MARGIN <= r.y || r.y + r.h + ROOM_MARGIN <= y)) {
                        overlaps = true; break;
                    }
                }
                if (!overlaps) {
                    rooms.push(newRoom);
                    carveRoom(grid, newRoom);
                }
                roomAttempts++;
            }
            if (rooms.length < 3) continue;

            const connected = new Array(rooms.length).fill(false);
            connections = [];
            const startIdx = randomInt(0, rooms.length-1);
            connected[startIdx] = true;

            while (connected.some(v => !v)) {
                let bestDist = Infinity;
                let bestFrom = -1, bestTo = -1;
                for (let i=0; i<rooms.length; i++) {
                    if (!connected[i]) continue;
                    for (let j=0; j<rooms.length; j++) {
                        if (connected[j]) continue;
                        const ci = { x: rooms[i].x + rooms[i].w/2, y: rooms[i].y + rooms[i].h/2 };
                        const cj = { x: rooms[j].x + rooms[j].w/2, y: rooms[j].y + rooms[j].h/2 };
                        const dist = Math.abs(ci.x - cj.x) + Math.abs(ci.y - cj.y);
                        if (dist < bestDist) { bestDist=dist; bestFrom=i; bestTo=j; }
                    }
                }
                if (bestFrom>=0 && bestTo>=0) {
                    connections.push([bestFrom, bestTo]);
                    connected[bestTo] = true;
                    const cFrom = { x: Math.floor(rooms[bestFrom].x + rooms[bestFrom].w/2), y: Math.floor(rooms[bestFrom].y + rooms[bestFrom].h/2) };
                    const cTo   = { x: Math.floor(rooms[bestTo].x + rooms[bestTo].w/2), y: Math.floor(rooms[bestTo].y + rooms[bestTo].h/2) };
                    carveCorridor(grid, cFrom, cTo, 6);
                } else break;
            }
            if (connected.some(v=>!v)) continue;
            validMap = true;
        }

        if (!validMap) {
            grid = createEmptyGrid();
            const bigRoom = { x:5, y:5, w:30, h:20 };
            carveRoom(grid, bigRoom);
            rooms = [bigRoom];
            connections = [];
        }

        const graph = Array.from({length: rooms.length}, () => []);
        for (const [a,b] of connections) {
            graph[a].push(b);
            graph[b].push(a);
        }
        const degrees = graph.map(adj => adj.length);
        const avgDegree = degrees.reduce((a,b)=>a+b,0) / degrees.length;
        const candidates = [];
        for (let i=0; i<rooms.length; i++) {
            if (degrees[i] <= avgDegree && degrees[i] >= 1) candidates.push(i);
        }
        let spawnIdx = 0;
        if (candidates.length > 0) spawnIdx = candidates[randomInt(0, candidates.length-1)];
        else {
            let minDeg = Infinity;
            for (let i=0; i<degrees.length; i++) {
                if (degrees[i] < minDeg && degrees[i] > 0) { minDeg = degrees[i]; spawnIdx = i; }
            }
        }

        const depth = new Array(rooms.length).fill(-1);
        const queue = [spawnIdx];
        depth[spawnIdx] = 0;
        while (queue.length > 0) {
            const cur = queue.shift();
            for (const nb of graph[cur]) {
                if (depth[nb] === -1) {
                    depth[nb] = depth[cur] + 1;
                    queue.push(nb);
                }
            }
        }
        if (depth.some(d => d === -1)) {
            for (let i=0; i<depth.length; i++) {
                if (depth[i] === -1) {
                    let best = -1, bestDist = Infinity;
                    for (let j=0; j<rooms.length; j++) {
                        if (i===j || depth[j]===-1) continue;
                        const ci = { x: rooms[i].x + rooms[i].w/2, y: rooms[i].y + rooms[i].h/2 };
                        const cj = { x: rooms[j].x + rooms[j].w/2, y: rooms[j].y + rooms[j].h/2 };
                        const d = Math.abs(ci.x - cj.x) + Math.abs(ci.y - cj.y);
                        if (d < bestDist) { bestDist = d; best = j; }
                    }
                    if (best !== -1) {
                        connections.push([i, best]);
                        graph[i].push(best);
                        graph[best].push(i);
                        depth[i] = depth[best] + 1;
                    }
                }
            }
            const newDepth = new Array(rooms.length).fill(-1);
            const q2 = [spawnIdx];
            newDepth[spawnIdx] = 0;
            while (q2.length > 0) {
                const cur = q2.shift();
                for (const nb of graph[cur]) {
                    if (newDepth[nb] === -1) {
                        newDepth[nb] = newDepth[cur] + 1;
                        q2.push(nb);
                    }
                }
            }
            for (let i=0; i<rooms.length; i++) depth[i] = newDepth[i];
        }

        let maxDepth = 0;
        for (let i=0; i<depth.length; i++) if (depth[i] > maxDepth) maxDepth = depth[i];
        let exitIdx = 0;
        let bestDepth = -1, bestDegree = Infinity;
        for (let i=0; i<rooms.length; i++) {
            if (depth[i] > bestDepth || (depth[i] === bestDepth && degrees[i] < bestDegree)) {
                bestDepth = depth[i];
                bestDegree = degrees[i];
                exitIdx = i;
            }
        }
        if (maxDepth === 0) exitIdx = spawnIdx;

        const spawnRoom = rooms[spawnIdx];
        const exitRoom = rooms[exitIdx];
        const spawnPos = tileToWorld(Math.floor(spawnRoom.x+spawnRoom.w/2), Math.floor(spawnRoom.y+spawnRoom.h/2));
        const exitPos = tileToWorld(Math.floor(exitRoom.x+exitRoom.w/2), Math.floor(exitRoom.y+exitRoom.h/2));

        roomWalls = {
            left:   { x:0, y:0, w:TILE_SIZE, h:GAME_H },
            right:  { x:GAME_W-TILE_SIZE, y:0, w:TILE_SIZE, h:GAME_H },
            top:    { x:0, y:0, w:GAME_W, h:TILE_SIZE },
            bottom: { x:0, y:GAME_H-TILE_SIZE, w:GAME_W, h:TILE_SIZE }
        };

        const tempGrid = grid.map(row=>[...row]);
        for (let y=0; y<MAP_H; y++) { tempGrid[y][0]=FLOOR; tempGrid[y][MAP_W-1]=FLOOR; }
        for (let x=0; x<MAP_W; x++) { tempGrid[0][x]=FLOOR; tempGrid[MAP_H-1][x]=FLOOR; }
        obstacles = gridToObstacles(tempGrid);

        player = createPlayer(spawnPos.x, spawnPos.y);
        exitZone = { x: exitPos.x-7, y: exitPos.y-7, w:14, h:14 };

        // Obstáculos
        const obstacleDensity = obstacleDensityBase;
        for (const [idx, room] of rooms.entries()) {
            const roomDepth = depth[idx];
            const normalizedDepth = maxDepth > 0 ? roomDepth / maxDepth : 0.5;
            const factor = 0.6 + 0.9 * normalizedDepth;
            const density = obstacleDensity * factor;
            const area = room.w * room.h;
            const obsCount = Math.min(8, Math.floor(area * density * 0.15));
            for (let i=0; i<obsCount; i++) {
                const type = world.obstacleTypes[randomInt(0, world.obstacleTypes.length-1)];
                const ow = randomInt(2,4), oh = randomInt(1,3);
                let ox = room.x + randomInt(2, room.w-ow-2);
                let oy = room.y + randomInt(2, room.h-oh-2);
                const obsX = ox*TILE_SIZE, obsY = oy*TILE_SIZE, obsW = ow*TILE_SIZE, obsH = oh*TILE_SIZE;
                const distToPlayer = Math.hypot(obsX+obsW/2 - player.x, obsY+obsH/2 - player.y);
                const distToExit = Math.hypot(obsX+obsW/2 - exitZone.x - exitZone.w/2, obsY+obsH/2 - exitZone.y - exitZone.h/2);
                if (idx === spawnIdx && distToPlayer < 40) continue;
                if (idx === exitIdx && distToExit < 40) continue;
                let overlap = false;
                for (const o of obstacles) {
                    if (rectsOverlap({x:obsX, y:obsY, w:obsW, h:obsH}, o, 4)) { overlap=true; break; }
                }
                if (!overlap) obstacles.push(createObstacle(obsX, obsY, obsW, obsH, type));
            }
        }

        // Arbustos
        bushes = [];
        if (world.bushChance > 0) {
            const bushCount = Math.floor(rooms.reduce((s,r)=>s + r.w*r.h, 0) * world.bushChance * 0.08);
            let bushCandidates = [];
            for (let y=1; y<MAP_H-1; y++) {
                for (let x=1; x<MAP_W-1; x++) {
                    if (grid[y][x] === FLOOR) {
                        let inRoom = -1;
                        for (let r=0; r<rooms.length; r++) {
                            const room = rooms[r];
                            if (x >= room.x && x < room.x+room.w && y >= room.y && y < room.y+room.h) {
                                inRoom = r; break;
                            }
                        }
                        if (inRoom !== -1) {
                            const weight = 1 + depth[inRoom] * 0.5;
                            bushCandidates.push({x, y, weight});
                        }
                    }
                }
            }
            bushCandidates.sort((a,b) => b.weight - a.weight);
            const selected = bushCandidates.slice(0, bushCount);
            for (const tile of selected) {
                const bx = tile.x*TILE_SIZE, by = tile.y*TILE_SIZE;
                const bw = randomInt(2,3)*TILE_SIZE, bh = randomInt(2,3)*TILE_SIZE;
                const bush = createBush(bx, by, bw, bh);
                let overlap = false;
                for (const o of obstacles) {
                    if (rectsOverlap(bush, o, 3)) { overlap=true; break; }
                }
                if (!overlap) bushes.push(bush);
            }
        }

        // Itens
        items = [];
        const itemSize = 7;
        const sortedRooms = rooms.map((r,i) => ({idx: i, depth: depth[i]}))
                                 .sort((a,b) => b.depth - a.depth);
        let placedItems = 0;
        for (const entry of sortedRooms) {
            if (placedItems >= numItems) break;
            const idx = entry.idx;
            const room = rooms[idx];
            let attempts = 0;
            while (attempts < 80 && placedItems < numItems) {
                const tx = room.x + randomInt(2, room.w-3);
                const ty = room.y + randomInt(2, room.h-3);
                const ix = tx*TILE_SIZE + TILE_SIZE/2;
                const iy = ty*TILE_SIZE + TILE_SIZE/2;
                const ir = { x: ix-itemSize/2, y: iy-itemSize/2, w:itemSize, h:itemSize };
                if (idx === spawnIdx && Math.hypot(ix-player.x, iy-player.y) < 30) { attempts++; continue; }
                if (idx === exitIdx && Math.hypot(ix-exitZone.x-exitZone.w/2, iy-exitZone.y-exitZone.h/2) < 30) { attempts++; continue; }
                let blocked = false;
                for (const o of obstacles) {
                    if (rectsOverlap(ir, o, 4)) { blocked=true; break; }
                }
                if (!blocked) {
                    items.push({ x: Math.floor(ix), y: Math.floor(iy), size:itemSize, collected:false, glowPhase: rng()*Math.PI*2 });
                    placedItems++;
                    break;
                }
                attempts++;
            }
        }
        if (placedItems < numItems) {
            for (let i=0; i<rooms.length && placedItems < numItems; i++) {
                const room = rooms[i];
                let attempts = 0;
                while (attempts < 80 && placedItems < numItems) {
                    const tx = room.x + randomInt(2, room.w-3);
                    const ty = room.y + randomInt(2, room.h-3);
                    const ix = tx*TILE_SIZE + TILE_SIZE/2;
                    const iy = ty*TILE_SIZE + TILE_SIZE/2;
                    const ir = { x: ix-itemSize/2, y: iy-itemSize/2, w:itemSize, h:itemSize };
                    let blocked = false;
                    for (const o of obstacles) {
                        if (rectsOverlap(ir, o, 4)) { blocked=true; break; }
                    }
                    if (!blocked) {
                        items.push({ x: Math.floor(ix), y: Math.floor(iy), size:itemSize, collected:false, glowPhase: rng()*Math.PI*2 });
                        placedItems++;
                        break;
                    }
                    attempts++;
                }
            }
        }

        // Guardas e Cães Robôs
        guards = [];
        robotDogs = [];
        const diffMult = world.difficultyMult;
        const weights = rooms.map((r,i) => 1 + depth[i] * 0.8);
        const totalWeight = weights.reduce((a,b)=>a+b,0);
        const guardSlots = [];
        for (let g=0; g<numGuards; g++) {
            let rnd = Math.random() * totalWeight;
            let acc = 0;
            let selected = 0;
            for (let i=0; i<weights.length; i++) {
                acc += weights[i];
                if (rnd <= acc) { selected = i; break; }
            }
            guardSlots.push(selected);
        }
        for (const roomIdx of guardSlots) {
            const isDog = Math.random() < 0.3;
            const room = rooms[roomIdx];
            const gx = (room.x + room.w/2)*TILE_SIZE;
            const gy = (room.y + room.h/2)*TILE_SIZE;

            const numWaypoints = randomInt(4,6);
            const patrolPath = [];
            for (let i=0; i<numWaypoints; i++) {
                const candidates = [];
                for (let y=room.y; y<room.y+room.h; y++) {
                    for (let x=room.x; x<room.x+room.w; x++) {
                        if (grid[y][x] === FLOOR) candidates.push({x,y});
                    }
                }
                if (candidates.length===0) break;
                const tile = candidates[randomInt(0, candidates.length-1)];
                const wpx = tile.x*TILE_SIZE + TILE_SIZE/2;
                const wpy = tile.y*TILE_SIZE + TILE_SIZE/2;
                patrolPath.push({ x: Math.floor(wpx), y: Math.floor(wpy) });
            }
            if (patrolPath.length===0) patrolPath.push({ x: Math.floor(gx), y: Math.floor(gy) });

            if (isDog) {
                const dog = createRobotDog(patrolPath[0].x, patrolPath[0].y, patrolPath);
                dog.facingAngle = patrolPath.length>1 ? Math.atan2(patrolPath[1].y-dog.y, patrolPath[1].x-dog.x) : rng()*Math.PI*2;
                dog.targetAngle = dog.facingAngle;
                dog.patrolWaitTimer = 0.3 + rng()*0.8;
                dog.scentDetectionRadius = 50 + phaseDifficulty * 3;
                dog.speed = (40 + phaseDifficulty*1.2) * diffMult;
                dog.chaseSpeed = (65 + phaseDifficulty*2.5) * diffMult;
                robotDogs.push(dog);
            } else {
                const guard = createGuard(patrolPath[0].x, patrolPath[0].y, patrolPath);
                guard.patrolIndex = 0;
                guard.facingAngle = patrolPath.length>1 ? Math.atan2(patrolPath[1].y-guard.y, patrolPath[1].x-guard.x) : rng()*Math.PI*2;
                guard.targetAngle = guard.facingAngle;
                guard.patrolWaitTimer = 0.3 + rng()*0.5;
                guard.lookSweepTimer = rng()*5;
                guard.patrolVariance = rng()*0.5;
                guard.speed = (34 + phaseDifficulty*1.5) * diffMult;
                guard.chaseSpeed = (65 + phaseDifficulty*3) * diffMult;
                guard.visionRange = (120 + phaseDifficulty*4) * (permanentUpgrades && permanentUpgrades.includes('lib_forbidden') ? 0.85 : 1) * (equippedItems && equippedItems.includes('grave_mask') ? 0.75 : 1);
                guards.push(guard);
            }
        }

        // Câmeras (simplificado, mas mantendo a estrutura)
        cameras = [];
        const numCameras = Math.min(3, Math.floor(rooms.length / 2));
        for (let i=0; i<numCameras; i++) {
            const room = rooms[randomInt(0, rooms.length-1)];
            const cx = (room.x + room.w/2) * TILE_SIZE + randomInt(-10, 10);
            const cy = (room.y + room.h/2) * TILE_SIZE + randomInt(-10, 10);
            cameras.push({
                id: i,
                x: cx, y: cy,
                angle: randomRange(0, Math.PI*2),
                visionRange: 80 + randomRange(0, 30),
                visionAngle: Math.PI/3,
                rotationSpeed: 0.6 + randomRange(0, 0.4),
                currentAngle: 0,
                targetAngle: 0,
                sweepAngle: Math.PI/2.8,
                state: 'NORMAL',
                detectionLevel: 0,
                detectionCooldown: 0,
                timer: randomRange(0, 10),
                direction: 1,
                coneColor: 'rgba(255,50,50,0.3)',
                alertColor: 'rgba(255,0,0,0.5)',
                visible: true,
                lastAlertTime: 0,
                alertCooldown: 0.5
            });
        }

        // Limpeza
        particles.length = 0;
        detectionMeter = 0; detectionFlash = 0;
        shakeIntensity = 0; shakeDuration = 0;
        freezeTimer = 0; winTimer = 0;
        worldTransTimer = 0; worldTransAlpha = 0;
        gameOverTimer = 0;
        globalTime = 0;
        navGridDirty = true;
        itemsCollectedThisPhase = 0;
        if (player) { player.camouflaged = false; player.camouflageTimer = 0; player.crowProgramming = false; }
        SecurityAlertSystem.reset();
        crows = [];
        cancelCrowProgramming();
        ScentSystem.scents = [];
    }

    // ============================================================
    // NAVIGATION GRID
    // ============================================================
    const NAV_CELL = 12;
    const NAV_COLS = Math.floor(GAME_W / NAV_CELL);
    const NAV_ROWS = Math.floor(GAME_H / NAV_CELL);
    let navGrid = [];
    let navGridDirty = true;

    function buildNavGrid() {
        navGrid = [];
        const blockers = getAllBlockers();
        for (let row=0; row<NAV_ROWS; row++) {
            navGrid[row] = [];
            for (let col=0; col<NAV_COLS; col++) {
                const cx = col*NAV_CELL + NAV_CELL/2;
                const cy = row*NAV_CELL + NAV_CELL/2;
                let blocked = false;
                for (const b of blockers) {
                    if (cx >= b.x && cx <= b.x+b.w && cy >= b.y && cy <= b.y+b.h) { blocked = true; break; }
                }
                navGrid[row][col] = blocked ? 1 : 0;
            }
        }
        navGridDirty = false;
    }
    function worldToNav(wx, wy) {
        return { col: Math.max(0, Math.min(NAV_COLS-1, Math.floor(wx/NAV_CELL))),
                 row: Math.max(0, Math.min(NAV_ROWS-1, Math.floor(wy/NAV_CELL))) };
    }
    function navToWorld(col, row) { return { x: col*NAV_CELL + NAV_CELL/2, y: row*NAV_CELL + NAV_CELL/2 }; }
    function findNearestFree(col, row) {
        for (let r=1; r<8; r++) {
            for (let dc=-r; dc<=r; dc++) {
                for (let dr=-r; dr<=r; dr++) {
                    if (Math.abs(dc)!==r && Math.abs(dr)!==r) continue;
                    const nc=col+dc, nr=row+dr;
                    if (nc>=0 && nc<NAV_COLS && nr>=0 && nr<NAV_ROWS && navGrid[nr][nc]===0)
                        return {col:nc, row:nr};
                }
            }
        }
        return null;
    }
    function findPath(startWX, startWY, endWX, endWY) {
        if (navGridDirty) buildNavGrid();
        let start = worldToNav(startWX, startWY);
        let end = worldToNav(endWX, endWY);
        if (start.col===end.col && start.row===end.row) return [navToWorld(end.col, end.row)];
        if (navGrid[end.row] && navGrid[end.row][end.col]===1) {
            const n = findNearestFree(end.col, end.row);
            if (!n) return null;
            end.col = n.col; end.row = n.row;
        }
        if (navGrid[start.row] && navGrid[start.row][start.col]===1) {
            const n = findNearestFree(start.col, start.row);
            if (!n) return null;
            start.col = n.col; start.row = n.row;
        }
        const visited = new Array(NAV_ROWS).fill(null).map(()=>new Array(NAV_COLS).fill(false));
        const parent = new Array(NAV_ROWS).fill(null).map(()=>new Array(NAV_COLS).fill(null));
        const queue = [{col:start.col, row:start.row}];
        visited[start.row][start.col] = true;
        const dirs = [{dc:0,dr:-1},{dc:1,dr:0},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:-1},{dc:1,dr:1},{dc:-1,dr:1},{dc:-1,dr:-1}];
        let found = false;
        while (queue.length>0 && !found) {
            const cur = queue.shift();
            for (const d of dirs) {
                const nc=cur.col+d.dc, nr=cur.row+d.dr;
                if (nc>=0 && nc<NAV_COLS && nr>=0 && nr<NAV_ROWS && !visited[nr][nc] && navGrid[nr][nc]===0) {
                    visited[nr][nc]=true; parent[nr][nc]=cur; queue.push({col:nc,row:nr});
                    if (nc===end.col && nr===end.row) { found=true; break; }
                }
            }
        }
        if (!found) return null;
        const path = [];
        let cur = {col:end.col, row:end.row};
        while (cur) { path.unshift(navToWorld(cur.col, cur.row)); cur = parent[cur.row][cur.col]; }
        if (path.length<=1) return [navToWorld(end.col, end.row)];
        const simplified = [path[0]];
        for (let i=1; i<path.length-1; i++) {
            const prev = simplified[simplified.length-1];
            if (Math.abs(path[i].x - prev.x - (path[i+1].x - path[i].x)) > 1 ||
                Math.abs(path[i].y - prev.y - (path[i+1].y - path[i].y)) > 1)
                simplified.push(path[i]);
        }
        simplified.push(path[path.length-1]);
        return simplified;
    }

    // ============================================================
    // SISTEMA DE PARTÍCULAS
    // ============================================================
    class Particle {
        constructor(x,y,vx,vy,life,color,size=1,gravity=0) {
            this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
            this.color=color; this.size=size; this.gravity=gravity; this.alive=true;
        }
        update(dt) {
            this.x += this.vx*dt; this.y += this.vy*dt; this.vy += this.gravity*dt;
            this.life -= dt;
            if (this.life <= 0) this.alive = false;
        }
        get alpha() { return Math.max(0, Math.pow(this.life/this.maxLife, 1.5)); }
        get currentSize() { return this.size * (0.5 + 0.5*(this.life/this.maxLife)); }
    }
    const particles = [];

    function spawnParticles(x,y,count,color,speed=30,life=0.4,size=1,gravity=0) {
        try {
            for (let i=0; i<count; i++) {
                const a = Math.random()*Math.PI*2;
                const s = speed*(0.3+Math.random()*0.7);
                particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,life*(0.5+Math.random()*0.5),color,size,gravity));
            }
        } catch(e) {}
    }

    // ============================================================
    // SECURITY ALERT SYSTEM
    // ============================================================
    const SecurityAlertSystem = {
        state: 'NORMAL',
        alertCooldown: 0,
        lastAlertPosition: null,
        alertTimer: 0,
        maxAlertDuration: 5.0,

        reset: function() {
            this.state = 'NORMAL';
            this.alertCooldown = 0;
            this.lastAlertPosition = null;
            this.alertTimer = 0;
        },

        triggerAlert: function(position, level = 'ALERT') {
            if (this.state === 'ALERT' && this.alertTimer > 0) return;
            if (this.alertCooldown > 0) return;

            this.state = level;
            this.lastAlertPosition = { x: position.x, y: position.y };
            this.alertTimer = this.maxAlertDuration;
            this.alertCooldown = 0.5;

            for (const guard of guards) {
                if (guard.state === 'chase') continue;
                const distToAlert = Math.hypot(guard.x - position.x, guard.y - position.y);
                if (distToAlert > 250) continue;

                guard.investigationTarget = { x: position.x, y: position.y };
                guard.lastKnownPlayerPos = { x: position.x, y: position.y };
                guard.investigationTimer = 3.0;
                if (guard.state !== 'investigate' && guard.state !== 'chase') {
                    transitionGuard(guard, 'investigate');
                }
            }

            AudioEvents.play('camera:alert');
            detectionFlash = Math.max(detectionFlash, 0.6);
            shakeIntensity = Math.max(shakeIntensity, 2);
            shakeDuration = Math.max(shakeDuration, 0.3);
        },

        update: function(dt) {
            if (this.alertCooldown > 0) this.alertCooldown -= dt;
            if (this.state === 'ALERT' || this.state === 'SUSPICIOUS') {
                this.alertTimer -= dt;
                if (this.alertTimer <= 0) {
                    this.state = 'NORMAL';
                    this.lastAlertPosition = null;
                }
            }
        },

        getState: function() { return this.state; },
        isAlert: function() { return this.state === 'ALERT'; },
        isSuspicious: function() { return this.state === 'SUSPICIOUS'; }
    };

    // ============================================================
    // IA DOS GUARDAS (completa)
    // ============================================================
    function transitionGuard(guard, newState) {
        if (guard.state === newState) return;
        guard.state = newState;
        switch (newState) {
            case 'suspicious': AudioEvents.play('guard:suspicious'); guard.lookSweepTimer=0; break;
            case 'investigate':
                guard.investigationTimer = guard.investigationMax;
                guard.investigationTarget = guard.lastKnownPlayerPos || {x:guard.x, y:guard.y};
                guard.currentPath = null;
                guard.lookSweepTimer=0;
                if (guard.state !== 'suspicious') AudioEvents.play('guard:alert');
                break;
            case 'chase':
                guard.chaseTimer=0; guard.currentPath=null; guard.pathRecalcTimer=0;
                guard.stuckTimer=0; guard.stuckCheckPos={x:guard.x, y:guard.y};
                detectionMeter = Math.max(detectionMeter, 0.85);
                AudioEvents.play('guard:chase');
                spawnParticles(guard.x, guard.y, 10, '#ff4444', 60, 0.55, 2);
                freezeTimer = Math.max(freezeTimer, 0.06);
                shakeIntensity = Math.max(shakeIntensity, 3);
                shakeDuration = Math.max(shakeDuration, 0.25);
                break;
            case 'search':
                guard.searchTimer = guard.searchMax;
                guard.lastKnownPlayerPos = guard.lastKnownPlayerPos || {x:guard.x, y:guard.y};
                guard.investigationTarget = guard.lastKnownPlayerPos;
                guard.currentPath = null;
                guard.lookSweepTimer=0;
                break;
            case 'patrol':
                detectionMeter = Math.max(0, detectionMeter-0.3);
                guard.currentPath = null; guard.lookSweepTimer=0;
                let bestDist=Infinity, bestIdx=guard.patrolIndex;
                for (let i=0; i<guard.patrolPath.length; i++) {
                    const d = Math.hypot(guard.patrolPath[i].x - guard.x, guard.patrolPath[i].y - guard.y);
                    if (d < bestDist) { bestDist=d; bestIdx=i; }
                }
                guard.patrolIndex = bestIdx;
                guard.patrolWaitTimer = randomRange(0.6, 1.8);
                break;
        }
    }

    function updateGuardAI(guard, dt) {
        if (gameState !== STATE.PLAYING) return;
        if (freezeTimer > 0) return;
        if (guard.stunnedTimer > 0) { guard.stunnedTimer -= dt; return; }

        guard.detectionCooldown = Math.max(0, guard.detectionCooldown - dt);
        // Visibilidade simplificada
        const visibility = getPlayerVisibility(guard);
        const canHear = canAnyGuardHearPlayer() && player.isRunning;
        const distToPlayer = Math.hypot(guard.x-player.x, guard.y-player.y);
        if (visibility > 0.15) {
            const fillRate = visibility > 0.7 ? 2.8 : (visibility > 0.35 ? 1.4 : 0.6);
            detectionMeter = Math.min(1, detectionMeter + fillRate*dt);
            guard.lastKnownPlayerPos = { x:player.x, y:player.y };
        } else if (detectionMeter > 0 && guard.state!=='chase' && guard.state!=='search') {
            detectionMeter = Math.max(0, detectionMeter - 0.7*dt);
        }
        switch (guard.state) {
            case 'patrol':
                if (visibility > 0.7 && detectionMeter > 0.75) transitionGuard(guard, 'chase');
                else if (detectionMeter > 0.45) transitionGuard(guard, 'suspicious');
                else if (canHear && visibility < 0.3 && distToPlayer < player.runNoiseRadius) {
                    guard.lastKnownPlayerPos = {x:player.x, y:player.y};
                    transitionGuard(guard, 'investigate');
                }
                updatePatrol(guard, dt); break;
            case 'suspicious':
                if (visibility > 0.7 && detectionMeter > 0.8) transitionGuard(guard, 'chase');
                else if (detectionMeter < 0.15 && !canHear) transitionGuard(guard, 'patrol');
                else if (canHear && player.isRunning && distToPlayer < player.runNoiseRadius) {
                    guard.lastKnownPlayerPos = {x:player.x, y:player.y};
                    transitionGuard(guard, 'investigate');
                }
                updateSuspicious(guard, dt); break;
            case 'investigate':
                if (visibility > 0.7 && detectionMeter > 0.7) transitionGuard(guard, 'chase');
                else if (guard.investigationTimer <= 0 && detectionMeter < 0.35) transitionGuard(guard, 'search');
                updateInvestigate(guard, dt); break;
            case 'chase':
                if (visibility < 0.2 && detectionMeter < 0.3 && guard.chaseTimer > 1.5) transitionGuard(guard, 'search');
                updateChase(guard, dt); break;
            case 'search':
                if (visibility > 0.55 && detectionMeter > 0.6) transitionGuard(guard, 'chase');
                else if (guard.searchTimer <= 0 && detectionMeter < 0.2) transitionGuard(guard, 'patrol');
                updateSearch(guard, dt); break;
        }
        let ad = guard.targetAngle - guard.facingAngle;
        while (ad > Math.PI) ad -= Math.PI*2;
        while (ad < -Math.PI) ad += Math.PI*2;
        const step = (guard.state === 'chase' ? 14 : 6) * dt;
        if (Math.abs(ad) < step) guard.facingAngle = guard.targetAngle;
        else guard.facingAngle += Math.sign(ad) * step;
        while (guard.facingAngle > Math.PI) guard.facingAngle -= Math.PI*2;
        while (guard.facingAngle < -Math.PI) guard.facingAngle += Math.PI*2;
    }

    function getPlayerVisibility(guard) {
        if (!player || !guard) return 0;
        if (player.camouflaged) {
            const distToGuard = Math.hypot(player.x - guard.x, player.y - guard.y);
            if (guard.state === 'investigate' && distToGuard < 35) return 0.2;
            if (guard.state === 'chase' && distToGuard < 40) return 0.35;
            return 0;
        }
        const px=player.x, py=player.y, gx=guard.x, gy=guard.y;
        const dx=px-gx, dy=py-gy;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist > guard.visionRange) return 0;
        let at = Math.atan2(dy, dx);
        let ad = at - guard.facingAngle;
        while (ad > Math.PI) ad -= Math.PI*2;
        while (ad < -Math.PI) ad += Math.PI*2;
        if (Math.abs(ad) > guard.peripheralAngle/2) return 0;
        const samples=10;
        let occluded=false, partial=false;
        for (let i=1; i<=samples; i++) {
            const t=i/samples;
            const sx=gx+dx*t, sy=gy+dy*t;
            let blk=false;
            for (const obs of obstacles) { if (pointInRect(sx,sy,obs,1)) { blk=true; break; } }
            for (const b of bushes) { if (pointInRect(sx,sy,b,0)) { blk=true; break; } }
            if (sx < roomWalls.left.x+roomWalls.left.w+1 || sx > roomWalls.right.x-1 ||
                sy < roomWalls.top.y+roomWalls.top.h+1 || sy > roomWalls.bottom.y-1) blk=true;
            if (blk) { if (i<=3) occluded=true; else partial=true; break; }
        }
        if (occluded) return 0;
        let lvl = 1.0;
        if (dist > guard.visionRangePeripheral) lvl *= 0.55;
        if (Math.abs(ad) > guard.visionAngle/2) {
            const pf = 1 - (Math.abs(ad) - guard.visionAngle/2) / (guard.peripheralAngle/2 - guard.visionAngle/2);
            lvl *= Math.max(0.15, pf);
        }
        if (partial) lvl *= 0.35;
        if (dist > guard.visionRange*0.8) lvl *= 0.5;
        return Math.max(0, Math.min(1, lvl));
    }

    function canAnyGuardHearPlayer() {
        if (!player) return false;
        if (player.camouflaged && !player.isRunning) return false;
        let noiseR = player.isRunning ? player.runNoiseRadius : (player.speed>10 ? player.noiseRadius : 0);
        if (equippedItems && equippedItems.includes('grave_bone')) noiseR *= 0.6;
        if (noiseR <= 0) return false;
        for (const g of guards) {
            if (Math.hypot(g.x - player.x, g.y - player.y) < noiseR) return true;
        }
        return false;
    }

    function updatePatrol(guard, dt) {
        if (guard.patrolWaitTimer > 0) {
            guard.patrolWaitTimer -= dt;
            guard.lookSweepTimer += dt;
            guard.lookSweepOffset = Math.sin(guard.lookSweepTimer*2.8+guard.patrolVariance)*0.5;
            guard.targetAngle = guard.facingAngle + guard.lookSweepOffset*0.7;
            guard.idleLookTimer += dt;
            if (guard.idleLookTimer > 2.5+guard.patrolVariance*3) {
                guard.idleLookTimer = 0;
                guard.idleLookTarget = guard.facingAngle + (Math.random()-0.5)*1.2;
            }
            guard.targetAngle += (guard.idleLookTarget - guard.targetAngle)*0.3;
            return;
        }
        guard.idleLookTimer = 0;
        const target = guard.patrolPath[guard.patrolIndex];
        const dx = target.x - guard.x, dy = target.y - guard.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 3) {
            guard.patrolWaitTimer = randomRange(0.5, 2.5) + guard.patrolVariance;
            guard.x = target.x; guard.y = target.y;
            guard.lookSweepTimer = 0;
            guard.patrolIndex = (guard.patrolIndex+1) % guard.patrolPath.length;
            return;
        }
        guard.targetAngle = Math.atan2(dy, dx);
        const spd = guard.speed * (0.8+Math.random()*0.4);
        guard.x += (dx/dist)*spd*dt;
        guard.y += (dy/dist)*spd*dt;
        const res = resolveCollision(guard, getAllBlockers());
        guard.x = res.x; guard.y = res.y;
    }

    function updateSuspicious(guard, dt) {
        guard.lookSweepTimer += dt;
        guard.lookSweepOffset = Math.sin(guard.lookSweepTimer*4.5)*0.7;
        if (guard.lastKnownPlayerPos) {
            const dx = guard.lastKnownPlayerPos.x - guard.x, dy = guard.lastKnownPlayerPos.y - guard.y;
            guard.targetAngle = Math.atan2(dy, dx) + guard.lookSweepOffset*0.6;
            if (Math.hypot(dx,dy) > 25) {
                const spd = guard.speed*0.35;
                guard.x += (dx/Math.hypot(dx,dy))*spd*dt;
                guard.y += (dy/Math.hypot(dx,dy))*spd*dt;
            }
        } else guard.targetAngle += guard.lookSweepOffset*0.5*dt;
        const res = resolveCollision(guard, getAllBlockers());
        guard.x = res.x; guard.y = res.y;
    }

    function updateInvestigate(guard, dt) {
        guard.investigationTimer -= dt;
        if (guard.investigationTimer <= 0) return;
        if (canAnyGuardHearPlayer() && player.isRunning) {
            guard.investigationTarget = {x:player.x, y:player.y};
            guard.investigationTimer = Math.max(guard.investigationTimer, 1.5);
            guard.lastKnownPlayerPos = {x:player.x, y:player.y};
        }
        const target = guard.investigationTarget;
        if (!target) return;
        const dx = target.x - guard.x, dy = target.y - guard.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        guard.targetAngle = Math.atan2(dy, dx);
        if (dist < 5) {
            guard.lookSweepTimer += dt;
            guard.lookSweepOffset = Math.sin(guard.lookSweepTimer*5)*0.9;
            guard.targetAngle += guard.lookSweepOffset*0.8;
            guard.investigationTimer -= dt*0.8;
            if (Math.random() < 0.02) {
                const allObs = [...obstacles, ...bushes];
                const nearby = allObs.filter(o => distBetween(guard,o) < 40);
                if (nearby.length > 0) {
                    const ch = nearby[Math.floor(Math.random()*nearby.length)];
                    guard.investigationTarget = { x: ch.x + (ch.w||0)/2, y: ch.y + (ch.h||0)/2 };
                }
            }
        } else {
            const spd = guard.investigateSpeed * (0.9+Math.random()*0.2);
            guard.x += (dx/dist)*spd*dt;
            guard.y += (dy/dist)*spd*dt;
        }
        const res = resolveCollision(guard, getAllBlockers());
        guard.x = res.x; guard.y = res.y;
    }

    function updateChase(guard, dt) {
        guard.chaseTimer += dt;
        guard.pathRecalcTimer += dt;
        if (guard.stuckCheckPos && Math.hypot(guard.x-guard.stuckCheckPos.x, guard.y-guard.stuckCheckPos.y) < 2)
            guard.stuckTimer += dt;
        else { guard.stuckTimer=0; guard.stuckCheckPos={x:guard.x, y:guard.y}; }
        if (guard.pathRecalcTimer > 0.4 || guard.stuckTimer > 0.8 || !guard.currentPath || guard.currentPath.length===0) {
            guard.pathRecalcTimer = 0;
            guard.currentPath = findPath(guard.x, guard.y, player.x, player.y);
            guard.pathTarget = guard.currentPath && guard.currentPath.length > 1 ? guard.currentPath[1] :
                               (guard.currentPath && guard.currentPath.length===1 ? guard.currentPath[0] : null);
            if (guard.stuckTimer > 0.8) { guard.stuckTimer=0; guard.currentPath=null; guard.pathTarget={x:player.x, y:player.y}; }
        }
        const target = guard.pathTarget || {x:player.x, y:player.y};
        const dx = target.x - guard.x, dy = target.y - guard.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        guard.targetAngle = Math.atan2(dy, dx);
        const spd = guard.chaseSpeed;
        if (dist > 0.5) { guard.x += (dx/dist)*spd*dt; guard.y += (dy/dist)*spd*dt; }
        if (dist < 5 && guard.currentPath && guard.currentPath.length > 1) {
            guard.currentPath.shift();
            guard.pathTarget = guard.currentPath.length > 0 ? guard.currentPath[0] : null;
        }
        const res = resolveCollision(guard, getAllBlockers());
        guard.x = res.x; guard.y = res.y;
    }

    function updateSearch(guard, dt) {
        guard.searchTimer -= dt;
        guard.lookSweepTimer += dt;
        guard.lookSweepOffset = Math.sin(guard.lookSweepTimer*4)*0.7;
        if (guard.lastKnownPlayerPos) {
            const dx = guard.lastKnownPlayerPos.x - guard.x, dy = guard.lastKnownPlayerPos.y - guard.y;
            const dist = Math.hypot(dx, dy);
            guard.targetAngle = Math.atan2(dy, dx) + guard.lookSweepOffset*0.5;
            if (dist > 8 && guard.searchTimer > 1.5) {
                const spd = guard.speed*0.5;
                guard.x += (dx/dist)*spd*dt;
                guard.y += (dy/dist)*spd*dt;
            }
        } else guard.targetAngle += guard.lookSweepOffset*0.6*dt;
        const res = resolveCollision(guard, getAllBlockers());
        guard.x = res.x; guard.y = res.y;
    }

    function resolveCollision(entity, blockers) {
        const ex=entity.x, ey=entity.y, ew=entity.w, eh=entity.h;
        let rx=ex, ry=ey;
        for (let pass=0; pass<2; pass++) {
            for (const b of blockers) {
                if (rx-ew/2 < b.x+b.w && rx+ew/2 > b.x && ry-eh/2 < b.y+b.h && ry+eh/2 > b.y) {
                    const overlaps = [
                        { v: (rx+ew/2) - b.x, axis:'x', ref: b.x - ew/2 },
                        { v: (b.x+b.w) - (rx-ew/2), axis:'x', ref: b.x + b.w + ew/2 },
                        { v: (ry+eh/2) - b.y, axis:'y', ref: b.y - eh/2 },
                        { v: (b.y+b.h) - (ry-eh/2), axis:'y', ref: b.y + b.h + eh/2 },
                    ];
                    overlaps.sort((a,b)=>a.v-b.v);
                    const best = overlaps[0];
                    if (best.axis === 'x') rx = best.ref;
                    else ry = best.ref;
                }
            }
        }
        return { x:rx, y:ry };
    }

    // ============================================================
    // IA DO CÃO ROBÔ
    // ============================================================
    function updateRobotDogAI(dog, dt) {
        if (gameState !== STATE.PLAYING) return;
        if (freezeTimer > 0) return;
        if (dog.stunnedTimer > 0) { dog.stunnedTimer -= dt; return; }

        let ad = dog.targetAngle - dog.facingAngle;
        while (ad > Math.PI) ad -= Math.PI*2;
        while (ad < -Math.PI) ad += Math.PI*2;
        const step = (dog.state === 'chase' ? 10 : 5) * dt;
        if (Math.abs(ad) < step) dog.facingAngle = dog.targetAngle;
        else dog.facingAngle += Math.sign(ad) * step;
        while (dog.facingAngle > Math.PI) dog.facingAngle -= Math.PI*2;
        while (dog.facingAngle < -Math.PI) dog.facingAngle += Math.PI*2;

        switch (dog.state) {
            case 'patrol':
                updateDogPatrol(dog, dt); break;
            case 'sniffing':
                updateDogSniffing(dog, dt); break;
            case 'tracking':
                updateDogTracking(dog, dt); break;
            case 'chase':
                updateDogChase(dog, dt); break;
        }
    }

    function updateDogPatrol(dog, dt) {
        if (dog.patrolWaitTimer > 0) {
            dog.patrolWaitTimer -= dt;
            dog.targetAngle += Math.sin(globalTime * 2 + dog.patrolIndex) * 0.1;
            return;
        }
        const target = dog.patrolPath[dog.patrolIndex];
        if (!target) return;
        const dx = target.x - dog.x;
        const dy = target.y - dog.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 3) {
            dog.patrolWaitTimer = randomRange(0.5, 2.0);
            dog.x = target.x; dog.y = target.y;
            dog.patrolIndex = (dog.patrolIndex + 1) % dog.patrolPath.length;
            return;
        }
        dog.targetAngle = Math.atan2(dy, dx);
        const spd = dog.speed * (0.7 + Math.random() * 0.6);
        dog.x += (dx / dist) * spd * dt;
        dog.y += (dy / dist) * spd * dt;
        const res = resolveCollision(dog, getAllBlockers());
        dog.x = res.x; dog.y = res.y;

        const scents = ScentSystem.getScentsInRadius(dog.x, dog.y, dog.scentDetectionRadius);
        if (scents.length > 0) {
            dog.state = 'sniffing';
            dog.sniffTimer = 0;
            dog.trackingPointIndex = 0;
            scents.sort((a,b) => b.life - a.life);
            dog.lastKnownScent = scents[0];
            AudioEvents.play('robotDog:sniff');
        }
    }

    function updateDogSniffing(dog, dt) {
        dog.sniffTimer += dt;
        if (dog.sniffTimer > dog.sniffDuration) {
            dog.state = 'tracking';
            dog.trackingPointIndex = 0;
            dog.trackingTimer = 0;
            const scents = ScentSystem.getScentsInRadius(dog.x, dog.y, dog.scentDetectionRadius);
            if (scents.length > 0) {
                scents.sort((a,b) => b.life - a.life);
                dog.lastKnownScent = scents[0];
            } else {
                dog.state = 'patrol';
                dog.patrolWaitTimer = 0.5;
            }
            return;
        }
        dog.targetAngle += dt * 1.5;
        const scents = ScentSystem.getScentsInRadius(dog.x, dog.y, dog.scentDetectionRadius);
        if (scents.length === 0) {
            dog.sniffTimer = dog.sniffDuration;
        }
    }

    function updateDogTracking(dog, dt) {
        dog.trackingTimer += dt;
        const scents = ScentSystem.getScentsInRadius(dog.x, dog.y, 120);
        if (scents.length === 0) {
            dog.state = 'patrol';
            dog.patrolWaitTimer = 0.5;
            return;
        }
        scents.sort((a,b) => b.life - a.life);
        let targetScent = null;
        for (const s of scents) {
            const dist = Math.hypot(s.x - dog.x, s.y - dog.y);
            if (dist > 10) {
                targetScent = s;
                break;
            }
        }
        if (!targetScent) targetScent = scents[0];

        const dx = targetScent.x - dog.x;
        const dy = targetScent.y - dog.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 5) {
            const idx = ScentSystem.scents.indexOf(targetScent);
            if (idx !== -1) ScentSystem.scents.splice(idx, 1);
            return;
        }

        dog.targetAngle = Math.atan2(dy, dx);
        const spd = dog.speed * 0.9;
        dog.x += (dx / dist) * spd * dt;
        dog.y += (dy / dist) * spd * dt;
        const res = resolveCollision(dog, getAllBlockers());
        dog.x = res.x; dog.y = res.y;

        if (player && Math.hypot(dog.x - player.x, dog.y - player.y) < 80) {
            dog.state = 'chase';
            dog.chaseTimer = 0;
            AudioEvents.play('robotDog:chase');
            spawnParticles(dog.x, dog.y, 8, '#ff8844', 50, 0.4, 2, -5);
        }
        if (dog.trackingTimer > 6) {
            dog.state = 'patrol';
            dog.patrolWaitTimer = 0.5;
        }
    }

    function updateDogChase(dog, dt) {
        dog.chaseTimer += dt;
        if (!player) { dog.state = 'patrol'; return; }
        const dx = player.x - dog.x;
        const dy = player.y - dog.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 10) {
            triggerCaught();
            return;
        }
        if (dist > 150 && dog.chaseTimer > 2) {
            dog.state = 'patrol';
            dog.patrolWaitTimer = 0.5;
            return;
        }
        dog.targetAngle = Math.atan2(dy, dx);
        const spd = dog.chaseSpeed;
        dog.x += (dx / dist) * spd * dt;
        dog.y += (dy / dist) * spd * dt;
        const res = resolveCollision(dog, getAllBlockers());
        dog.x = res.x; dog.y = res.y;

        dog.barkTimer -= dt;
        if (dog.barkTimer <= 0) {
            dog.barkTimer = 0.5 + Math.random() * 0.5;
            AudioEvents.play('robotDog:chase');
        }
        if (player.camouflaged && dist > 40) {
            dog.state = 'tracking';
            dog.trackingTimer = 0;
        }
    }

    // ============================================================
    // JOGADOR
    // ============================================================
    function updatePlayer(dt) {
        if (!player || gameState !== STATE.PLAYING) return;
        if (crowProgramming.active) return;
        const keyIX = (keys['KeyD']||keys['ArrowRight']?1:0) - (keys['KeyA']||keys['ArrowLeft']?1:0);
        const keyIY = (keys['KeyS']||keys['ArrowDown']?1:0) - (keys['KeyW']||keys['ArrowUp']?1:0);
        const ix = Math.max(-1, Math.min(1, keyIX + joystickAxisX));
        const iy = Math.max(-1, Math.min(1, keyIY + joystickAxisY));
        const im = Math.sqrt(ix*ix + iy*iy);
        const ia = im > 0.01 ? Math.atan2(iy, ix) : player.facingAngle;
        player.isRunning = (shiftDown || runButtonActive) && im > 0.01;
        const inBush = isPlayerInBush();
        const camoSpeed = equippedItems && equippedItems.includes('hunt_bow') ? 1.5 : 1.0;
        if (inBush && !player.camouflaged) {
            player.camouflageTimer += dt * camoSpeed;
            if (player.camouflageTimer > 0.4) {
                player.camouflaged = true;
                AudioEvents.play('player:camouflage');
                spawnParticles(player.x, player.y, 6, '#88cc88', 20, 0.35, 1.2, -3);
            }
        } else if (!inBush && player.camouflaged) {
            player.camouflaged = false;
            player.camouflageTimer = 0;
        }
        if (player.camouflaged && player.isRunning) {
            player.camouflaged = false;
            player.camouflageTimer = 0;
            spawnParticles(player.x, player.y, 4, '#aaddaa', 25, 0.3, 1, -2);
        }

        let maxSpd = player.isRunning ? 118 : 64;
        if (equippedItems && equippedItems.includes('hunt_knife')) maxSpd *= 1.1;
        const acc = player.isRunning ? 580 : 400;
        const dec = player.isRunning ? 500 : 360;
        const slideDec = 280;
        if (im > 0.01) { player.targetSpeed = maxSpd * Math.min(1, im); player.facingAngle = ia; }
        else { player.targetSpeed = 0; }
        const sd = player.targetSpeed - player.speed;
        const ar = player.targetSpeed > player.speed ? acc : dec;
        if (Math.abs(sd) < 1.5) player.speed = player.targetSpeed;
        else player.speed += Math.sign(sd) * Math.min(Math.abs(sd), ar*dt);
        player.speed = Math.max(0, Math.min(maxSpd, player.speed));
        if (player.targetSpeed < 0.5 && player.speed > 0.5) {
            player.residualVx = Math.cos(player.facingAngle)*player.speed*0.4;
            player.residualVy = Math.sin(player.facingAngle)*player.speed*0.4;
            player.speed = 0;
        }
        if (player.targetSpeed < 0.5 && (Math.abs(player.residualVx)>0.3 || Math.abs(player.residualVy)>0.3)) {
            player.residualVx *= Math.exp(-slideDec*dt/60);
            player.residualVy *= Math.exp(-slideDec*dt/60);
            if (Math.abs(player.residualVx)<0.3) player.residualVx=0;
            if (Math.abs(player.residualVy)<0.3) player.residualVy=0;
        } else if (player.targetSpeed > 0.5) { player.residualVx=0; player.residualVy=0; }
        player.vx = Math.cos(player.facingAngle)*player.speed + player.residualVx;
        player.vy = Math.sin(player.facingAngle)*player.speed + player.residualVy;
        player.x += player.vx*dt;
        player.y += player.vy*dt;
        const res = resolveCollision(player, getAllBlockers());
        player.x = res.x; player.y = res.y;
        player.x = Math.max(roomWalls.left.x+roomWalls.left.w + player.w/2, Math.min(roomWalls.right.x - player.w/2, player.x));
        player.y = Math.max(roomWalls.top.y+roomWalls.top.h + player.h/2, Math.min(roomWalls.bottom.y - player.h/2, player.y));
        if (player.speed > 5 || Math.abs(player.residualVx)>0.5 || Math.abs(player.residualVy)>0.5)
            player.headBobPhase += dt * (player.isRunning ? 14 : 9);
        const moving = player.speed>6 || Math.abs(player.residualVx)>2 || Math.abs(player.residualVy)>2;
        if (moving) {
            const intv = player.isRunning ? player.runFootstepInterval : player.footstepInterval;
            player.footstepTimer -= dt;
            if (player.footstepTimer <= 0) {
                player.footstepTimer = intv*(0.8+Math.random()*0.4);
                if (!player.camouflaged) {
                    if (player.isRunning) AudioEvents.play('player:run');
                    else AudioEvents.play('player:step');
                }
                if (player.isRunning && !player.camouflaged) spawnParticles(player.x, player.y+player.h/2, 2, '#8888aa', 16, 0.22, 1, 10);
            }
        } else player.footstepTimer = Math.min(player.footstepTimer, 0.06);
        if (player.speed > 18 || Math.abs(player.residualVx)>3 || Math.abs(player.residualVy)>3) {
            player.trailPositions.push({ x:player.x, y:player.y, life:0.2 });
            if (player.trailPositions.length > 10) player.trailPositions.shift();
        }
        for (const t of player.trailPositions) t.life -= dt;
        player.trailPositions = player.trailPositions.filter(t=>t.life>0);

        // Scent
        if (moving && !player.camouflaged) {
            const intensity = player.isRunning ? 0.8 : 0.3;
            ScentSystem.addScent(player.x, player.y, intensity);
        }

        for (const it of items) {
            if (!it.collected && Math.hypot(player.x-it.x, player.y-it.y) < it.size + player.w/2 + 3) {
                it.collected = true;
                itemsCollectedThisPhase++;
                AudioEvents.play('player:pickup');
                spawnParticles(it.x, it.y, 20, '#ffd700', 55, 0.6, 2, -8);
                spawnParticles(it.x, it.y, 12, '#ffffff', 40, 0.4, 1, -5);
            }
        }
        const reqItems = equippedItems && equippedItems.includes('pris_lockpick') ? items.length - 1 : items.length;
        if (allItemsCollected() && exitZone) {
            const ex = exitZone.x+exitZone.w/2, ey = exitZone.y+exitZone.h/2;
            if (Math.hypot(player.x-ex, player.y-ey) < exitZone.w/2 + player.w/2 + 5) triggerWin();
        }
        checkPhysicalCapture();
    }

    function allItemsCollected() { return items.every(it=>it.collected); }

    function checkPhysicalCapture() {
        if (gameState !== STATE.PLAYING) return;
        for (const guard of guards) {
            if (guard.state === 'chase' && entitiesOverlap(player, guard)) { triggerCaught(); return; }
        }
        for (const dog of robotDogs) {
            if (dog.state === 'chase' && entitiesOverlap(player, dog)) { triggerCaught(); return; }
        }
    }

    // ============================================================
    // EVENTOS DE GAME
    // ============================================================
    function triggerCaught() {
        gameState = STATE.CAUGHT;
        freezeTimer = 0.5;
        shakeIntensity = 8; shakeDuration = 0.6;
        detectionFlash = 1.0; detectionMeter = 1;
        AudioEvents.play('player:caught');
        spawnParticles(player.x, player.y, 40, '#ff2222', 90, 0.7, 2.5, 25);
        spawnParticles(player.x, player.y, 25, '#ff8800', 65, 0.55, 1.8, 15);
        for (const guard of guards) {
            if (guard.state === 'chase') spawnParticles(guard.x, guard.y, 20, '#ff5544', 60, 0.6, 2, 20);
        }
        for (const dog of robotDogs) {
            if (dog.state === 'chase') spawnParticles(dog.x, dog.y, 20, '#ff8844', 60, 0.6, 2, 20);
        }
        cancelCrowProgramming();
    }

    function applyDeathPenalty() {
        lives--;
        AudioEvents.play('player:lifeLost');
        if (lives <= 0) { gameState = STATE.GAME_OVER; gameOverTimer = 2.5; freezeTimer = 0; AudioEvents.play('gameover'); }
        else { phaseBestCollections = [0,0,0,0,0]; totalItemsCollectedThisWorld = 0; worldDetectionSum = 0; resetToWorldCheckpoint(); }
    }

    function resetToWorldCheckpoint() {
        currentPhaseInWorld = 1;
        generateRoom(currentWorldIndex, currentPhaseInWorld);
        detectionMeter = 0; detectionFlash = 0; freezeTimer = 0; winTimer = 0;
        worldTransTimer = 0; worldTransAlpha = 0; gameOverTimer = 0;
        shakeIntensity = 0; shakeDuration = 0;
        particles.length = 0;
        if (player) player.trailPositions = [];
        startRoomIntro();
    }

    function startRoomIntro() {
        const isFirstVisitInWorld = !visitedWorlds.has(currentWorldIndex);
        if (isFirstVisitInWorld) { visitedWorlds.add(currentWorldIndex); introDuration = 3.8; introDelay = 1.8; }
        else { introDuration = 0.8; introDelay = 0.0; }
        gameState = STATE.INTRO;
        introTimer = 0;
        camera.x = GAME_W/2; camera.y = GAME_H/2;
        targetZoom = 1.5;
        cameraZoom = 1.0;
    }

    function updateIntro(dt) {
        introTimer += dt;
        if (introTimer < introDelay) {
            cameraZoom = 1.0;
            camera.x = GAME_W/2; camera.y = GAME_H/2;
        } else {
            const t = Math.min((introTimer - introDelay) / (introDuration - introDelay), 1.0);
            const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
            cameraZoom = 1.0 + (targetZoom - 1.0) * e;
            camera.x = GAME_W/2 + (player.x - GAME_W/2) * e;
            camera.y = GAME_H/2 + (player.y - GAME_H/2) * e;
        }
        if (introTimer >= introDuration) finishIntro();
    }

    function finishIntro() {
        gameState = STATE.PLAYING;
        camera.x = player.x; camera.y = player.y;
        cameraZoom = targetZoom;
    }

    function triggerWin() {
        if (currentPhaseInWorld >= getWorldPhaseCount()) {
            worldDetectionSum += detectionMeter;
            if (currentWorldIndex < WORLDS.length - 1) {
                gameState = STATE.WORLD_SUMMARY;
                worldSummaryTimer = 4.0;
                const rew = calculateWorldReward();
                playerCoins += rew.reward;
                AudioEvents.play('reward');
                spawnParticles(player.x, player.y, 50, '#ffd700', 80, 1.0, 2.5, -5);
                saveGameState();
            } else {
                gameState = STATE.WIN;
                winTimer = 3.0;
                AudioEvents.play('victory');
                spawnParticles(player.x, player.y, 60, '#ffd700', 90, 1.2, 3, -5);
                saveGameState();
            }
        } else {
            worldDetectionSum += detectionMeter;
            if (itemsCollectedThisPhase > phaseBestCollections[currentPhaseInWorld-1])
                phaseBestCollections[currentPhaseInWorld-1] = itemsCollectedThisPhase;
            totalItemsCollectedThisWorld += itemsCollectedThisPhase;
            gameState = STATE.WIN;
            winTimer = 1.5;
            shakeIntensity = 3; shakeDuration = 0.45;
            detectionFlash = 0; detectionMeter = 0;
            AudioEvents.play('victory');
            spawnParticles(player.x, player.y, 45, '#ffd700', 75, 0.8, 2, -5);
            spawnParticles(player.x, player.y, 30, '#ffffff', 55, 0.6, 1, -3);
            spawnParticles(exitZone.x+exitZone.w/2, exitZone.y+exitZone.h/2, 25, '#4ecdc4', 50, 0.55, 2, -5);
        }
        cancelCrowProgramming();
    }

    function calculateWorldReward() {
        const world = getCurrentWorld();
        let totalItems = 0;
        for (let i=0; i<world.totalPhases; i++) totalItems += phaseBestCollections[i];
        const itemBonus = totalItems * 15;
        const phasesCompleted = world.totalPhases;
        const avgDetection = phasesCompleted > 0 ? worldDetectionSum / phasesCompleted : 0;
        const stealthBonus = Math.round((1-avgDetection) * 100);
        let reward = world.baseReward + itemBonus + stealthBonus;
        if (permanentUpgrades && permanentUpgrades.includes('grave_relic')) reward = Math.round(reward * 1.15);
        if (permanentUpgrades && permanentUpgrades.includes('grave_medallion')) reward = Math.round(reward * 2);
        return { reward, totalItems, stealthBonus, itemBonus };
    }

    function restartGame() {
        visitedWorlds.clear();
        currentWorldIndex = 0; currentPhaseInWorld = 1;
        lives = MAX_LIVES + (permanentUpgrades ? permanentUpgrades.filter(u=>u==='lib_tome').length : 0);
        generateRoom(currentWorldIndex, currentPhaseInWorld);
        detectionMeter=0; detectionFlash=0; freezeTimer=0; winTimer=0;
        worldTransTimer=0; worldTransAlpha=0; gameOverTimer=0;
        shakeIntensity=0; shakeDuration=0;
        particles.length=0;
        phaseBestCollections = [0,0,0,0,0];
        worldDetectionSum = 0; totalItemsCollectedThisWorld = 0;
        if (player) player.trailPositions = [];
        startRoomIntro();
        cancelCrowProgramming();
    }

    function nextPhase() {
        currentPhaseInWorld++;
        if (currentPhaseInWorld > getWorldPhaseCount()) currentPhaseInWorld = getWorldPhaseCount();
        generateRoom(currentWorldIndex, currentPhaseInWorld);
        detectionMeter=0; detectionFlash=0; freezeTimer=0; winTimer=0;
        worldTransTimer=0; worldTransAlpha=0; gameOverTimer=0;
        shakeIntensity=0; shakeDuration=0;
        particles.length=0;
        if (player) player.trailPositions = [];
        startRoomIntro();
        cancelCrowProgramming();
    }

    function advanceWorld() {
        currentWorldIndex++;
        currentPhaseInWorld = 1;
        lives = MAX_LIVES + (permanentUpgrades ? permanentUpgrades.filter(u=>u==='lib_tome').length : 0);
        phaseBestCollections = [0,0,0,0,0];
        worldDetectionSum = 0; totalItemsCollectedThisWorld = 0;
        generateRoom(currentWorldIndex, currentPhaseInWorld);
        detectionMeter=0; detectionFlash=0; freezeTimer=0; winTimer=0;
        worldTransTimer=0; worldTransAlpha=0; gameOverTimer=0;
        shakeIntensity=0; shakeDuration=0;
        particles.length=0;
        if (player) player.trailPositions = [];
        startRoomIntro();
        cancelCrowProgramming();
    }

    function clearShopItemSlots() {
        for (let i=1; i<=7; i++) {

            if (pos) pos.innerHTML = '';
        }
    }

    function setupShopItemSlots(items) {
        if (!items || items.length===0) return;
        items.forEach((item, index) => {
            const targetPos = document.getElementById('item-pos' + (index+1));
            if (targetPos) {
                const itemEl = document.createElement('div');
                itemEl.className = 'shop-item-world ' + (item.glowClass || '');
                itemEl.setAttribute('data-name', item.name);
                itemEl.innerHTML = item.svg;
                itemEl.onclick = (e) => {
                    e.stopPropagation();
                    openShopModal(item);
                    AudioEvents.play('ui:click');
                };
                targetPos.appendChild(itemEl);
            }
        });

    function renderShopInventory() {
        const grid = document.getElementById('inventory-slots');
        grid.innerHTML = '';
        const displayItems = inventory.slice(0, MAX_INVENTORY);
        for (let i=0; i<MAX_INVENTORY; i++) {
            const slot = document.createElement('div');
            slot.className = 'inv-slot';
            if (i < displayItems.length) {
                const item = displayItems[i];
                const qty = item.quantity || 1;
                slot.innerHTML = `<div class="item-icon">${item.svg}</div>
                                  <div class="inv-tooltip">
                                    <div class="inv-tooltip-name" style="color:var(--rarity-${item.rarity})">${item.name}</div>
                                    <div style="color:#fff;font-size:9px;">${item.effectDesc||'Adquirido'}</div>
                                    <div style="color:#aaa;font-size:8px;">Qtd: ${qty}</div>
                                  </div>`;
            }
            grid.appendChild(slot);
        }

    function openShopModal(item) {
        AudioEvents.play('ui:click');
        shopSelectedItem = item;
        let currentQty = 0;
        for (const invItem of inventory) {
            if (invItem.id === item.id) {
                currentQty = invItem.quantity;
                break;
            }
        }
        const maxQ = item.maxQuantity || 99;
        maxQuantityAllowed = Math.max(0, maxQ - currentQty);
        selectedQuantity = Math.min(1, maxQuantityAllowed);

        if (maxQuantityAllowed <= 0) {
            document.getElementById('btn-confirm-buy').disabled = true;
            document.getElementById('qty-plus').disabled = true;
            document.getElementById('qty-minus').disabled = true;
        } else {
            document.getElementById('btn-confirm-buy').disabled = false;
            document.getElementById('qty-plus').disabled = false;
            document.getElementById('qty-minus').disabled = (selectedQuantity <= 1);
        }

        const labelRarities = { common:'Comum', rare:'Raro', epic:'Épico' };
        document.getElementById('modal-rarity').innerText = labelRarities[item.rarity] || 'Comum';
        document.getElementById('modal-rarity').style.color = `var(--rarity-${item.rarity})`;
        document.getElementById('modal-title').innerText = item.name;
        document.getElementById('modal-desc').innerText = item.desc;
        document.getElementById('modal-art').innerHTML = item.svg;

        updateModalPrice();
        document.getElementById('purchase-modal').classList.add('active');
    }

    function updateModalPrice() {
        const item = shopSelectedItem;
        if (!item) return;
        const total = item.price * selectedQuantity;
        document.getElementById('modal-cost').innerText = item.price;
        document.getElementById('total-cost').innerText = total;
        document.getElementById('qty-display').innerText = selectedQuantity;

        const btnBuy = document.getElementById('btn-confirm-buy');
        if (playerCoins < total) {
            btnBuy.disabled = true;
        } else {
            btnBuy.disabled = (maxQuantityAllowed <= 0);
        }
        document.getElementById('qty-minus').disabled = (selectedQuantity <= 1);
        document.getElementById('qty-plus').disabled = (selectedQuantity >= maxQuantityAllowed);
    }

    function closeShopModal() {
        AudioEvents.play('ui:click');
        document.getElementById('purchase-modal').classList.remove('active');
        shopSelectedItem = null;
    }

    document.getElementById('qty-minus').addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectedQuantity > 1) {
            selectedQuantity--;
            updateModalPrice();
        }
    });

    document.getElementById('qty-plus').addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectedQuantity < maxQuantityAllowed) {
            selectedQuantity++;
            updateModalPrice();
        }
    });

    document.getElementById('btn-modal-cancel').addEventListener('click', closeShopModal);

    document.getElementById('btn-confirm-buy').addEventListener('click', ()=>{
        if (!shopSelectedItem) return;
        const totalCost = shopSelectedItem.price * selectedQuantity;
        if (playerCoins < totalCost) {
            AudioEvents.play('ui:error');
            alert('Moedas de ouro insuficientes!');
            return;
        }
        if (inventory.length >= MAX_INVENTORY && !inventory.some(it => it.id === shopSelectedItem.id)) {
            AudioEvents.play('ui:error');
            alert('Sua bolsa de inventário está cheia!');
            return;
        }
        const added = addItemToInventory(shopSelectedItem, selectedQuantity);
        if (added === 0) {
            AudioEvents.play('ui:error');
            alert('Não foi possível adicionar o item (limite de quantidade atingido)');
            return;
        }
        playerCoins -= totalCost;
        document.getElementById('player-coins').innerText = playerCoins;
        renderShopInventory();
        document.getElementById('shop-inner').classList.add('purchase-flash');
        setTimeout(()=>document.getElementById('shop-inner').classList.remove('purchase-flash'), 400);
        AudioEvents.play('ui:buy');
        closeShopModal();
        saveGameState();
    });
