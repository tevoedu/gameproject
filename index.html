<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STEALTH ROOM v5.0 — Sistema Sonoro Completo</title>
    <style>
        /* ===== ESTILOS COMPLETOS ===== */
        :root {
            --bg: #06060f;
            --color-bg: #140c1c;
            --color-wall: #2c1b2e;
            --color-wall-accent: #1f1222;
            --color-floor: #4d2b30;
            --color-floor-dark: #3a1f24;
            --color-counter: #733e39;
            --color-counter-border: #3e1e21;
            --color-counter-top: #9e5b47;
            --color-shelf: #572f38;
            --color-shelf-border: #2e171e;
            --color-shelf-board: #7a4248;
            --color-barrel: #572f38;
            --color-barrel-border: #2e171e;
            --color-npc-cape: #692430;
            --color-npc-body: #595652;
            --color-npc-skin: #dca385;
            --color-npc-beard: #e3692b;
            --color-lantern: #f4b41b;
            --color-lantern-glow: rgba(244,180,27,0.25);
            --color-ui-bg: #2c1e31;
            --color-ui-border: #5a3e5c;
            --color-ui-light: #b689a1;
            --rarity-common: #9d9d9d;
            --rarity-rare: #0070dd;
            --rarity-epic: #a335ee;
            --hotbar-bg: rgba(20,20,40,0.85);
            --hotbar-border: #4a4a6a;
            --hotbar-slot-bg: rgba(0,0,0,0.5);
            --hotbar-slot-active: #ffd700;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            cursor: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        #wrapper { position: relative; display: flex; justify-content: center; align-items: center; }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #1a1a35;
            box-shadow: 0 0 80px rgba(70,50,130,0.3), 0 0 150px rgba(20,10,50,0.5), inset 0 0 0 1px rgba(255,255,255,0.03);
            border-radius: 3px;
            transition: opacity 0.35s ease;
        }
        canvas.shop-active { opacity:0; pointer-events:none; }
        /* ===== LOJA ===== */
        #shop-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            image-rendering: pixelated;
            border: 6px solid #3d253b;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.6);
            border-radius: 4px;
            overflow: hidden;
            background: #24142c;
            z-index: 10;
            pointer-events: auto;
        }
        #shop-overlay.active { display: block; }
        #shop-inner {
            position: relative;
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }
        #shop-inner .layer { position:absolute; width:100%; height:100%; pointer-events:none; }
        #shop-inner .wall-bg {
            background-color: var(--color-wall);
            background-image: linear-gradient(90px, transparent 50%, rgba(255,255,255,.03) 50%), linear-gradient(90px, #1f1222 50%, transparent 50%), linear-gradient(transparent 50%, rgba(255,255,255,.03) 50%), linear-gradient(#1f1222 50%, transparent 50%);
            background-size: 40px 20px, 40px 20px, 20px 40px, 20px 40px;
            height: 70%;
            border-bottom: 12px solid #140c1c;
        }
        #shop-inner .floor {
            position: absolute;
            bottom:0; width:100%; height:30%;
            background: repeating-linear-gradient(90deg, var(--color-floor), var(--color-floor) 40px, var(--color-floor-dark) 40px, var(--color-floor-dark) 42px);
            box-shadow: inset 0 15px 20px rgba(0,0,0,0.5);
        }
        #shop-inner .floor-boards { position:absolute; width:100%; height:100%; background: repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(0,0,0,0.15) 15px, rgba(0,0,0,0.15) 18px); }
        #shop-inner .floor-cracks { position:absolute; width:100%; height:100%; pointer-events:none; opacity:0; background: repeating-linear-gradient(75deg, transparent, transparent 80px, rgba(0,0,0,0.25) 80px, rgba(0,0,0,0.25) 82px), repeating-linear-gradient(-60deg, transparent, transparent 110px, rgba(0,0,0,0.2) 110px, rgba(0,0,0,0.2) 111px); transition:opacity 0.5s; }
        #shop-inner .floor-cracks.visible { opacity:1; }
        #shop-inner .lantern {
            position: absolute;
            top:60px; width:24px; height:36px;
            background: var(--color-lantern);
            border-radius:4px;
            box-shadow: 0 0 30px 15px var(--color-lantern-glow);
            animation: flicker 3s infinite alternate;
        }
        #shop-inner .lantern.left { left:80px; }
        #shop-inner .lantern.right { right:80px; }
        #shop-inner .lantern.hidden { opacity:0; pointer-events:none; }
        #shop-inner .lantern.candle { width:12px; height:28px; border-radius:3px; top:70px; animation: candle-flicker 1.5s infinite alternate; }
        #shop-inner .lantern.candle.left { left:70px; }
        #shop-inner .lantern.candle.right { right:70px; }
        #shop-inner .lantern.flickering-bulb { border-radius:50%; width:20px; height:20px; top:55px; animation: bulb-flicker 0.3s infinite alternate; box-shadow:0 0 25px 10px rgba(255,240,150,0.4); }
        #shop-inner .lantern.flickering-bulb.left { left:60px; }
        #shop-inner .lantern.flickering-bulb.right { right:60px; }
        #shop-inner .lantern.ghost-candle { width:14px; height:30px; border-radius:3px; top:65px; animation: ghost-flicker 2s infinite; background:#7eb8da; box-shadow:0 0 35px 15px rgba(100,160,220,0.35); }
        #shop-inner .lantern.ghost-candle.left { left:75px; }
        #shop-inner .lantern.ghost-candle.right { right:75px; }
        @keyframes flicker { 0%,100%{transform:scale(1);opacity:0.9} 50%{transform:scale(0.95);opacity:0.8} 75%{transform:scale(1.02);opacity:1} }
        @keyframes candle-flicker { 0%,100%{transform:scaleY(1);opacity:0.85} 40%{transform:scaleY(0.7) scaleX(1.3);opacity:0.6} 70%{transform:scaleY(1.1);opacity:1} }
        @keyframes bulb-flicker { 0%,80%,100%{opacity:0.7;box-shadow:0 0 20px 8px rgba(255,240,150,0.3)} 30%{opacity:1;box-shadow:0 0 35px 15px rgba(255,240,150,0.6)} 50%{opacity:0.2;box-shadow:0 0 5px 2px rgba(255,240,150,0.1)} }
        @keyframes ghost-flicker { 0%,100%{transform:scale(1);opacity:0.7;box-shadow:0 0 30px 12px rgba(100,160,220,0.3)} 50%{transform:scale(1.15);opacity:0.95;box-shadow:0 0 50px 25px rgba(120,180,240,0.5)} }
        #shop-inner .shelf {
            position: absolute;
            bottom:30%;
            width:240px; height:160px;
            background: var(--color-shelf);
            border:6px solid var(--color-shelf-border);
            border-bottom:12px solid var(--color-shelf-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 10px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-wrap: wrap;
            align-content: space-around;
            justify-content: space-around;
            padding:10px;
            pointer-events:auto;
        }
        #shop-inner .shelf.left { left:40px; }
        #shop-inner .shelf.right { right:40px; }
        #shop-inner .shelf-board { position:absolute; width:100%; height:8px; background:var(--color-shelf-board); left:0; top:50%; box-shadow:0 4px 5px rgba(0,0,0,0.4); }
        #shop-inner .shelf.rusted { background:#3d3025; border-color:#5c3d1e; border-radius:0; }
        #shop-inner .shelf.rusted .shelf-board { background:#6b4f30; }
        #shop-inner .shelf.grand { background:#1a1030; border-color:#3a2850; border-radius:6px; height:180px; }
        #shop-inner .shelf.grand .shelf-board { background:#4a3070; height:10px; }
        #shop-inner .shelf.concrete { background:#4a4d52; border-color:#2f3033; border-radius:0; }
        #shop-inner .shelf.concrete .shelf-board { background:#5f6268; }
        #shop-inner .shelf.chapel { background:#1c1c24; border-color:#0d0d14; border-radius:8px; }
        #shop-inner .shelf.chapel .shelf-board { background:#2a2a38; }
        #shop-inner .shelf.cabin { background:#5c3a28; border-color:#3a1f14; border-radius:3px; }
        #shop-inner .shelf.cabin .shelf-board { background:#8b5a3c; }
        #shop-inner .counter {
            position: absolute;
            bottom:10%;
            left:50%;
            transform:translateX(-50%);
            width:320px; height:90px;
            background: var(--color-counter);
            border:8px solid var(--color-counter-border);
            border-top:12px solid var(--color-counter-top);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 6px 0 rgba(255,255,255,0.1);
            pointer-events:auto;
        }
        #shop-inner .counter-decor { position:absolute; bottom:0; width:100%; height:20px; background:#3e1e21; opacity:0.4; }
        #shop-inner .counter.rusted { background:#4a3830; border-color:#2e1f16; border-top:12px solid #6b5040; border-radius:2px; }
        #shop-inner .counter.rusted .counter-decor { background:#2e1f16; }
        #shop-inner .counter.study { background:#2a1f3d; border-color:#1a1028; border-top:14px solid #4a3870; border-radius:6px; }
        #shop-inner .counter.study .counter-decor { background:#1a1028; }
        #shop-inner .counter.prison { background:#5c5d62; border-color:#38393d; border-top:10px solid #707176; border-radius:0; }
        #shop-inner .counter.prison .counter-decor { background:#38393d; }
        #shop-inner .counter.altar { background:#1f1f2b; border-color:#0f0f18; border-top:16px solid #3a3a50; border-radius:8px; }
        #shop-inner .counter.altar .counter-decor { background:#0f0f18; }
        #shop-inner .counter.hunter { background:#5e3d2e; border-color:#3a1f14; border-top:14px solid #8b5a3c; border-radius:4px; }
        #shop-inner .counter.hunter .counter-decor { background:#3a1f14; }
        #shop-inner .barrel {
            position: absolute;
            bottom:15%;
            left:20px;
            width:45px; height:65px;
            background: var(--color-barrel);
            border:4px solid var(--color-barrel-border);
            border-radius:8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        #shop-inner .barrel::before, #shop-inner .barrel::after { content:''; position:absolute; width:100%; height:5px; background:#6e7582; left:0; border-top:1px solid #3d414d; }
        #shop-inner .barrel::before { top:12px; }
        #shop-inner .barrel::after { bottom:12px; }
        #shop-inner .barrel.hidden { opacity:0; pointer-events:none; }
        #shop-inner .barrel.metal-drum { border-radius:4px; background:#5c4a3a; border-color:#3a2a1a; }
        #shop-inner .barrel.metal-drum::before, #shop-inner .barrel.metal-drum::after { background:#7a6858; border-top-color:#4a3828; }
        #shop-inner .npc-container {
            position: absolute;
            bottom:22%;
            left:50%;
            transform:translateX(-50%);
            width:80px; height:100px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index:3;
            pointer-events:none;
        }
        #shop-inner .npc {
            width:64px; height:80px;
            position:relative;
            animation: npc-idle 2.5s infinite ease-in-out;
        }
        #shop-inner .npc-body { width:48px; height:50px; background:var(--color-npc-body); position:absolute; bottom:0; left:8px; border-radius:8px 8px 0 0; border:4px solid #232120; }
        #shop-inner .npc-cape { width:56px; height:45px; background:var(--color-npc-cape); position:absolute; bottom:0; left:4px; border:4px solid #232120; border-radius:6px; }
        #shop-inner .npc-head { width:32px; height:32px; background:var(--color-npc-skin); position:absolute; top:8px; left:16px; border:4px solid #232120; border-radius:4px; animation: head-bob 2.5s infinite ease-in-out; }
        #shop-inner .npc-beard { width:32px; height:16px; background:var(--color-npc-beard); position:absolute; bottom:-4px; left:-4px; border:4px solid #232120; border-radius:0 0 8px 8px; }
        #shop-inner .npc-eyes { position:absolute; top:8px; left:4px; width:16px; height:4px; display:flex; justify-content:space-between; }
        #shop-inner .npc-eyes::before, #shop-inner .npc-eyes::after { content:''; width:4px; height:4px; background:#232120; animation: npc-blink 4s infinite; }
        #shop-inner .npc-hood { position:absolute; top:0; left:10px; width:44px; height:22px; background:#1a1a1a; border:4px solid #232120; border-radius:10px 10px 0 0; opacity:0; transition:opacity 0.4s; pointer-events:none; }
        #shop-inner .npc-hood.visible { opacity:1; }
        #shop-inner .npc-tattoo { position:absolute; top:12px; left:8px; width:8px; height:10px; background:#1a3050; border-radius:2px; opacity:0; transition:opacity 0.4s; }
        #shop-inner .npc-tattoo.visible { opacity:1; }
        #shop-inner .npc-scar { position:absolute; top:14px; left:2px; width:10px; height:3px; background:#8b4040; opacity:0; transition:opacity 0.4s; }
        #shop-inner .npc-scar.visible { opacity:1; }
        #shop-inner .npc-hat { position:absolute; top:-12px; left:10px; width:44px; height:16px; background:#4a3020; border:4px solid #232120; border-radius:6px 6px 0 0; opacity:0; transition:opacity 0.4s; }
        #shop-inner .npc-hat.visible { opacity:1; }
        #shop-inner .npc-veil { position:absolute; top:0; left:6px; width:52px; height:36px; background:rgba(30,30,50,0.7); border-radius:6px; opacity:0; transition:opacity 0.4s; pointer-events:none; }
        #shop-inner .npc-veil.visible { opacity:1; }
        @keyframes npc-idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        @keyframes head-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(2px)} }
        @keyframes npc-blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
        #shop-inner .speech-bubble {
            position: absolute;
            top:-45px;
            left:50%;
            transform:translateX(-50%) scale(0);
            background:white;
            color:#140c1c;
            padding:8px 12px;
            font-size:10px;
            white-space:nowrap;
            border:3px solid #140c1c;
            border-radius:4px;
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            z-index:10;
            max-width:280px;
            text-align:center;
            pointer-events:none;
        }
        #shop-inner .speech-bubble::after { content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); border-width:6px 6px 0; border-style:solid; border-color:white transparent; display:block; width:0; }
        #shop-inner .speech-bubble::before { content:''; position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); border-width:7px 7px 0; border-style:solid; border-color:#140c1c transparent; display:block; width:0; z-index:-1; }
        #shop-inner .speech-bubble.active { transform:translateX(-50%) scale(1); }
        #shop-inner .pixel-box { background-color:var(--color-ui-bg); border:4px solid var(--color-ui-border); outline:4px solid #140c1c; box-shadow:inset -4px -4px 0px rgba(0,0,0,0.4), inset 4px 4px 0px rgba(255,255,255,0.05); padding:12px; }
        #shop-inner .hud-top { position:absolute; top:16px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center; pointer-events:auto; z-index:5; }
        #shop-inner .shop-title { margin:0; font-size:14px; color:#eec39a; text-shadow:2px 2px #000; letter-spacing:1px; }
        #shop-inner .coin-counter { display:flex; align-items:center; font-size:16px; color:var(--color-gold); text-shadow:2px 2px #000; }
        #shop-inner .coin-icon { width:16px; height:16px; background:var(--color-gold); border:2px solid var(--color-gold-dark); border-radius:50%; margin-right:8px; display:inline-block; animation:coin-spin 1s infinite alternate; }
        @keyframes coin-spin { 0%{transform:scaleX(1)} 100%{transform:scaleX(0.4)} }
        #shop-inner .shop-item-world { width:44px; height:44px; display:flex; justify-content:center; align-items:center; cursor:pointer; position:relative; pointer-events:auto; transition:transform 0.2s; }
        #shop-inner .shop-item-world:hover { transform:scale(1.15); }
        #shop-inner .shop-item-world:hover::after { content:attr(data-name); position:absolute; bottom:48px; background:#140c1c; color:#fff; padding:4px 8px; font-size:10px; border-radius:3px; white-space:nowrap; z-index:20; border:2px solid var(--color-ui-light); }
        #shop-inner .rare-glow { filter:drop-shadow(0 0 6px var(--rarity-rare)); animation:item-float 2s infinite ease-in-out; }
        #shop-inner .epic-glow { filter:drop-shadow(0 0 8px var(--rarity-epic)); animation:item-float 1.7s infinite ease-in-out; }
        @keyframes item-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        #shop-inner #item-pos1 { position:absolute; left:30px; top:15px; }
        #shop-inner #item-pos2 { position:absolute; left:100px; top:15px; }
        #shop-inner #item-pos3 { position:absolute; right:40px; top:15px; }
        #shop-inner #item-pos4 { position:absolute; left:60px; bottom:15px; }
        #shop-inner #item-pos5 { position:absolute; right:70px; bottom:15px; }
        #shop-inner #item-pos6 { position:absolute; left:40px; top:-35px; }
        #shop-inner #item-pos7 { position:absolute; right:40px; top:-35px; }
        #shop-inner .modal-overlay {
            position:absolute;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.5);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:100;
            opacity:0;
            pointer-events:none;
            transition:opacity 0.2s;
        }
        #shop-inner .modal-overlay.active { opacity:1; pointer-events:auto; }
        #shop-inner .modal-content {
            width:340px;
            transform:scale(0.8);
            transition:transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
            text-align:center;
        }
        #shop-inner .modal-overlay.active .modal-content { transform:scale(1); }
        #shop-inner .modal-title { font-size:18px; margin-top:0; color:#fff; }
        #shop-inner .modal-rarity { font-size:11px; text-transform:uppercase; margin-bottom:4px; letter-spacing:1px; }
        #shop-inner .modal-art-box { width:80px; height:80px; background:rgba(0,0,0,0.3); margin:0 auto 16px; display:flex; justify-content:center; align-items:center; border:4px solid var(--color-ui-border); }
        #shop-inner .modal-art-box svg { width:56px; height:56px; }
        #shop-inner .modal-desc { font-size:12px; color:var(--color-ui-light); line-height:1.4; margin-bottom:12px; min-height:36px; }
        #shop-inner .modal-price { font-size:14px; color:var(--color-gold); margin-bottom:8px; display:flex; justify-content:center; align-items:center; gap:8px; }
        #shop-inner .qty-control {
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
            margin:8px 0 12px 0;
        }
        #shop-inner .qty-control button {
            background:#5a3e5c;
            border:3px solid #140c1c;
            color:white;
            width:36px;
            height:36px;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            font-family:inherit;
            box-shadow:inset -3px -3px 0px rgba(0,0,0,0.4);
            pointer-events:auto;
        }
        #shop-inner .qty-control button:active { box-shadow:inset 3px 3px 0px rgba(0,0,0,0.4); transform:translateY(2px); }
        #shop-inner .qty-control button:disabled {
            opacity:0.3;
            pointer-events:none;
        }
        #shop-inner .qty-display {
            min-width:40px;
            font-size:18px;
            font-weight:bold;
            color:#fff;
        }
        #shop-inner .total-cost {
            font-size:16px;
            font-weight:bold;
            color:#ffd700;
        }
        #shop-inner .btn-row { display:flex; justify-content:space-between; gap:12px; margin-top:8px; }
        #shop-inner .btn-retro { flex:1; background:#5a3e5c; border:3px solid #140c1c; color:white; padding:10px; font-family:inherit; font-weight:bold; font-size:13px; cursor:pointer; box-shadow:inset -3px -3px 0px rgba(0,0,0,0.4); pointer-events:auto; }
        #shop-inner .btn-retro:active { box-shadow:inset 3px 3px 0px rgba(0,0,0,0.4); transform:translateY(2px); }
        #shop-inner .btn-retro.buy { background:#3a7d44; }
        #shop-inner .btn-retro.buy:disabled {
            opacity:0.5;
            pointer-events:none;
        }
        #shop-inner .inventory-panel { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); width:460px; pointer-events:auto; z-index:5; }
        #shop-inner .inventory-header { font-size:11px; color:var(--color-ui-light); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
        #shop-inner .inventory-grid { display:grid; grid-template-columns:repeat(8, 1fr); gap:6px; }
        #shop-inner .inv-slot { width:48px; height:48px; background:rgba(0,0,0,0.4); border:3px solid #140c1c; display:flex; justify-content:center; align-items:center; position:relative; pointer-events:auto; }
        #shop-inner .inv-slot:hover { border-color:var(--color-ui-light); }
        #shop-inner .inv-slot .item-icon { width:32px; height:32px; cursor:help; }
        #shop-inner .inv-slot:hover .inv-tooltip { display:block; }
        #shop-inner .inv-tooltip { display:none; position:absolute; bottom:56px; left:50%; transform:translateX(-50%); width:160px; background:#140c1c; border:3px solid var(--color-ui-light); padding:8px; font-size:10px; z-index:99; pointer-events:none; box-shadow:0 4px 10px rgba(0,0,0,0.6); }
        #shop-inner .inv-tooltip-name { margin-bottom:4px; }

<body>

<script>
(function() {
    // ============================================================
    // v5.0 — STEALTH ROOM SISTEMA SONORO COMPLETO + JOGO COMPLETO
    // ============================================================
    // Código completo do jogo com integração de áudio.
    // ============================================================

    // ============================================================
    // 1. SISTEMA DE ÁUDIO (completo)
    // ============================================================

    // --- AudioEngine (motor) ---
    class AudioEngine {
        constructor() {
            this.ctx = null;
            this.initialized = false;
            this.masterGain = null;
            this.noiseBuffer = null;
            this._checkSupport();
        }
        _checkSupport() {
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.7;
                this.masterGain.connect(this.ctx.destination);
                this._buildNoiseBuffer();
            } catch(e) {
                this.initialized = false;
                this.ctx = null;
            }
        }
        init() {
            if (this.initialized && this.ctx) return;
            this._checkSupport();
            if (this.initialized) {
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.7;
                this.masterGain.connect(this.ctx.destination);
                this._buildNoiseBuffer();
            }
        }
        resume() {
            if (this.ctx && this.ctx.state === 'suspended') {
                try { this.ctx.resume(); } catch(e) {}
            }
        }
        _buildNoiseBuffer() {
            if (!this.ctx) return;
            try {
                const len = this.ctx.sampleRate * 0.5;
                this.noiseBuffer = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
                const data = this.noiseBuffer.getChannelData(0);
                for (let i=0; i<len; i++) data[i] = Math.random()*2 - 1;
            } catch(e) { this.noiseBuffer = null; }
        }
        play(freq, type, duration, vol=0.3, glideTo=null, delay=0, filterFreq=null) {
            if (!this.initialized || !this.ctx) return;
            this.resume();
            try {
                const t = this.ctx.currentTime + delay;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(Math.max(20, freq), t);
                if (glideTo) osc.frequency.linearRampToValueAtTime(Math.max(20, glideTo), t+duration);
                const volClamped = Math.min(0.6, Math.max(0, vol));
                gain.gain.setValueAtTime(volClamped * 0.6, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t+duration);
                let node = osc;
                if (filterFreq) {
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = filterFreq;
                    osc.connect(filter);
                    node = filter;
                }
                node.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t+duration+0.01);
                return { osc, gain, node };
            } catch(e) { return null; }
        }
        playNoise(duration, vol=0.08, band='all', filterFreq=null) {
            if (!this.initialized || !this.ctx || !this.noiseBuffer) return;
            this.resume();
            try {
                const t = this.ctx.currentTime;
                const source = this.ctx.createBufferSource();
                source.buffer = this.noiseBuffer;
                const filter = this.ctx.createBiquadFilter();
                if (band === 'low') { filter.type = 'lowpass'; filter.frequency.value = 400; }
                else if (band === 'high') { filter.type = 'highpass'; filter.frequency.value = 1200; }
                else { filter.type = 'bandpass'; filter.frequency.value = 800; }
                if (filterFreq) {
                    filter.type = 'lowpass';
                    filter.frequency.value = filterFreq;
                }
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(Math.min(0.6, vol), t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t+duration);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                source.start(t);
                source.stop(t+duration);
                return { source, filter, gain };
            } catch(e) { return null; }
        }
        setMasterGain(value) {
            if (this.masterGain) {
                this.masterGain.gain.value = Math.max(0, Math.min(1, value));
            }
        }
    }

    // --- AudioBus ---
    const AudioBus = {
        categories: {
            master: { gain: 0.8, mute: false },
            music: { gain: 0.6, mute: false },
            sfx: { gain: 0.7, mute: false },
            ambience: { gain: 0.4, mute: false },
            ui: { gain: 0.8, mute: false },
            entity: { gain: 0.5, mute: false },
            alert: { gain: 0.9, mute: false },
            stealth: { gain: 0.5, mute: false },
            danger: { gain: 0.8, mute: false }
        },
        getGain(category) {
            const cat = this.categories[category];
            if (!cat) return 1;
            if (cat.mute) return 0;
            return cat.gain * this.categories.master.gain * (this.categories.master.mute ? 0 : 1);
        },
        setGain(category, value) {
            if (this.categories[category]) {
                this.categories[category].gain = Math.max(0, Math.min(1, value));
                this.save();
            }
        },
        toggleMute(category) {
            if (this.categories[category]) {
                this.categories[category].mute = !this.categories[category].mute;
                this.save();
            }
        },
        save() {
            try {
                localStorage.setItem('stealth_audio_bus', JSON.stringify(this.categories));
            } catch(e) {}
        },
        load() {
            try {
                const data = localStorage.getItem('stealth_audio_bus');
                if (data) {
                    const parsed = JSON.parse(data);
                    for (const cat in parsed) {
                        if (this.categories[cat]) {
                            this.categories[cat] = parsed[cat];
                        }
                    }
                }
            } catch(e) {}
        }
    };
    AudioBus.load();

    // --- SoundEffectManager ---
    const SoundEffectManager = {
        _sfx: {},
        _loops: {},
        _cooldowns: {},
        _audio: null,

        init(audioEngine) {
            this._audio = audioEngine;
        },

        define(name, config) {
            this._sfx[name] = config;
        },

        play(name, options = {}) {
            const config = this._sfx[name];
            if (!config) {
                console.warn('SFX não definido:', name);
                return;
            }
            const now = performance.now();
            const cdKey = name + (options.variant || '');
            if (this._cooldowns[cdKey] && now - this._cooldowns[cdKey] < (config.cooldown || 0)) {
                return;
            }
            this._cooldowns[cdKey] = now;

            const category = config.category || 'sfx';
            const gain = AudioBus.getGain(category) * (options.volume || 1) * (config.volume || 1);
            if (gain <= 0.01) return;

            const freq = config.freq || 400;
            const type = config.type || 'sine';
            const duration = config.duration || 0.1;
            const vol = gain * 0.5;
            const glide = config.glide || null;
            const filter = config.filter || null;

            let finalFreq = freq;
            if (options.pitchVariation !== undefined) {
                finalFreq = freq * (1 + (Math.random() - 0.5) * options.pitchVariation);
            } else if (config.pitchVariation) {
                finalFreq = freq * (1 + (Math.random() - 0.5) * config.pitchVariation);
            }
            let finalDuration = duration;
            if (config.durationVariation) {
                finalDuration = duration * (1 + (Math.random() - 0.5) * config.durationVariation);
            }

            if (!this._audio) return;

            if (config.noise) {
                this._audio.playNoise(finalDuration, vol * 0.8, config.band || 'all', filter);
            }
            if (config.osc) {
                this._audio.play(finalFreq, type, finalDuration, vol, glide, 0, filter);
            }
            if (config.extra) {
                if (config.extra.freq) {
                    this._audio.play(config.extra.freq, config.extra.type || 'sine', finalDuration, vol * 0.3, config.extra.glide || null);
                }
            }
        },

        startLoop(name, options = {}) {
            if (this._loops[name]) return;
            const config = this._sfx[name];
            if (!config) return;
            const category = config.category || 'ambience';
            const gain = AudioBus.getGain(category) * (options.volume || 1) * (config.volume || 1);
            if (gain <= 0.01) return;

            const freq = config.freq || 200;
            const type = config.type || 'sawtooth';
            const filter = config.filter || null;

            if (this._audio && this._audio.ctx) {
                try {
                    const osc = this._audio.ctx.createOscillator();
                    const gainNode = this._audio.ctx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gainNode.gain.value = gain * 0.15;
                    if (filter) {
                        const filt = this._audio.ctx.createBiquadFilter();
                        filt.type = 'lowpass';
                        filt.frequency.value = filter;
                        osc.connect(filt);
                        filt.connect(gainNode);
                    } else {
                        osc.connect(gainNode);
                    }
                    gainNode.connect(this._audio.masterGain);
                    osc.start();
                    this._loops[name] = { osc, gainNode, active: true };
                } catch(e) {
                    console.warn('Erro ao iniciar loop:', e);
                }
            }
        },

        stopLoop(name) {
            if (this._loops[name]) {
                try {
                    const loop = this._loops[name];
                    if (loop.osc) {
                        loop.osc.stop();
                        loop.osc.disconnect();
                    }
                    if (loop.gainNode) {
                        loop.gainNode.disconnect();
                    }
                } catch(e) {}
                delete this._loops[name];
            }
        },

        stopAllLoops() {
            for (const name in this._loops) {
                this.stopLoop(name);
            }
        },

        updateLoop(name, volume) {
            const loop = this._loops[name];
            if (loop && loop.gainNode) {
                const config = this._sfx[name];
                const cat = config ? config.category : 'ambience';
                const gain = AudioBus.getGain(cat) * (volume || 1) * (config ? config.volume : 1);
                loop.gainNode.gain.value = gain * 0.15;
            }
        },

        updateAllLoops() {
            for (const name in this._loops) {
                const config = this._sfx[name];
                if (config) {
                    const cat = config.category || 'ambience';
                    const gain = AudioBus.getGain(cat) * (config.volume || 1);
                    if (this._loops[name].gainNode) {
                        this._loops[name].gainNode.gain.value = gain * 0.15;
                    }
                }
            }
        }
    };

    // --- MusicManager ---
    const MusicManager = {
        _audio: null,
        _state: 'TITLE',
        _intensity: 0,
        _targetIntensity: 0,
        _currentOscs: [],
        _loopInterval: null,

        states: {
            TITLE: { baseFreq: 130, type: 'sine', pattern: [0.5, 0.3, 0.2, 0.4], speed: 1.0 },
            INTRO: { baseFreq: 140, type: 'sine', pattern: [0.3, 0.2, 0.1], speed: 0.8 },
            STEALTH: { baseFreq: 180, type: 'sine', pattern: [0.2, 0.1, 0.15], speed: 0.6 },
            SUSPICIOUS: { baseFreq: 200, type: 'sine', pattern: [0.3, 0.25, 0.2, 0.3], speed: 0.9 },
            ALERT: { baseFreq: 220, type: 'sawtooth', pattern: [0.4, 0.3, 0.5, 0.4], speed: 1.3 },
            CHASE: { baseFreq: 280, type: 'sawtooth', pattern: [0.6, 0.5, 0.7, 0.6], speed: 1.8 },
            CAUGHT: { baseFreq: 120, type: 'sawtooth', pattern: [0.1, 0.0], speed: 0.5 },
            WIN: { baseFreq: 440, type: 'sine', pattern: [0.5, 0.4, 0.6, 0.8], speed: 1.2 },
            SHOP: { baseFreq: 160, type: 'sine', pattern: [0.3, 0.2, 0.25], speed: 0.7 },
            GAME_OVER: { baseFreq: 100, type: 'sawtooth', pattern: [0.1, 0.0], speed: 0.4 },
            WORLD_TRANSITION: { baseFreq: 260, type: 'sine', pattern: [0.4, 0.3], speed: 1.0 },
            WORLD_SUMMARY: { baseFreq: 300, type: 'sine', pattern: [0.5, 0.4, 0.6], speed: 1.1 }
        },

        init(audioEngine) {
            this._audio = audioEngine;
            this._state = 'TITLE';
            this._intensity = 0;
            this._targetIntensity = 0;
            this._loopInterval = setInterval(() => {
                this._updateMusic();
            }, 300);
        },

        setState(state) {
            if (this._state === state) return;
            this._state = state;
            if (state === 'TITLE' || state === 'STEALTH' || state === 'SHOP') {
                this._targetIntensity = 0.5;
            } else if (state === 'CAUGHT' || state === 'GAME_OVER') {
                this._targetIntensity = 0.2;
            } else if (state === 'WIN') {
                this._targetIntensity = 0.8;
            } else {
                this._targetIntensity = 0.7;
            }
            this._clearCurrent();
        },

        setIntensity(value) {
            this._targetIntensity = Math.max(0, Math.min(1, value));
        },

        _clearCurrent() {
            for (const osc of this._currentOscs) {
                try {
                    if (osc) {
                        osc.stop();
                        osc.disconnect();
                    }
                } catch(e) {}
            }
            this._currentOscs = [];
        },

        _updateMusic() {
            if (!this._audio || !this._audio.ctx) return;
            this._clearCurrent();
            const stateConfig = this.states[this._state];
            if (!stateConfig) return;
            this._intensity += (this._targetIntensity - this._intensity) * 0.05;
            const baseFreq = stateConfig.baseFreq;
            const pattern = stateConfig.pattern;
            const type = stateConfig.type;
            const gainVal = AudioBus.getGain('music') * 0.15 * (0.3 + this._intensity * 0.7);
            if (gainVal < 0.01) return;

            this._playNote(baseFreq, type, 0.2, gainVal * 0.6);
            for (let i = 1; i <= 3; i++) {
                if (pattern[i] > 0.1) {
                    const harmonic = baseFreq * (i + 1);
                    const vol = pattern[i] * gainVal * 0.2;
                    this._playNote(harmonic, type, 0.15, vol);
                }
            }
            if (this._intensity > 0.5) {
                const tensionFreq = baseFreq * 1.5;
                const tensionVol = (this._intensity - 0.5) * 0.2 * gainVal;
                this._playNote(tensionFreq, 'square', 0.1, tensionVol);
            }
            if (this._state === 'CHASE' && this._intensity > 0.6) {
                const kickFreq = 60;
                const kickVol = 0.3 * gainVal;
                this._playNote(kickFreq, 'square', 0.08, kickVol);
                setTimeout(() => {
                    this._playNote(kickFreq * 1.2, 'square', 0.06, kickVol * 0.5);
                }, 150);
            }
        },

        _playNote(freq, type, duration, vol) {
            if (!this._audio || !this._audio.ctx) return;
            try {
                const osc = this._audio.ctx.createOscillator();
                const gain = this._audio.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, this._audio.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this._audio.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this._audio.masterGain);
                osc.start();
                osc.stop(this._audio.ctx.currentTime + duration + 0.01);
                this._currentOscs.push(osc);
            } catch(e) {}
        },

        update(dt) {
            if (this._intensity !== this._targetIntensity) {

                }
            }
        },

            if (this._loopInterval) {
                clearInterval(this._loopInterval);
                this._loopInterval = null;
            }

    function castRay(originX, originY, angle, maxDist) {
        const step = 4;
        let lastX = originX, lastY = originY;
        for (let d = step; d <= maxDist; d += step) {
            const x = originX + Math.cos(angle) * d;
            const y = originY + Math.sin(angle) * d;
            let hit = false;
            for (const obs of getAllBlockers()) {
                if (pointInRect(x, y, obs, 0)) { hit = true; break; }
            }
            if (hit) return { x: lastX, y: lastY };
            if (x < roomWalls.left.x + roomWalls.left.w ||
                x > roomWalls.right.x ||
                y < roomWalls.top.y + roomWalls.top.h ||
                y > roomWalls.bottom.y) {
                return { x: lastX, y: lastY };
            }
            lastX = x;
            lastY = y;
        }
        return { x: lastX, y: lastY };
    }

        if (dist < 5) return;
        if (pts.length >= crowProgramming.maxPoints) return;
        let totalDist = crowProgramming.distance + dist;
        if (totalDist > crowProgramming.maxDistance) return;
        pts.push({ x, y });
        crowProgramming.distance = totalDist;
    }
    function launchCrow() {
        if (crowProgramming.points.length < 2) return false;
        const itemIdx = inventory.findIndex(it => it.id === 'crow_robot');
        if (itemIdx === -1) return false;
        const item = inventory[itemIdx];
        if (item.quantity <= 0) return false;
        const crow = {
            type: 'electronicCrow',
            x: crowProgramming.origin.x, y: crowProgramming.origin.y,
            path: crowProgramming.points.slice(),
            currentPoint: 0,
            speed: 80,
            noiseTimer: 0,
            noiseInterval: 0.6,
            active: true,
            elapsed: 0,
            maxLifetime: 12,
            flapPhase: Math.random() * Math.PI * 2,
            explosionRadius: 60,
            stunnedDuration: 3.0,
            exploded: false
        };
        crows.push(crow);
        item.quantity--;
        if (item.quantity <= 0) {
            inventory.splice(itemIdx, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
        }
        AudioEvents.play('crow:launch');
        spawnParticles(crowProgramming.origin.x, crowProgramming.origin.y, 15, '#88ccff', 50, 0.5, 2, -4);
        cancelCrowProgramming();
        return true;
    }

    function updateCrows(dt) {
        for (let i = crows.length - 1; i >= 0; i--) {
            const crow = crows[i];
            if (!crow.active) { crows.splice(i, 1); continue; }
            crow.elapsed += dt;
            crow.flapPhase += dt * 12;
            if (crow.currentPoint < crow.path.length - 1) {
                const target = crow.path[crow.currentPoint + 1];
                const dx = target.x - crow.x, dy = target.y - crow.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 2) crow.currentPoint++;
                else {
                    const move = crow.speed * dt;
                    const step = Math.min(move, dist);
                    crow.x += (dx / dist) * step;
                    crow.y += (dy / dist) * step;
                }
            } else {
                crow.elapsed += dt;
                if (crow.elapsed > crow.maxLifetime) { crow.active = false; continue; }
            }
            crow.noiseTimer += dt;
            if (crow.noiseTimer >= crow.noiseInterval) {
                crow.noiseTimer = 0;
                const radius = 50 + Math.random() * 20;
                NoiseSystem.createNoise(crow.x, crow.y, radius, 0.8, 'crow');
                AudioEvents.play('crow:fly');
                spawnParticles(crow.x, crow.y, 2, '#88aaff', 20, 0.2, 1, -2);
            }
            if (!crow.exploded) {
                for (const guard of guards) {
                    if (guard.stunnedTimer > 0) continue;
                    const dist = Math.hypot(guard.x - crow.x, guard.y - crow.y);
                    if (dist < crow.explosionRadius) {
                        crow.exploded = true;
                        crow.active = false;
                        AudioEvents.play('crow:explode');
                        spawnParticles(crow.x, crow.y, 40, '#88ddff', 100, 0.8, 3, -5);
                        spawnParticles(crow.x, crow.y, 30, '#ffffff', 80, 0.6, 2, -3);
                        for (const g of guards) {
                            const d = Math.hypot(g.x - crow.x, g.y - crow.y);
                            if (d < crow.explosionRadius) {
                                g.stunnedTimer = crow.stunnedDuration;
                                if (g.state !== 'patrol') transitionGuard(g, 'patrol');
                                spawnParticles(g.x, g.y, 15, '#ffaa44', 60, 0.5, 2, -10);
                                AudioEvents.play('guard:stunned');
                            }
                        }
                        break;
                    }
                }
            }
            if (crow.exploded || crow.elapsed > crow.maxLifetime) {
                crows.splice(i, 1);
            }
        }
    }

    function renderCrows() {
        for (const crow of crows) {
            const cx = crow.x, cy = crow.y;
            ctx.fillStyle = '#333';
            ctx.fillRect(cx-6, cy-4, 12, 8);
            ctx.fillStyle = '#222';
            ctx.fillRect(cx+4, cy-6, 6, 4);
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(cx+10, cy-4, 4, 2);
            ctx.fillStyle = '#555';
            const wingX = cx - 4, wingY = cy - 2;
            ctx.fillRect(wingX-4, wingY-2 + Math.sin(crow.flapPhase)*4, 4, 4);
            ctx.fillRect(wingX+8, wingY-2 - Math.sin(crow.flapPhase)*4, 4, 4);
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(cx+6, cy-4, 2, 2);
            ctx.fillStyle = 'rgba(100,200,255,0.5)';
            ctx.fillRect(cx-8, cy-8, 16, 16);
        }
    }

    function renderCrowRoute() {
        if (!crowProgramming.active) return;
        const pts = crowProgramming.points;
        if (pts.length < 1) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(10, GAME_H-30, 260, 20);
            ctx.fillStyle = '#ccddff';
            ctx.font = '9px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('Clique e arraste para desenhar a rota', 14, GAME_H-15);
            if (crowProgramming.currentMousePos) {
                const worldPos = canvasToWorld(crowProgramming.currentMousePos.x, crowProgramming.currentMousePos.y);
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(worldPos.x, worldPos.y, 6, 0, Math.PI*2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(worldPos.x, worldPos.y, 3, 0, Math.PI*2);
                ctx.fill();
            }
            return;
        }
        for (let i = 1; i < pts.length; i++) {
            const p1 = pts[i-1], p2 = pts[i];
            const valid = crowProgramming.distance <= crowProgramming.maxDistance && pts.length <= crowProgramming.maxPoints;
            ctx.strokeStyle = valid ? 'rgba(0,255,100,0.8)' : 'rgba(255,50,50,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.fillStyle = valid ? '#88ff88' : '#ff4444';
            ctx.fillRect(p1.x-2, p1.y-2, 4, 4);
        }
        const last = pts[pts.length-1];
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(last.x-3, last.y-3, 6, 6);
        const valid = crowProgramming.distance <= crowProgramming.maxDistance && pts.length <= crowProgramming.maxPoints;
        const msg = valid ? 'ROTA VÁLIDA — ENTER/ESPACO LANÇAR, ESC CANCELAR' : (crowProgramming.distance > crowProgramming.maxDistance ? 'DISTÂNCIA MÁXIMA EXCEDIDA' : 'MUITOS PONTOS');
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(10, GAME_H-30, 300, 20);
        ctx.fillStyle = valid ? '#88ff88' : '#ff6666';
        ctx.font = '9px "Courier New", monospace';
        ctx.fillText(msg, 14, GAME_H-15);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 10, 200, 18);
        ctx.fillStyle = '#ccddff';
        ctx.fillText('DESENHE A ROTA DO CORVO', 14, 24);
        const distPercent = Math.min(1, crowProgramming.distance / crowProgramming.maxDistance);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 32, 100, 6);
        ctx.fillStyle = distPercent > 1 ? '#ff4444' : '#88ff88';
        ctx.fillRect(10, 32, 100 * Math.min(1, distPercent), 6);
        if (crowProgramming.currentMousePos) {
            const worldPos = canvasToWorld(crowProgramming.currentMousePos.x, crowProgramming.currentMousePos.y);
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(worldPos.x, worldPos.y, 6, 0, Math.PI*2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(worldPos.x, worldPos.y, 3, 0, Math.PI*2);
            ctx.fill();
        }
    }

    const itemEffects = {
        'distraction_bag': function(item) {
            if (gameState !== STATE.PLAYING) return false;
            if (distractionCooldown > 0) return false;
            if (!player || !roomWalls) return false;
            const originX = player.x, originY = player.y;
            const angle = player.facingAngle;
            const impact = castRay(originX, originY, angle, DISTRACTION_MAX_DIST);
            NoiseSystem.createNoise(impact.x, impact.y, DISTRACTION_RADIUS, 1.0, 'player');
            distractionCooldown = DISTRACTION_COOLDOWN;
            const steps = 20;
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const px = originX + (impact.x - originX) * t;
                const py = originY + (impact.y - originY) * t;
                spawnParticles(px, py, 1, '#ccaa88', 5, 0.2, 1, 0);
            }
            AudioEvents.play('player:useItem');
            return true;
        },
        'crow_robot': function(item) {
            if (gameState !== STATE.PLAYING) return false;
            if (crowProgramming.active) return false;
            if (item.quantity <= 0) return false;
            return startCrowProgramming(item);
        }
    };

    function addItemToInventory(itemTemplate, quantity = 1) {
        for (let i = 0; i < inventory.length; i++) {
            if (inventory[i].id === itemTemplate.id) {
                const maxQ = inventory[i].maxQuantity || 99;
                const add = Math.min(quantity, maxQ - inventory[i].quantity);
                if (add <= 0) return 0;
                inventory[i].quantity += add;
                if (itemEffects[inventory[i].id]) inventory[i].use = itemEffects[inventory[i].id];
                return add;
            }
        }
        const newItem = { ...itemTemplate, quantity: Math.min(quantity, itemTemplate.maxQuantity || 99), use: null };
        if (itemEffects[newItem.id]) newItem.use = itemEffects[newItem.id];
        else newItem.use = function() { return false; };
        inventory.push(newItem);
        return quantity;
    }

    function useSelectedItem() {
        if (gameState !== STATE.PLAYING) return false;
        if (inventory.length === 0) return false;
        if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
        const item = inventory[selectedSlot];
        if (!item) return false;
        if (item.quantity <= 0) {
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
            return false;
        }
        if (crowProgramming.active && item.id !== 'crow_robot') {
            cancelCrowProgramming();
            return false;
        }
        if (typeof item.use === 'function') {
            const success = item.use(item);
            if (success && item.id !== 'crow_robot') {
                if (item.maxQuantity !== undefined && item.maxQuantity > 1) {
                    item.quantity--;
                    if (item.quantity <= 0) {
                        inventory.splice(selectedSlot, 1);
                        if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
                    }
                } else {
                    inventory.splice(selectedSlot, 1);
                    if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
                }
                renderShopInventory();
            }
            return success;
        }
        return false;
    }

    // --- Funções auxiliares ---
    function randomRange(min, max) { return min + Math.random() * (max - min); }
    function randomInt(min, max) { return Math.floor(randomRange(min, max + 1)); }
    function rectsOverlap(a, b, margin = 0) {
        return !(a.x + a.w + margin <= b.x || b.x + b.w + margin <= a.x ||
                 a.y + a.h + margin <= b.y || b.y + b.h + margin <= a.y);
    }
    function pointInRect(px, py, rect, margin = 0) {
        return px >= rect.x - margin && px <= rect.x + rect.w + margin &&
               py >= rect.y - margin && py <= rect.y + rect.h + margin;
    }
    function distBetween(a, b) {
        const ax = a.x + (a.w||0)/2, ay = a.y + (a.h||0)/2;
        const bx = b.x + (b.w||0)/2, by = b.y + (b.h||0)/2;
        return Math.hypot(ax - bx, ay - by);
    }
    function entitiesOverlap(a, b) {
        const aw = (a.w||6) * (a.hitboxScale||1);
        const ah = (a.h||9) * (a.hitboxScale||1);
        const bw = (b.w||7) * (b.hitboxScale||1);
        const bh = (b.h||10) * (b.hitboxScale||1);
        return Math.abs(a.x - b.x) < (aw + bw)/2 && Math.abs(a.y - b.y) < (ah + bh)/2;
    }
    function isPlayerInBush() {
        if (!player || bushes.length === 0) return false;
        for (const b of bushes) {
            if (pointInRect(player.x, player.y, b, 2)) return true;
        }
        return false;
    }
